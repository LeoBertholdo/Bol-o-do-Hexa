<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Copa 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
:root{
  --green:#00843d;
  --green-2:#005f2f;
  --yellow:#ffdf00;
  --blue:#002776;
  --blue-2:#071c4d;
  --sky:#e9f4ff;
  --bg:#f6f8ee;
  --surface:#fffdf4;
  --surface-2:#ffffff;
  --border:#dce5d8;
  --text:#172033;
  --muted:#697589;
  --gold:#f5c542;
  --silver:#b9c3cf;
  --bronze:#c98747;
  --red:#d83a34;
  --shadow:0 18px 50px rgba(0,39,118,.12);
}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
  background:
    linear-gradient(135deg,rgba(0,132,61,.1) 0 16%,transparent 16% 100%),
    linear-gradient(180deg,#f8fbf1 0%,#eef5ff 52%,#f7f9f1 100%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.22;
  background-image:
    linear-gradient(30deg, rgba(0,39,118,.08) 12%, transparent 12.5%, transparent 87%, rgba(0,39,118,.08) 87.5%, rgba(0,39,118,.08)),
    linear-gradient(150deg, rgba(0,39,118,.08) 12%, transparent 12.5%, transparent 87%, rgba(0,39,118,.08) 87.5%, rgba(0,39,118,.08));
  background-size:72px 72px;
}
button,input,select{font:inherit}
button{cursor:pointer}
button:disabled,input:disabled,select:disabled{cursor:not-allowed;opacity:.58}
input:disabled,select:disabled{background:#f4f7f5;color:#8792a3}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(255,223,0,.72);outline-offset:2px}

/* ACCOUNT MENU */
.account-menu{position:relative;display:flex;align-items:center;gap:8px;z-index:2}
.account-buttons{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn-auth{
  border:1px solid rgba(255,255,255,.38);
  background:rgba(255,255,255,.12);
  color:#fff;
  padding:10px 13px;
  border-radius:8px;
  font-size:.78rem;
  font-weight:950;
  white-space:nowrap;
}
.btn-auth.primary{background:var(--yellow);border-color:var(--yellow);color:var(--blue);box-shadow:0 8px 22px rgba(0,0,0,.14)}
.btn-auth.user{max-width:220px;overflow:hidden;text-overflow:ellipsis}
.account-panel{
  position:absolute;
  top:calc(100% + 10px);
  right:0;
  width:min(360px,calc(100vw - 28px));
  display:none;
  color:var(--text);
  background:rgba(255,253,244,.98);
  border:1px solid rgba(220,229,216,.96);
  border-radius:8px;
  padding:14px;
  box-shadow:0 22px 56px rgba(0,39,118,.28);
}
.account-panel.open{display:block}
.account-panel:before{
  content:"";
  position:absolute;
  right:24px;
  top:-8px;
  width:14px;
  height:14px;
  transform:rotate(45deg);
  background:rgba(255,253,244,.98);
  border-left:1px solid rgba(220,229,216,.96);
  border-top:1px solid rgba(220,229,216,.96);
}
.account-panel .card{margin:0;box-shadow:none;border-color:rgba(220,229,216,.95)}
.account-panel .login-grid{grid-template-columns:1fr;margin-top:10px}
.account-panel .txt-inp,.account-panel .txt-select{text-align:left;height:42px}
.account-panel .action-btn{min-width:130px}

/* HEADER */
.hero{
  position:relative;
  overflow:visible;
  z-index:10;
  color:#fff;
  background:
    linear-gradient(90deg,rgba(0,39,118,.88) 0%,rgba(0,76,45,.68) 34%,rgba(0,0,0,.22) 68%,rgba(0,0,0,.42) 100%),
    url("assets/header-hexa-2026.png") center 52%/cover no-repeat,
    linear-gradient(128deg,#004c2d 0%,#002776 58%,#071c4d 100%);
  border-bottom:1px solid rgba(255,255,255,.2);
  box-shadow:0 16px 46px rgba(0,39,118,.28);
}
.hero:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.04) 46%,rgba(0,0,0,.24));
  opacity:.72;
  z-index:0;
  pointer-events:none;
}
header{
  position:relative;
  z-index:1;
  max-width:1120px;
  margin:0 auto;
  padding:22px 16px 18px;
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}
.brand-kicker{font-size:.7rem;text-transform:uppercase;letter-spacing:1.4px;font-weight:900;color:var(--yellow);margin-bottom:4px}
h1{font-size:clamp(1.58rem,4.35vw,2.8rem);line-height:1;font-weight:950;letter-spacing:0}
.sub{font-size:.84rem;opacity:.9;margin-top:7px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn-save{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.34);padding:10px 12px;border-radius:8px;font-weight:950;font-size:.78rem;box-shadow:none}
.btn-save:hover{background:rgba(255,255,255,.18)}
.btn-save:active,.icon-btn:active,.btn-ok:active{transform:translateY(1px)}

/* NAV */
nav{
  position:sticky;
  top:0;
  z-index:5;
  background:rgba(255,253,244,.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  gap:4px;
  padding:8px max(10px,calc((100vw - 1120px)/2 + 10px));
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
nav button{
  min-width:0;
  flex:0 0 auto;
  background:transparent;
  border:1px solid transparent;
  padding:10px 12px;
  border-radius:8px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:.82rem;
  font-weight:850;
  transition:background .15s,color .15s,border-color .15s;
}
nav button.active{color:var(--blue);background:#fff;border-color:var(--border);box-shadow:0 6px 18px rgba(0,39,118,.08)}

/* CONTENT */
.tab{display:none;position:relative;z-index:1;padding:18px 14px 34px;max-width:1120px;margin:0 auto}
.tab.active{display:block}
.panel{background:rgba(255,253,244,.86);border:1px solid rgba(220,229,216,.9);border-radius:8px;padding:14px;box-shadow:var(--shadow)}
.card{background:var(--surface-2);border-radius:8px;border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,39,118,.06)}
.card-title{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin:4px 0 12px;font-weight:950}
.microcopy{font-size:.78rem;color:var(--muted);line-height:1.5}

/* HOME */
.home-dashboard{display:grid;gap:14px}
.home-spotlight{
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:minmax(0,1.26fr) minmax(300px,.74fr);
  gap:14px;
  padding:16px;
  border:1px solid rgba(255,255,255,.48);
  border-radius:8px;
  color:#fff;
  background:
    linear-gradient(135deg,rgba(0,39,118,.96),rgba(0,95,47,.94)),
    linear-gradient(90deg,rgba(255,223,0,.16),transparent);
  box-shadow:0 22px 56px rgba(0,39,118,.22);
}
.home-spotlight:after{
  content:"";
  position:absolute;
  inset:auto 0 0 auto;
  width:58%;
  height:100%;
  background:linear-gradient(115deg,transparent 0 34%,rgba(255,255,255,.12) 34% 35%,transparent 35% 100%);
  pointer-events:none;
}
.home-copy,.home-prize-board{position:relative;z-index:1;min-width:0}
.home-kicker,.section-kicker{
  font-size:.68rem;
  text-transform:uppercase;
  letter-spacing:1.2px;
  font-weight:950;
}
.home-actions{display:flex;gap:8px;flex-wrap:wrap}
.home-link-btn,.home-ghost-btn{
  border:1px solid rgba(255,255,255,.28);
  border-radius:8px;
  padding:10px 12px;
  font-size:.78rem;
  font-weight:950;
  white-space:nowrap;
}
.home-link-btn{background:var(--yellow);color:var(--blue);border-color:var(--yellow)}
.home-ghost-btn{background:rgba(255,255,255,.1);color:#fff}
.home-metrics{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(260px,.92fr);gap:8px;margin-top:12px;align-items:stretch}
.home-metric-stack{display:grid;gap:8px;min-width:0}
.home-metric{
  border:1px solid rgba(255,255,255,.18);
  border-radius:8px;
  padding:11px;
  background:rgba(255,255,255,.1);
  min-width:0;
}
.home-metric strong{display:block;font-size:1.3rem;line-height:1;font-weight:950;color:#fff}
.home-metric span{display:block;margin-top:5px;font-size:.65rem;text-transform:uppercase;letter-spacing:.55px;color:rgba(255,255,255,.76);font-weight:900}
.home-metric small{display:block;margin-top:7px;font-size:.71rem;line-height:1.4;color:rgba(255,255,255,.82);font-weight:750}
.home-metric.progress-metric{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  gap:9px;
}
.home-metric.progress-metric span{margin-top:0}
.progress-metric-main{
  width:100%;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
}
.progress-metric-ratio{
  display:block;
  font-size:1.92rem;
  letter-spacing:0;
  line-height:1;
}
.progress-metric-percent{
  display:block;
  color:#fff;
  font-size:1.2rem;
  font-weight:950;
  line-height:1;
  text-align:right;
}
.progress-metric-bar{
  position:relative;
  width:100%;
  height:7px;
  overflow:hidden;
  border-radius:999px;
  background:rgba(255,255,255,.13);
}
.progress-metric-bar:before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:var(--progress);
  border-radius:inherit;
  background:var(--yellow);
}
.progress-metric-foot{
  width:100%;
  margin-top:auto;
  padding-top:1px;
  border-top:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.8);
  font-size:.72rem;
  font-weight:850;
  line-height:1.4;
  text-align:right;
}
.home-metric.compact-insight{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:4px;
}
.home-metric.compact-insight span{margin-top:0}
.home-metric strong.compact-insight-value{
  font-size:1.36rem;
  line-height:1.05;
}
.home-metric strong.position-value{
  display:inline-block;
  margin-top:7px;
  font-size:1.58rem;
  line-height:1;
  font-weight:950;
  color:#fff;
}
.home-metric strong.position-value.top-1{color:var(--gold)}
.home-metric strong.position-value.top-2{color:var(--silver)}
.home-metric strong.position-value.top-3{color:var(--bronze)}
.position-help{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
.metric-inline-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  padding:6px 10px;
  background:rgba(255,255,255,.12);
  color:#fff;
  font-size:.7rem;
  font-weight:900;
}
.home-copy-footer{margin-top:10px}
.metric-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(255,255,255,.28);
  border-radius:999px;
  padding:7px 10px;
  background:rgba(255,255,255,.1);
  color:#fff;
  font-size:.7rem;
  font-weight:900;
}
.prize-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.prize-head .home-copy-footer{
  margin-top:0;
  flex-shrink:0;
}
.home-prize-board{
  align-self:stretch;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:12px;
  padding:14px;
  border:1px solid rgba(255,255,255,.34);
  border-radius:8px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  min-width:0;
}
.prize-total .label{font-size:.66rem;text-transform:uppercase;letter-spacing:1px;font-weight:950;color:rgba(255,255,255,.76)}
.prize-total .value{margin-top:5px;font-size:1.6rem;line-height:1.05;font-weight:950;color:#fff}
.prize-total .note{margin-top:6px;font-size:.72rem;line-height:1.45;color:rgba(255,255,255,.72)}
.prize-split{display:grid;gap:10px}
.prize-row{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:10px 0;
  border-top:1px solid rgba(255,255,255,.16);
  font-size:.82rem;
  min-width:0;
}
.prize-rank{
  width:auto;
  height:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.72rem;
  line-height:1;
  flex-shrink:0;
  background:transparent;
  border:0;
  box-shadow:none;
}
.prize-rank.silver,.prize-rank.bronze{font-size:1.95rem}
.prize-copy{min-width:0}
.prize-copy strong{display:block;font-size:.92rem;color:#fff;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prize-copy span{display:block;margin-top:4px;font-size:.66rem;color:rgba(255,255,255,.72);font-weight:850}
.prize-score{text-align:right;min-width:52px}
.prize-score strong{display:block;font-size:1.1rem;color:#fff;line-height:1;font-weight:950}
.prize-score span{display:block;margin-top:3px;font-size:.58rem;text-transform:uppercase;letter-spacing:.4px;color:rgba(255,255,255,.68);font-weight:900}
.home-layout{display:grid;grid-template-columns:minmax(0,.94fr) minmax(340px,1.06fr);gap:14px;align-items:stretch;min-width:0}
.home-side{display:grid;gap:14px}
.home-section{
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 16px 42px rgba(0,39,118,.1);
  min-width:0;
}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.section-kicker{color:var(--green);margin-bottom:5px}
.section-head h2{font-size:1rem;line-height:1.12;font-weight:950;color:var(--text)}
.section-sub{font-size:.76rem;color:var(--muted);line-height:1.45;margin-top:4px}
.mini-action{
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  color:var(--blue);
  padding:8px 10px;
  font-size:.74rem;
  font-weight:950;
  white-space:nowrap;
}
.mini-action:hover{border-color:#b8c7df;background:#f7fbff}
.ranking-compact{min-height:0}
.home-ranking-full .lb-row:last-child{margin-bottom:0}
.full-ranking-list{display:grid;gap:8px}
.mini-ranking-list{display:grid;gap:7px;max-height:384px;overflow:auto;padding-right:2px;scrollbar-width:thin}
.mini-rank-row{
  display:grid;
  grid-template-columns:34px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:9px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
}
.mini-rank-row.top-1{background:linear-gradient(110deg,#fff8d8,#fffdf4 46%,#fff);border-color:#f5c542}
.mini-rank-row.top-2{background:linear-gradient(110deg,#f4f7fb,#fff 48%,#fff);border-color:#b9c3cf}
.mini-rank-row.top-3{background:linear-gradient(110deg,#fff0df,#fff 48%,#fff);border-color:#c98747}
.mini-rank{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eef3f8;
  color:var(--muted);
  font-size:.72rem;
  font-weight:950;
}
.mini-rank.gold,.r1{
  background:
    radial-gradient(circle at 30% 28%,rgba(255,247,196,.95) 0 18%,transparent 19%),
    linear-gradient(145deg,#fff6bf 0%,#f7d45e 32%,#d49b16 72%,#8a5c00 100%);
  color:#6d4700;
  border:1px solid rgba(255,227,132,.85);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45), inset 0 -2px 6px rgba(0,0,0,.12);
}
.mini-rank.silver,.r2{
  background:
    radial-gradient(circle at 30% 28%,rgba(255,255,255,.95) 0 18%,transparent 19%),
    linear-gradient(145deg,#ffffff 0%,#dce4ee 34%,#a1adbb 70%,#657283 100%);
  color:#3e4b5d;
  border:1px solid rgba(230,238,247,.9);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45), inset 0 -2px 6px rgba(0,0,0,.12);
}
.mini-rank.bronze,.r3{
  background:
    radial-gradient(circle at 30% 28%,rgba(255,228,202,.92) 0 18%,transparent 19%),
    linear-gradient(145deg,#ffd4b0 0%,#d89255 35%,#aa5a24 72%,#6f3111 100%);
  color:#fff7f0;
  border:1px solid rgba(255,194,145,.78);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.42), inset 0 -2px 6px rgba(0,0,0,.12);
}
.mini-name{min-width:0;font-size:.88rem;font-weight:950}
.mini-name span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;color:var(--muted);font-size:.66rem;font-weight:850}
.mini-points{text-align:right;min-width:48px}
.mini-points strong{display:block;color:var(--green);font-size:1.15rem;line-height:1;font-weight:950}
.mini-points span{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:900;letter-spacing:.35px}
.fixture-list{display:grid;gap:10px;flex:1}
.fixture-row{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:12px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  box-shadow:0 8px 20px rgba(0,39,118,.05);
}
.fixture-meta{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.fixture-date-inline{
  width:100%;
  display:flex;
  align-items:center;
  gap:8px;
  line-height:1.1;
}
.fixture-date-inline .fixture-weekday{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:0 9px;
  border-radius:999px;
  background:#eef5ff;
  color:var(--blue);
  font-size:.61rem;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.55px;
}
.fixture-date-inline .fixture-weekday-short{display:none}
.fixture-date-inline .fixture-day{
  font-size:.68rem;
  font-weight:900;
  color:#4f5f79;
  text-transform:uppercase;
  letter-spacing:.4px;
}
.fixture-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:6px 10px;
  border-radius:999px;
  background:#f4f8ff;
  color:var(--blue);
  font-size:.75rem;
  font-weight:950;
  line-height:1;
}
.fixture-phase{
  justify-self:end;
  font-size:.66rem;
  text-transform:uppercase;
  letter-spacing:.6px;
  color:var(--muted);
  font-weight:900;
  white-space:nowrap;
}
.fixture-match{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  align-items:center;
  gap:6px;
  min-width:0;
}
.fixture-row .team{
  font-size:.96rem;
  font-weight:850;
}
.fixture-row .team.r{justify-content:flex-end;text-align:right}
.fixture-row .flag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:1.15em;
  text-align:center;
}
.fixture-row .team-name{
  white-space:nowrap;
  line-height:1.2;
}
.fixture-vs{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:34px;
  min-height:34px;
  padding:0 7px;
  border-radius:999px;
  background:#f2f5f9;
  color:var(--muted);
  font-size:.72rem;
  font-weight:950;
  line-height:1;
}
.fixture-row.is-result .fixture-vs{
  min-width:58px;
  background:#edf9f0;
  color:var(--green);
}
.fixture-empty{
  padding:14px;
  border:1px dashed #c9d5c7;
  border-radius:8px;
  background:#fbfff8;
  color:var(--muted);
  font-size:.8rem;
  font-weight:850;
}
.brazil-table{display:grid;gap:6px;overflow-x:auto;padding-bottom:2px;flex:1}
.brazil-row{
  display:grid;
  grid-template-columns:22px minmax(128px,1fr) 42px repeat(7,31px);
  gap:3px;
  align-items:center;
  padding:8px 8px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  font-size:.75rem;
  min-width:492px;
}
.brazil-row.head{
  background:#f2f7ef;
  color:var(--muted);
  font-size:.58rem;
  text-transform:uppercase;
  letter-spacing:.45px;
  font-weight:950;
}
.brazil-row.brazil-highlight{border-color:#a7d8b4;background:#f3fff5}
.brazil-row .team-cell{font-size:.78rem;gap:5px}
.brazil-row strong{color:var(--green);font-weight:950}
.brazil-next{
  margin-top:10px;
  padding:10px;
  border:1px solid #d8e5ff;
  border-radius:8px;
  background:#f7fbff;
  font-size:.78rem;
  color:#31415f;
  line-height:1.45;
}
.home-insights{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.home-insights.single{grid-template-columns:1fr}
.quick-insight{
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:13px;
  box-shadow:0 10px 26px rgba(0,39,118,.07);
}
.quick-insight .label{font-size:.62rem;text-transform:uppercase;letter-spacing:.65px;color:var(--muted);font-weight:950}
.quick-insight .value{margin-top:6px;font-size:1.18rem;color:var(--blue);font-weight:950;line-height:1.05}
.quick-insight .note{margin-top:5px;font-size:.72rem;color:var(--muted);line-height:1.4}
.position-insight{
  background:linear-gradient(135deg,#fffef7 0%,#f4fbff 100%);
  border-color:#d8e5ff;
  box-shadow:0 12px 30px rgba(0,39,118,.08);
}
.position-insight .value{color:var(--green)}
.position-insight .note strong{color:var(--text)}
.insight-action{margin-top:12px}

/* RANKING */
.ranking-page{display:grid;gap:14px}
.chart-shell{
  display:grid;
  gap:12px;
  background:#fff;
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 14px 34px rgba(0,39,118,.07);
}
.chart-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.chart-presets,.chart-legend{display:flex;gap:8px;flex-wrap:wrap}
.chart-toggle.active{background:var(--blue);border-color:var(--blue);color:#fff}
.chart-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 11px;
  background:#fff;
  color:var(--muted);
  font-size:.74rem;
  font-weight:900;
}
.chart-chip.active{border-color:transparent;color:#fff;box-shadow:0 10px 20px rgba(0,39,118,.16)}
.chart-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-stage{
  border:1px solid #e5edf8;
  border-radius:8px;
  padding:12px;
  background:linear-gradient(180deg,#fbfdff 0%,#f6fbf8 100%);
}
.chart-stage svg{display:block;width:100%;height:auto}
.chart-axis{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:.68rem;color:var(--muted);font-weight:850}
.chart-empty{
  padding:18px;
  border:1px dashed #c7d7f0;
  border-radius:8px;
  background:#f7fbff;
  font-size:.8rem;
  color:#41516d;
  font-weight:850;
}
.ranking-grid{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr);gap:14px;align-items:start}
.ranking-side{display:grid;gap:14px;min-width:0}
.ranking-card{
  background:#fff;
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 14px 34px rgba(0,39,118,.06);
}
.ranking-card h3{font-size:1rem;line-height:1.1;color:var(--text);font-weight:950}
.ranking-card p{margin-top:6px;font-size:.76rem;color:var(--muted);line-height:1.45}
.ranking-card .mini-action{margin-top:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.stat-box{background:linear-gradient(180deg,#fff,#fbfff3);border-radius:8px;border:1px solid var(--border);padding:12px;text-align:center}
.stat-box .bv{font-size:1.45rem;font-weight:950;color:var(--blue)}
.stat-box .bl{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:850;letter-spacing:.5px}
.lb-row{display:grid;grid-template-columns:auto minmax(120px,1fr) 1fr auto;align-items:center;gap:12px;padding:12px;border-radius:8px;margin-bottom:8px;background:#fff;border:1px solid var(--border);box-shadow:0 8px 18px rgba(0,39,118,.05)}
.podium-row{position:relative;padding:15px 14px;border-width:2px;box-shadow:0 16px 34px rgba(0,39,118,.12)}
.podium-row .pname{font-size:1.06rem}
.podium-row .pts{font-size:1.72rem}
.podium-row.top-1{background:linear-gradient(110deg,#fff8d8,#fffdf4 46%,#fff);border-color:#f5c542}
.podium-row.top-2{background:linear-gradient(110deg,#f4f7fb,#fff 48%,#fff);border-color:#b9c3cf}
.podium-row.top-3{background:linear-gradient(110deg,#fff0df,#fff 48%,#fff);border-color:#c98747}
.rank{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:950;font-size:.82rem;flex-shrink:0}
.podium-row .rank{width:42px;height:42px;font-size:.95rem;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.ro{background:#eef3f8;color:var(--muted)}
.pname{font-weight:900;font-size:.98rem;min-width:0}
.lb-row.me{
  border-color:#9fc5ff;
  background:linear-gradient(110deg,#f7fbff,#ffffff 48%,#f7fbff);
  box-shadow:0 12px 28px rgba(0,39,118,.1);
}
.pstats{display:flex;gap:12px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.stat{
  display:grid;
  gap:2px;
  min-width:60px;
  padding:0;
  border:0;
  background:transparent;
  text-align:left;
}
.sv{font-size:1rem;font-weight:950;line-height:1;color:var(--text)}
.sl{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:900;letter-spacing:.45px}
.pts{
  min-width:44px;
  text-align:right;
  font-size:1.85rem;
  font-weight:950;
  color:var(--green);
  line-height:1;
}
.crav-stat .sv{color:#9a7200}
.corr-stat .sv{color:var(--blue)}
.inv-stat .sv{color:var(--red)}

/* GROUP TABLES */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(265px,1fr));gap:12px}
.group-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 22px rgba(0,39,118,.06)}
.group-title{display:flex;justify-content:space-between;align-items:center;background:#f2f7ef;padding:10px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;font-weight:950;color:var(--blue)}
.group-table{width:100%;border-collapse:collapse;font-size:.78rem}
.group-table th,.group-table td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:center}
.group-table th{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:900;background:#fbfdf8}
.group-table td:first-child,.group-table th:first-child{text-align:left}
.group-table tr:last-child td{border-bottom:0}
.team-cell{display:flex;align-items:center;gap:6px;min-width:0;font-weight:850}
.team-cell .team-name{white-space:normal}
.group-table .pts-cell{font-weight:950;color:var(--green)}
.qual-row{background:#f3fff5}
.third-row{background:#fffdf0}
.pos-pill{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#eef3f8;color:var(--muted);font-size:.68rem;font-weight:950}
.qual-row .pos-pill{background:#d1fae5;color:#065f46}
.third-row .pos-pill{background:#fff0a6;color:#725400}

/* FILTERS */
.fbar,.psel,.section-switch{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fbtn,.pbtn,.seg-btn{
  padding:8px 11px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:#fff;
  font-size:.76rem;
  font-weight:850;
  cursor:pointer;
  color:var(--muted);
}
.fbtn.active,.pbtn.active,.seg-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pbtn.active{background:var(--green);border-color:var(--green)}
.section-switch{padding:4px;background:#eaf2e7;border:1px solid var(--border);border-radius:10px;width:max-content;max-width:100%}
.seg-btn{border-color:transparent;background:transparent}
.seg-btn.active{background:#fff;color:var(--blue);box-shadow:0 5px 16px rgba(0,39,118,.08)}

/* GAMES */
.phase-hdr{display:flex;align-items:center;gap:8px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:#fff;background:linear-gradient(90deg,var(--blue),var(--green));padding:8px 11px;border-radius:8px;margin:16px 0 8px;font-weight:950}
.game-row,.pal-row{display:grid;grid-template-columns:64px minmax(0,1fr) auto;align-items:center;gap:10px;padding:10px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:7px}
.gid{font-size:.68rem;color:var(--muted);font-weight:900}
.gteams{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:8px;min-width:0}
.team{display:flex;align-items:center;gap:7px;min-width:0;font-size:.86rem;font-weight:760}
.team.r{justify-content:flex-end;text-align:right}
.team.muted{color:var(--muted);font-weight:650}
.gteams .team,.pgn .team,.fixture-match .team{width:max-content;max-width:100%}
.gteams .team.r,.pgn .team.r,.fixture-match .team.r{justify-self:end}
.gteams .team:not(.r),.pgn .team:not(.r),.fixture-match .team:not(.r){justify-self:start}
.team-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flag{font-size:1.16rem;line-height:1;filter:saturate(1.08)}
.score-wrap{display:flex;align-items:center;gap:5px;justify-content:center}
.result-stack{display:flex;flex-direction:column;align-items:center;gap:4px}
.ko-advancer{display:flex;flex-direction:column;gap:4px;min-width:188px}
.ko-advancer.hidden{display:none}
.ko-advancer label,.advancer-badge{font-size:.62rem;font-weight:950;letter-spacing:.45px;text-transform:uppercase;color:var(--green);text-align:center}
.ko-advancer.muted label{color:var(--muted)}
.ko-advancer .txt-select{height:34px;padding:5px 8px;font-size:.72rem;font-weight:850;text-align:left}
.pal-tiebreak{min-width:0;margin-top:6px}
.bracket-card .pal-tiebreak{margin:8px 0 0;width:100%}
.pass-options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px}
.pass-btn{
  border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--blue);
  min-height:34px;padding:5px 7px;font-size:.68rem;font-weight:950;line-height:1.12;
}
.pass-btn.active{background:#e7f8ed;border-color:#9be3b8;color:var(--green);box-shadow:0 4px 12px rgba(0,140,74,.08)}
.pass-btn:disabled{opacity:.55;cursor:not-allowed}
.advancer-badge{background:#e7f8ed;border:1px solid #b8ebcb;border-radius:999px;padding:3px 8px;text-transform:none;letter-spacing:0}
.result-detail{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.62rem;font-weight:900;color:var(--muted)}
.result-detail-line{background:#f7faf2;border:1px solid var(--border);border-radius:6px;padding:3px 7px;color:var(--text)}
.penalty-detail{display:flex;flex-direction:column;gap:3px;align-items:center;background:#f7faf2;border:1px solid var(--border);border-radius:6px;padding:4px 7px}
.penalty-detail strong{font-size:.64rem;color:var(--text)}
.penalty-row{display:grid;grid-template-columns:minmax(42px,1fr) auto;gap:6px;align-items:center;width:100%}
.penalty-team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.penalty-dots{display:flex;gap:3px;align-items:center;justify-content:flex-end}
.pen-dot{width:7px;height:7px;border-radius:999px;border:1px solid var(--border);background:#fff}
.pen-dot.made{background:var(--green);border-color:var(--green)}
.pen-dot.missed{background:var(--red);border-color:var(--red)}
.score-control{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;box-shadow:inset 0 1px 0 rgba(0,0,0,.02)}
.score-control input{width:42px;height:38px;border:0;text-align:center;font-size:.95rem;font-weight:950;color:var(--text);background:#fff}
.score-control input::-webkit-outer-spin-button,.score-control input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-control input[type=number]{appearance:textfield;-moz-appearance:textfield}
.step-btn{width:31px;height:38px;border:0;background:#eef4f0;color:var(--blue);font-size:1.1rem;font-weight:950}
.step-btn:hover{background:#e0ecff}
.ssep{color:var(--blue);font-weight:950;font-size:.95rem}
.btn-ok,.btn-x{border:none;border-radius:8px;font-weight:950;white-space:nowrap}
.btn-ok{background:var(--green);color:#fff;padding:10px 12px}
.btn-ok:disabled{opacity:.45;cursor:not-allowed}
.btn-x{background:#fee2e2;color:var(--red);padding:9px 10px}
.res{display:flex;align-items:center;gap:4px;font-weight:950;font-size:.94rem;flex-shrink:0}
.res .sc{background:var(--green);color:#fff;padding:4px 9px;border-radius:7px;min-width:28px;text-align:center}
.ko-note{background:#fffbe6;border:1px solid #f3df89;color:#725400;border-radius:8px;padding:10px 12px;font-size:.8rem;font-weight:750;margin-bottom:12px}

/* PALPITES — PREMIUM (compact) */
.pal-shell{display:grid;gap:14px}
.pal-hero{
  position:relative;
  overflow:hidden;
  border-radius:14px;
  padding:14px 16px;
  color:#fff;
  background:
    radial-gradient(110% 140% at 0% 0%,rgba(255,223,0,.18),transparent 55%),
    radial-gradient(120% 140% at 100% 100%,rgba(0,132,61,.5),transparent 60%),
    linear-gradient(135deg,#001b54 0%,#002776 45%,#004c2d 100%);
  box-shadow:0 18px 44px rgba(0,39,118,.24);
  border:1px solid rgba(255,255,255,.18);
}
.pal-hero:before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0 1px,transparent 1px 28px),
    radial-gradient(60% 80% at 80% 20%,rgba(255,223,0,.16),transparent 65%);
  mix-blend-mode:screen;opacity:.9;
}
.pal-hero-top{
  position:relative;display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:14px;align-items:center;
}
.pal-hero-title{display:flex;align-items:center;gap:12px;min-width:0}
.pal-hero-title h2{font-size:clamp(1.05rem,2.1vw,1.32rem);font-weight:950;letter-spacing:.2px;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pal-hero-title .kicker{font-size:.6rem;letter-spacing:1.1px;text-transform:uppercase;font-weight:950;color:var(--yellow);line-height:1;display:block;margin-bottom:4px}
.pal-hero-avatar{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:950;color:#1a1300;
  background:linear-gradient(135deg,#ffdf00,#f5c542);
  box-shadow:0 6px 14px rgba(0,0,0,.22);
}
.pal-hero-metrics{
  position:relative;display:flex;gap:6px;flex-wrap:nowrap;
  min-width:0;
}
.pal-metric{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:10px;padding:6px 10px;min-width:0;
  display:flex;flex-direction:column;align-items:flex-start;gap:1px;
}
.pal-metric .lbl{font-size:.54rem;text-transform:uppercase;letter-spacing:.8px;font-weight:900;opacity:.78;white-space:nowrap}
.pal-metric .val{font-size:1.05rem;font-weight:950;line-height:1.05;color:#fff;display:flex;align-items:baseline;gap:3px;white-space:nowrap}
.pal-metric .val small{font-size:.6rem;font-weight:800;opacity:.7;letter-spacing:.4px}
.pal-metric.accent{background:linear-gradient(135deg,rgba(255,223,0,.92),rgba(245,197,66,.82));color:#1a1300;border-color:rgba(255,255,255,.5);box-shadow:0 6px 14px rgba(255,223,0,.22)}
.pal-metric.accent .lbl,.pal-metric.accent .val{color:#1a1300}
.pal-progress-bar{position:relative;width:100%;height:4px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;margin-top:4px}
.pal-progress-fill{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--yellow),#9fffb6);border-radius:99px;transition:width .4s ease}

/* Hero bottom row: people + stages */
.pal-hero-bottom{
  position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;
  gap:10px;align-items:center;margin-top:12px;
}

/* Participant selector — compact pills */
.pal-people{
  display:flex;gap:6px;overflow-x:auto;padding:2px 2px 4px;
  scrollbar-width:thin;min-width:0;
}
.pal-people::-webkit-scrollbar{height:5px}
.pal-people::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:99px}
.pal-person{
  flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
  padding:5px 11px 5px 5px;border-radius:99px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-weight:850;font-size:.74rem;white-space:nowrap;
  cursor:pointer;transition:transform .15s,background .15s,border-color .15s;line-height:1;
}
.pal-person:hover{background:rgba(255,255,255,.18)}
.pal-person .avatar{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#ffdf00,#f5c542);color:#1a1300;
  display:flex;align-items:center;justify-content:center;
  font-size:.66rem;font-weight:950;letter-spacing:.3px;
  box-shadow:0 3px 8px rgba(0,0,0,.18);
}
.pal-person.active{background:#fff;color:var(--blue);border-color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.2)}
.pal-person.active .avatar{background:linear-gradient(135deg,var(--blue),var(--green));color:#fff}
.pal-person.self:after{content:"você";font-size:.5rem;font-weight:950;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:99px;background:rgba(255,223,0,.92);color:#1a1300;margin-left:2px}

/* Stage segmented — compact 3 stages */
.pal-stages{
  display:flex;gap:4px;flex-shrink:0;
  padding:4px;border-radius:11px;background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.16);
  min-width:0;
}
.pal-stage{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:8px;background:transparent;border:0;color:rgba(255,255,255,.78);
  font-size:.74rem;font-weight:900;cursor:pointer;transition:background .18s,color .18s;white-space:nowrap;
}
.pal-stage .ico{font-size:.95rem;line-height:1}
.pal-stage:hover{background:rgba(255,255,255,.08);color:#fff}
.pal-stage.active{background:#fff;color:var(--blue);box-shadow:0 6px 14px rgba(0,0,0,.18)}

/* Filter bar inside main panel */
.pal-filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.pal-filters .fbar{margin-bottom:0;flex:1;min-width:0}
.pal-stage-note{
  background:linear-gradient(135deg,#fffbe6,#fff7c2);
  border:1px solid #f3df89;color:#725400;
  border-radius:10px;padding:11px 13px;font-size:.78rem;font-weight:800;margin-bottom:12px;
  display:flex;gap:9px;align-items:flex-start;
}
.pal-stage-note .ic{font-size:.95rem;line-height:1.2}

/* ==== PREMIUM FIXTURE CARD (palpite-card) ==== */
.pal-card{
  position:relative;
  display:grid;
  grid-template-columns:88px minmax(0,1fr) auto;
  gap:14px;align-items:center;
  background:linear-gradient(180deg,#fff,#fbfdf8);
  border:1px solid var(--border);
  border-radius:12px;
  padding:11px 14px;
  margin-bottom:8px;
  box-shadow:0 6px 18px rgba(0,39,118,.05);
  transition:transform .15s,box-shadow .2s,border-color .2s;
  min-width:0;
}
.pal-card:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(0,39,118,.08);border-color:#cbd9eb}
.pal-card.is-live{border-color:#7ed1a1;background:linear-gradient(180deg,#f4fff7,#fff)}
.pal-card.is-locked{background:linear-gradient(180deg,#fbfcfe,#f5f7fa)}
.pal-card.is-waiting{background:linear-gradient(180deg,#fafbfd,#fff);border-style:dashed}
.pal-card.is-hit{border-color:#7ed1a1;background:linear-gradient(180deg,#f3fff6,#fff)}

.pal-card-meta{
  display:flex;flex-direction:column;align-items:flex-start;gap:5px;min-width:0;
}
.pal-card-date{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 9px;border-radius:8px;
  background:linear-gradient(135deg,var(--blue),#003a9e);color:#fff;
  font-size:.7rem;font-weight:950;letter-spacing:.2px;line-height:1;
  box-shadow:0 4px 10px rgba(0,39,118,.16);
}
.pal-card-date .wd{font-size:.55rem;text-transform:uppercase;letter-spacing:.6px;opacity:.85;font-weight:900}
.pal-card-date .dm{font-weight:950}
.pal-card-time{
  font-size:.7rem;font-weight:900;color:var(--muted);letter-spacing:.3px;
  display:inline-flex;align-items:center;gap:4px;
}
.pal-card-time:before{content:"";width:5px;height:5px;border-radius:50%;background:#a3aab6;display:inline-block}
.pal-card.is-live .pal-card-time:before{background:var(--green);animation:livePulse 1.4s ease-in-out infinite}
.pal-card.is-live .pal-card-time{color:var(--green-2)}
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.pal-card-gid{
  font-size:.55rem;letter-spacing:.6px;font-weight:900;
  color:#a3aab6;text-transform:uppercase;line-height:1;
}

.pal-card-body{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  align-items:center;gap:10px;min-width:0;
}
.pal-card-team{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:0;
  font-size:.82rem;font-weight:850;color:var(--text);text-align:center;
  padding:2px 4px;
}
.pal-card-team .flag{
  font-size:2.6rem;line-height:1;
  filter:saturate(1.08) drop-shadow(0 3px 6px rgba(0,0,0,.12));
  flex-shrink:0;
}
.pal-card-team .nm{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;max-width:100%;
  letter-spacing:.1px;
}
.pal-card-team.muted{color:var(--muted);font-weight:700}
.pal-card-team.muted .flag{opacity:.55}

.pal-card-score{
  display:flex;align-items:center;gap:7px;flex-shrink:0;
}
.pal-card-score .ssep{color:var(--muted);font-weight:950;font-size:.92rem}
.pal-card-score .score-control{box-shadow:0 4px 10px rgba(0,39,118,.08)}
.pal-card-status{
  font-size:.58rem;font-weight:900;letter-spacing:.6px;text-transform:uppercase;
  color:var(--muted);text-align:center;margin-top:4px;
}
.pal-card-status.live{color:var(--green-2)}
.pal-card-status.locked{color:#a3aab6}

.pal-card-result{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  margin-top:3px;font-size:.65rem;font-weight:900;color:var(--muted);
}
.pal-card-result .real{
  display:inline-flex;gap:5px;align-items:center;background:#f7faf2;border:1px solid var(--border);
  padding:3px 7px;border-radius:6px;color:var(--text);font-weight:950;font-size:.7rem;
}
.pal-card-result .result-detail{font-size:.58rem}
.pal-card-result .penalty-detail{max-width:220px}

.pal-card-badge{
  display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:50px;
}
.pal-card-badge .sbadge{
  width:34px;height:34px;border-radius:11px;font-size:.78rem;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:950;letter-spacing:.2px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.pal-card-badge .lbl{font-size:.5rem;font-weight:900;letter-spacing:.55px;text-transform:uppercase;color:var(--muted)}

/* Score badges (reused) */
.sbadge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:.68rem;font-weight:950;flex-shrink:0}
.b3{background:linear-gradient(135deg,#a7f3c8,#22c55e);color:#053822}
.b1{background:linear-gradient(135deg,#bfd3ff,#3b82f6);color:#0c2e75}
.bn2{background:linear-gradient(135deg,#ffc8c6,#ef4444);color:#5a0e0e}
.b0{background:linear-gradient(135deg,#e5e7eb,#cbd5e1);color:#475569}
.bem{background:#f3f4f6;color:#a3aab6;box-shadow:none}

/* ==== KNOCKOUT BRACKET ==== */
.bracket-wrap{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1.04fr) minmax(0,.96fr) minmax(0,.96fr) minmax(0,1.2fr) minmax(0,.96fr) minmax(0,.96fr) minmax(0,1.04fr);
  align-items:start;
  gap:clamp(10px,1.2vw,18px);
  width:100%;
  min-width:0;
  min-height:620px;
  padding:18px 8px 12px;
}
.bracket-col{
  position:relative;
  min-width:0;
  min-height:590px;
}
.bracket-col-head{
  position:absolute;top:0;left:0;right:0;
  font-size:.58rem;font-weight:900;letter-spacing:.8px;text-transform:uppercase;
  color:var(--blue);text-align:center;
  padding:5px 0 8px;border-bottom:1.5px dashed #cfdcf0;
}
.bracket-card{
  position:relative;
  border:1.5px solid var(--border);background:#fff;border-radius:10px;
  padding:6px 8px;display:flex;flex-direction:column;gap:4px;
  box-shadow:0 4px 12px rgba(0,39,118,.06);
  transition:transform .15s,box-shadow .2s,border-color .2s;
  min-width:0;
}
.bracket-card:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,39,118,.1);border-color:#cbd9eb}
.bracket-card.waiting{background:#fafbfd;border-style:dashed;opacity:.85}
.bracket-card.hit{border-color:#7ed1a1;background:linear-gradient(180deg,#f3fff6,#fff)}
.bracket-card.live{border-color:#7ed1a1;background:linear-gradient(180deg,#f7fff9,#fff)}
.bracket-card.final{border-color:#f0d77e;background:linear-gradient(180deg,#fffaea,#fff);box-shadow:0 12px 28px rgba(245,197,66,.18)}
.bracket-card .bk-meta{
  display:flex;justify-content:space-between;align-items:center;gap:6px;
  font-size:.5rem;font-weight:900;letter-spacing:.45px;color:var(--muted);text-transform:uppercase;
}
.bracket-card .bk-meta span:first-child{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bracket-card .bk-meta .date{color:var(--blue);font-weight:950;white-space:nowrap;flex-shrink:0;text-align:right}
.bracket-card .bk-row{
  display:grid;grid-template-columns:minmax(0,1fr) 38px;
  align-items:center;gap:6px;font-size:.74rem;font-weight:850;color:var(--text);min-width:0;
}
.bracket-card .bk-row.muted{color:var(--muted);font-weight:700}
.bracket-card .bk-row .nm{
  display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;
}
.bracket-card .bk-row .nm .flag{font-size:.95rem;flex-shrink:0}
.bracket-card .bk-row .nm .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.bracket-card .bk-row input{
  width:100%;height:26px;border:1.2px solid var(--border);border-radius:6px;
  text-align:center;font-size:.78rem;font-weight:950;color:var(--text);background:#fff;
  -moz-appearance:textfield;
}
.bracket-card .bk-row input::-webkit-outer-spin-button,
.bracket-card .bk-row input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.bracket-card .bk-row input:disabled{background:#f4f7f5;color:#8792a3}
.bracket-card .bk-divider{height:1px;background:#eef2f7}
.bracket-card .bk-badge{
  position:absolute;top:-7px;right:8px;
  font-size:.55rem;font-weight:950;letter-spacing:.35px;
  padding:2px 7px;border-radius:99px;color:#fff;
  background:linear-gradient(135deg,var(--blue),#003a9e);
  box-shadow:0 4px 10px rgba(0,39,118,.18);
}
.bracket-card.hit .bk-badge{background:linear-gradient(135deg,#22c55e,#047857)}
.bracket-card.final .bk-badge{background:linear-gradient(135deg,#f5c542,#b48400);color:#3a2700}

.bracket-col > .bracket-card,
.bracket-final-col > .bk-final-top,
.bracket-final-col > .bracket-third-card{
  position:absolute;
  left:0;
  right:0;
}
.bracket-wrap > .bracket-col:nth-child(1) > .bracket-card:nth-of-type(2),
.bracket-wrap > .bracket-col:nth-child(7) > .bracket-card:nth-of-type(2){top:52px}
.bracket-wrap > .bracket-col:nth-child(1) > .bracket-card:nth-of-type(3),
.bracket-wrap > .bracket-col:nth-child(7) > .bracket-card:nth-of-type(3){top:158px}
.bracket-wrap > .bracket-col:nth-child(1) > .bracket-card:nth-of-type(4),
.bracket-wrap > .bracket-col:nth-child(7) > .bracket-card:nth-of-type(4){top:336px}
.bracket-wrap > .bracket-col:nth-child(1) > .bracket-card:nth-of-type(5),
.bracket-wrap > .bracket-col:nth-child(7) > .bracket-card:nth-of-type(5){top:442px}
.bracket-wrap > .bracket-col:nth-child(2) > .bracket-card:nth-of-type(2),
.bracket-wrap > .bracket-col:nth-child(6) > .bracket-card:nth-of-type(2){top:105px}
.bracket-wrap > .bracket-col:nth-child(2) > .bracket-card:nth-of-type(3),
.bracket-wrap > .bracket-col:nth-child(6) > .bracket-card:nth-of-type(3){top:389px}
.bracket-wrap > .bracket-col:nth-child(3) > .bracket-card:nth-of-type(2),
.bracket-wrap > .bracket-col:nth-child(5) > .bracket-card:nth-of-type(2){top:247px}

.bracket-final-col{
  grid-column:4;
  min-height:590px;
}
.bracket-final-col > .bk-final-top{
  top:166px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.bracket-final-col .bracket-col-head{
  position:static;
  width:100%;
}
.bracket-final-col > .bracket-card.final{
  top:242px;
  left:3px;
  right:3px;
  width:auto;
  border-width:2px;
  padding:8px 10px;
}
.bracket-final-col > .bracket-third-card{
  top:358px;
  left:14px;
  right:14px;
}
.bracket-trophy{
  text-align:center;font-size:1.8rem;line-height:1;
  filter:drop-shadow(0 6px 12px rgba(245,197,66,.45));
  animation:trophyFloat 4s ease-in-out infinite;
}
@keyframes trophyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.bracket-third-card{
  background:linear-gradient(180deg,#fffdf9,#fff);
  border:1.5px dashed #e7d2bc;border-radius:12px;padding:9px;
  box-shadow:0 6px 14px rgba(201,135,71,.08);
}
.bracket-third-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;font-size:.6rem;font-weight:900;color:#9a6a41;
  letter-spacing:.5px;text-transform:uppercase;
}
.bracket-third-head .ic{font-size:.92rem}
.bracket-third-card .bracket-card{box-shadow:none}

.bracket-stage{
  background:rgba(255,253,244,.86);
  border:1px solid rgba(220,229,216,.9);
  border-radius:12px;padding:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
  scrollbar-width:thin;
}
.bracket-stage::-webkit-scrollbar{height:6px}
.bracket-stage::-webkit-scrollbar-thumb{background:#cbd9eb;border-radius:99px}

/* R32 separate compact grid */
.r32-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:8px;margin-top:8px;
}
.r32-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  margin:6px 0 4px;font-size:.66rem;font-weight:900;color:var(--blue);
  text-transform:uppercase;letter-spacing:.7px;
}
.r32-head .count{font-size:.6rem;color:var(--muted);font-weight:800}

/* Mobile / narrow knockout list (chronological) */
.ko-mobile-list{display:none;flex-direction:column;gap:16px}
.ko-mobile-section{display:flex;flex-direction:column;gap:8px}
.ko-mobile-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  font-size:.66rem;font-weight:900;color:var(--blue);
  text-transform:uppercase;letter-spacing:.7px;
  padding:6px 10px;border-radius:8px;
  background:linear-gradient(90deg,rgba(0,39,118,.08),rgba(0,132,61,.04));
}
.ko-mobile-head .count{font-size:.6rem;color:var(--muted);font-weight:800}
.ko-mobile-cards{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;
}
.ko-mobile-section.final-section .ko-mobile-head{
  background:linear-gradient(90deg,#fff4c8,#fff);color:#7a5600;
}
.ko-mobile-section.p3-section .ko-mobile-head{
  background:linear-gradient(90deg,#fff0df,#fff);color:#915221;
}

/* ===== PÓDIO — PREMIUM ===== */
.podio-shell{display:grid;gap:18px}
.podio-section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:4px}
.podio-section-head h3{font-size:1.05rem;font-weight:950;color:var(--text);letter-spacing:.2px}
.podio-section-head p{font-size:.78rem;color:var(--muted);margin-top:4px;line-height:1.5}
.podio-status-chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 11px;border-radius:99px;
  font-size:.7rem;font-weight:900;letter-spacing:.3px;
  background:#eef5ff;color:var(--blue);border:1px solid #d8e5ff;
}
.podio-status-chip.locked{background:#fff3e0;color:#a8550a;border-color:#ffd8a1}
.podio-status-chip .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.8}

.podium-cards{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;
}
.podium-card{
  position:relative;
  border-radius:14px;
  padding:16px 14px 14px;
  background:#fff;
  border:1px solid var(--border);
  box-shadow:0 14px 32px rgba(0,39,118,.08);
  overflow:hidden;
  display:flex;flex-direction:column;gap:11px;
  transition:transform .2s,box-shadow .2s;
}
.podium-card:before{
  content:"";position:absolute;left:0;top:0;right:0;height:5px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.85;
}
.podium-card .crown{
  position:absolute;top:-22px;right:-20px;font-size:5.2rem;opacity:.08;transform:rotate(18deg);
}
.podium-card .pos-line{display:flex;align-items:center;gap:9px;min-width:0}
.podium-medal{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.18rem;font-weight:950;color:#fff;
  background:linear-gradient(135deg,#888,#bbb);
  box-shadow:0 8px 16px rgba(0,0,0,.18);flex-shrink:0;
}
.podium-card .pos-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.podium-card .pos-info .lbl{font-size:.66rem;font-weight:900;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.podium-card .pos-info .ttl{font-size:1rem;font-weight:950;color:var(--text);line-height:1}
.podium-card .pts-pill{
  margin-left:auto;font-size:.7rem;font-weight:950;color:#fff;
  background:currentColor;padding:5px 10px;border-radius:99px;
  filter:saturate(1.1);
  flex-shrink:0;
}
.podium-card .pts-pill span{color:#fff}
.podium-card .country-input{display:flex;flex-direction:column;gap:6px}
.podium-card input{
  width:100%;border:1.6px solid var(--border);border-radius:10px;
  padding:11px 12px;font-size:.92rem;font-weight:850;background:#fff;text-align:left;
}
.podium-card input:focus{outline:none;border-color:currentColor;box-shadow:0 0 0 3px rgba(0,39,118,.12)}
.podium-card .country-display{
  display:flex;align-items:center;gap:9px;
  padding:11px 12px;border:1.6px dashed var(--border);border-radius:10px;
  font-size:.9rem;font-weight:900;color:var(--text);min-height:46px;background:#fafdf3;
}
.podium-card .country-display.empty{color:var(--muted);font-weight:700;font-style:italic;border-style:dashed}
.podium-card .country-display .flag{font-size:1.4rem}
.podium-card.gold{color:#b48400;background:linear-gradient(180deg,#fffaea 0%,#fff 60%);border-color:#f0d77e}
.podium-card.gold .podium-medal{background:linear-gradient(135deg,#fff1a8,#f5c542 60%,#b48400);color:#5a3d00;border:2px solid #fff1a8}
.podium-card.silver{color:#5f6c7d;background:linear-gradient(180deg,#f6f9fc 0%,#fff 60%);border-color:#cdd6e0}
.podium-card.silver .podium-medal{background:linear-gradient(135deg,#e7ecf2,#b9c3cf 60%,#7f8b9b);color:#fff}
.podium-card.bronze{color:#915221;background:linear-gradient(180deg,#fff4e9 0%,#fff 60%);border-color:#e3b793}
.podium-card.bronze .podium-medal{background:linear-gradient(135deg,#f3c79a,#c98747 60%,#7d4715);color:#fff}
.podium-card.fourth{color:var(--blue);background:linear-gradient(180deg,#eef4fb 0%,#fff 60%);border-color:#cfdcf0}
.podium-card.fourth .podium-medal{background:linear-gradient(135deg,#dbe7f6,var(--blue) 80%);color:#fff}

/* Locked / muted state */
.podium-card.locked .country-input input{background:#f6f8fa;color:#7c8693}
.podium-locked-note{
  margin-top:8px;font-size:.74rem;color:var(--muted);
  display:flex;gap:7px;align-items:center;
}

/* My pódio mini-summary */
.my-podio-summary{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:linear-gradient(135deg,#fff,#fbfff3);
  border:1px dashed #c7d7f0;border-radius:12px;padding:11px 14px;
  margin-top:14px;font-size:.8rem;font-weight:800;color:var(--text);
}
.my-podio-summary .label{color:var(--muted);font-weight:850;text-transform:uppercase;font-size:.65rem;letter-spacing:.7px}
.my-podio-summary .score-pill{
  background:var(--green);color:#fff;padding:6px 11px;border-radius:99px;font-weight:950;font-size:.78rem;
}
.my-podio-summary .score-pill.empty{background:#eef3f8;color:var(--muted)}

/* Participants podium leaderboard */
.podio-board{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  box-shadow:0 14px 32px rgba(0,39,118,.06);overflow:hidden;
}
.podio-board-head{
  padding:14px 16px;background:linear-gradient(135deg,#f7faf2,#fff);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;
}
.podio-board-head h3{font-size:1rem;font-weight:950;color:var(--text)}
.podio-board-head p{font-size:.76rem;color:var(--muted);margin-top:3px}
.podio-board-legend{display:flex;gap:8px;flex-wrap:wrap}
.podio-legend-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;font-size:.66rem;font-weight:900;color:var(--text);background:#f7faf2;border:1px solid var(--border)}
.podio-legend-chip .sw{width:9px;height:9px;border-radius:50%}
.podio-list{display:grid;gap:8px;padding:12px}
.podio-entry{
  display:grid;grid-template-columns:36px minmax(140px,1.05fr) minmax(0,2.2fr) auto;
  align-items:center;gap:14px;
  padding:11px 14px;border-radius:12px;
  background:#fff;border:1px solid var(--border);
  transition:transform .15s,box-shadow .2s,border-color .2s;
}
.podio-entry:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(0,39,118,.08);border-color:#cbd9eb}
.podio-entry.me{border-color:#9fc5ff;background:linear-gradient(110deg,#f7fbff,#fff 48%,#f7fbff)}
.podio-entry .pe-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:950;font-size:.78rem;
}
.podio-entry .pe-name{font-weight:900;font-size:.9rem;color:var(--text);min-width:0;display:flex;flex-direction:column;gap:2px}
.podio-entry .pe-name .you{font-size:.6rem;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--blue)}
.podio-entry .pe-picks{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;min-width:0}
.pe-pick{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  padding:6px 8px;border-radius:9px;background:#fafcff;border:1px solid #e5ecf6;
  font-size:.76rem;font-weight:850;color:var(--text);min-width:0;
}
.pe-pick .pos{font-size:.55rem;font-weight:900;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
.pe-pick .country{display:flex;align-items:center;gap:5px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.pe-pick .country .flag{font-size:1rem;flex-shrink:0}
.pe-pick .country .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pe-pick.hit{background:#d1fae5;border-color:#7ed1a1;color:#065f46}
.pe-pick.miss{background:#fff;border-color:#e5ecf6;color:var(--muted)}
.pe-pick.empty{background:#f6f8fa;border-style:dashed;color:#a3aab6}
.pe-pick.hit .pos{color:#04714b}
.podio-entry .pe-score{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-align:right;flex-shrink:0;
}
.podio-entry .pe-score .pts{font-size:1.35rem;font-weight:950;color:var(--green);line-height:1}
.podio-entry .pe-score.empty .pts{color:#a3aab6}

.api-test-list{display:grid;gap:14px}
.api-test-day{

}
.api-test-day-head{

}

.api-test-day-games{display:grid;gap:8px}
.api-test-game{
  position:relative;

.api-test-game.is-live.is-waiting-live{border-color:#a9dfc0;background:linear-gradient(180deg,#f7fff9,#fff)}
.api-test-game.is-live-only{grid-template-columns:108px minmax(0,1fr)}
.api-test-game.is-locked{background:linear-gradient(180deg,#fbfcfe,#f5f7fa)}
.api-test-game.is-hit{border-color:#7ed1a1;background:linear-gradient(180deg,#f3fff6,#fff)}
.api-test-game.is-saved{border-color:#9fc5ff;background:linear-gradient(180deg,#f7fbff,#fff)}

.api-test-game.is-live.is-waiting-live.is-saved{border-color:#a9dfc0;background:linear-gradient(180deg,#f7fff9,#fff)}
.api-test-meta{display:flex;flex-direction:column;align-items:flex-start;gap:5px;min-width:0}
.api-test-date{

  box-shadow:0 4px 10px rgba(0,39,118,.16);
}
.api-test-time{

}
.api-test-time:before{content:"";width:5px;height:5px;border-radius:50%;background:#a3aab6;display:inline-block}

.api-test-game.is-live .api-test-time{color:var(--green-2)}
.api-test-round,.api-test-status{font-size:.58rem;font-weight:900;letter-spacing:.55px;text-transform:uppercase;color:var(--muted);line-height:1.25}
.api-test-round{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.api-test-status{color:#a3aab6}
.api-test-body{
  display:grid;

}
.api-test-team{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;width:100%;min-width:0;font-size:.8rem;font-weight:850;color:var(--text);text-align:center;padding:2px 3px}
.api-test-team.away{justify-content:center;text-align:center}

.api-test-team span{

  max-width:112px;

  overflow:hidden;
}
.api-test-score-panel{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;max-width:236px;min-width:0;justify-self:center}
.api-test-live-panel{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.api-test-live-head{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;width:100%}
.api-test-live-pill{
  display:inline-flex;align-items:center;gap:5px;
  border:1px solid rgba(16,185,129,.32);border-radius:999px;
  background:#ecfdf5;color:#047857;
  padding:4px 8px;font-size:.55rem;font-weight:950;text-transform:uppercase;letter-spacing:.65px;line-height:1;
}

.api-test-live-clock{font-size:.55rem;font-weight:950;text-transform:uppercase;letter-spacing:.6px;color:#64748b;line-height:1}
.api-test-live-block{display:grid;justify-items:center;gap:3px;width:100%}
.api-test-live-label{font-size:.52rem;font-weight:950;text-transform:uppercase;letter-spacing:.72px;color:#64748b;line-height:1}
.api-test-score{display:flex;align-items:center;justify-content:center;gap:6px;font-weight:950;color:var(--blue)}
.api-test-score b{min-width:30px;text-align:center;border:1px solid var(--border);border-radius:8px;background:#f8fbf1;padding:4px 5px;font-size:.76rem}

.api-test-pick-score b{background:#eef5ff}
.api-test-live-empty{font-size:.52rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;text-align:center;line-height:1.2}
.api-test-live-stats{display:grid;gap:4px;width:100%;max-width:210px}
.api-test-cards{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:5px;width:100%;max-width:210px}
.api-test-card-side{display:flex;align-items:center;gap:4px;min-width:0}
.api-test-card-side.home{justify-content:flex-end}
.api-test-card-side.away{justify-content:flex-start}
.api-test-card-label{font-size:.5rem;font-weight:950;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center}
.api-test-card-token{display:inline-flex;align-items:center;gap:3px;padding:2px 5px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:.6rem;font-weight:950;color:var(--text);line-height:1}

.api-test-corner-token.is-unknown{color:#94a3b8;background:#f8fafc}
.api-test-pal-controls{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:nowrap;width:100%}
.api-test-pal-controls .score-control{box-shadow:0 4px 10px rgba(0,39,118,.08)}

.api-test-pal-actions{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:nowrap;width:100%}
.api-test-pal-actions .action-btn{min-width:0;flex:1 1 0;padding:8px 9px;font-size:.72rem;line-height:1;white-space:nowrap}
.api-test-pal-result{font-size:.58rem;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-align:center}
.api-test-pal-result.hit{color:var(--green)}
.api-test-pal-result.ok{color:var(--blue)}
.api-test-pal-result.bad{color:var(--red)}
.api-test-save-state{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  min-height:22px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid transparent;
  font-size:.58rem;
  font-weight:950;
  letter-spacing:.6px;
  text-transform:uppercase;
  text-align:center;
}
.api-test-save-state.saved{background:#eaf4ff;border-color:#bfd8ff;color:var(--blue)}
.api-test-save-state.editing{background:#fff8d7;border-color:#f0d899;color:#7a5600}
.api-test-badge{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:50px}
.api-test-badge .sbadge{
  width:34px;height:34px;border-radius:11px;font-size:.78rem;

  font-weight:950;letter-spacing:.2px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.api-test-badge .lbl{font-size:.5rem;font-weight:900;letter-spacing:.55px;text-transform:uppercase;color:var(--muted)}
.api-test-ranking{display:grid;gap:8px}
.api-test-rank-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid var(--border);border-radius:8px;background:#fff;padding:9px}
.api-test-rank-pos{width:30px;height:30px;display:grid;place-items:center;border-radius:8px;background:#eef5ff;color:var(--blue);font-weight:950}
.api-test-rank-name{font-weight:950;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.api-test-rank-meta{font-size:.68rem;color:var(--muted);margin-top:2px}
.api-test-rank-points{text-align:right;font-weight:950;color:var(--green)}
.api-test-rank-points span{display:block;font-size:.58rem;letter-spacing:.45px;text-transform:uppercase;color:var(--muted)}
.api-test-debug{max-height:250px;overflow:auto;border-radius:8px;background:#111827;color:#e5e7eb;padding:10px;font-size:.72rem;line-height:1.45;white-space:pre-wrap}
.api-test-debug-box{
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  overflow:hidden;
}
.api-test-debug-box summary{
  cursor:pointer;
  list-style:none;
  padding:12px;
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--blue);
  font-weight:950;
}
.api-test-debug-box summary::-webkit-details-marker{display:none}
.api-test-debug-box summary:after{
  content:"+";
  float:right;
  color:var(--muted);
  font-size:.9rem;
  line-height:1;
}
.api-test-debug-box[open] summary:after{content:"-"}
.api-test-debug-box .api-test-debug{margin:0;border-radius:0;max-height:260px}
.api-test-empty{border:1px dashed var(--border);border-radius:8px;background:#fff;padding:16px;text-align:center;color:var(--muted);font-weight:850}
.api-test-status-banner{margin-top:12px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:10px 12px;color:var(--muted);font-size:.78rem;font-weight:850;line-height:1.35}
.api-test-status-banner.ok{border-color:rgba(16,185,129,.28);background:#ecfdf5;color:#047857}
.api-test-status-banner.warn{border-color:rgba(245,158,11,.34);background:#fffbeb;color:#92400e}
.api-test-status-banner.err{border-color:rgba(239,68,68,.28);background:#fef2f2;color:#b91c1c}
/* ==== END BRASILEIRAO TEST LAB ==== */

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(100px);background:#172033;color:#fff;padding:10px 18px;border-radius:999px;font-size:.84rem;font-weight:850;transition:transform .3s;z-index:1000;pointer-events:none;box-shadow:0 12px 28px rgba(0,0,0,.22)}

function parseDateKey(key){
  const [y,m,d]=String(key).split("-").map(Number);
  return new Date(y,m-1,d);
}
function dateKeyFromDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function addDaysKey(key,days){
  const date=parseDateKey(key);
  date.setDate(date.getDate()+days);
  return dateKeyFromDate(date);
}
function todayKey(){return dateKeyFromDate(new Date());}
function scheduleFromUTC(utc){
  const parts=Object.fromEntries(BR_DATE_TIME_FORMAT.formatToParts(new Date(utc)).map(({type,value})=>[type,value]));
  return {date:`${parts.year}-${parts.month}-${parts.day}`,time:`${parts.hour}:${parts.minute}`};
}
function compareGameSchedule(a,b){
  return `${a.date||""} ${a.time||""} ${a.id}`.localeCompare(`${b.date||""} ${b.time||""} ${b.id}`,"pt-BR");
}
function formatGameDate(key){
  return new Intl.DateTimeFormat("pt-BR",{weekday:"short",day:"2-digit",month:"short"}).format(parseDateKey(key)).replace(/\./g,"");
}
function formatGameDateParts(key){
  const date=parseDateKey(key);
  const parts=Object.fromEntries(new Intl.DateTimeFormat("pt-BR",{weekday:"short",day:"2-digit",month:"short"}).formatToParts(date).map(({type,value})=>[type,value]));
  const weekdayLong=new Intl.DateTimeFormat("pt-BR",{weekday:"long"}).format(date).replace(/\./g,"");
  return {
    weekdayShort:(parts.weekday||"").replace(/\./g,""),
    weekdayLong,
    dayMonth:`${parts.day||""} ${parts.month||""}`.trim().replace(/\./g,"")

function loadState(){
  if(!CAN_USE_LOCAL_STORAGE) return migrateState(defaultState());
  const keys=[STORAGE_KEY,...OLD_STORAGE_KEYS];
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw) return migrateState(JSON.parse(raw));
    }catch(e){}
  }
  return migrateState(defaultState());
}

function migrateState(raw){
  const base=defaultState();
  const state={...base,...(raw||{})};
  state.results=state.results&&typeof state.results==="object"
    ? Object.fromEntries(Object.entries(state.results).map(([gameId,result])=>[gameId,normalizeResult(gameId,result)]).filter(([,result])=>result))
    : {};
  state.palpites=state.palpites&&typeof state.palpites==="object"
    ? Object.fromEntries(Object.entries(state.palpites).map(([key,prediction])=>[key,normalizePredictionKey(key,prediction)]).filter(([,prediction])=>prediction))
    : {};
  state.podio=state.podio&&typeof state.podio==="object"
    ? Object.fromEntries(Object.entries(state.podio).map(([participantIndex,podio])=>[participantIndex,normalizePodio(podio)]))
    : {};
  state.actualPodio=normalizePodio(state.actualPodio&&typeof state.actualPodio==="object"?state.actualPodio:{});
  state.config={...base.config,...(state.config||{})};
  state.config.prizePercents=Array.isArray(state.config.prizePercents)?state.config.prizePercents.slice(0,3):[60,25,15];
  while(state.config.prizePercents.length<3) state.config.prizePercents.push(0);
  state.participants=Array.isArray(state.participants)&&state.participants.length?state.participants:[...DEFAULT_PARTICIPANTS];
  DEFAULT_PARTICIPANTS.forEach(name=>{
    if(!state.participants.includes(name)) state.participants.push(name);
  });
  delete state.gameTeams;
  return state;
}

function remoteErrorText(error){
  const msg=error&&error.message?error.message:String(error||"");
  if(msg.includes("Palpites encerrados")) return "Este jogo já começou. Palpites encerrados.";
  if(msg.includes("ko_winner")||msg.includes("ko_decision")||msg.includes("after_et")||msg.includes("pens_s")||msg.includes("penalty_shootout")) return "Atualize o Supabase com as colunas do mata-mata para salvar desempates, prorrogação e pênaltis.";
  if(msg.includes("No suitable key")||msg.includes("wrong key type")||error?.code==="PGRST301") return "A chave pública do Supabase parece inválida ou foi trocada. Atualize o anonKey/publishable key no SUPABASE_CONFIG.";
  if(msg.includes("duplicate key")) return "Esse participante já foi vinculado a outra conta.";
  if(msg.includes("row-level security")) return "Seu login não tem permissão para essa alteração.";
  return msg||"Não consegui conversar com o Supabase.";
}

async function initRemote(){
  if(!isRemoteConfigured()){
    setSyncStatus("local","Modo local: preencha as chaves do Supabase para publicar.");
    authReady=true;
    render(activeTab);
    return;
  }
  if(!window.supabase){
    setSyncStatus("err","Biblioteca do Supabase não carregou.");
    authReady=true;
    render(activeTab);
    return;
  }
  let pendingRecoveryLink=urlHasRecoveryParams(window.location.href);
  remoteClient=window.supabase.createClient(SUPABASE_CONFIG.url,SUPABASE_CONFIG.anonKey);
  setSyncStatus("warn","Conectando ao Supabase...");
  remoteClient.auth.onAuthStateChange((event,session)=>{
    remoteSession=session;
    currentProfile=null;
    if(!session) remoteProfiles=[];
    if(event==="PASSWORD_RECOVERY"||(session&&pendingRecoveryLink&&!passwordResetMode)){
      pendingRecoveryLink=false;
      enterPasswordRecoveryMode();
      return;
    }
    if(remotePollTimer){clearInterval(remotePollTimer);remotePollTimer=null;}
    if(session){
      if(passwordResetMode){
        render(activeTab);
        return;
      }
      loadRemoteData(true);
      remotePollTimer=setInterval(()=>loadRemoteData(false,{source:"poll"}),REMOTE_POLL_MS);
    }else{
      passwordResetMode=false;
      setSyncStatus("warn","Entre para carregar o bolão online.");
      render(activeTab);
    }
  });
  const {data,error}=await remoteClient.auth.getSession();
  if(error){
    setSyncStatus("err",remoteErrorText(error));
    authReady=true;
    render(activeTab);
    return;
  }
  remoteSession=data.session;
  if(remoteSession&&pendingRecoveryLink){
    pendingRecoveryLink=false;
    enterPasswordRecoveryMode();
  }
  authReady=true;
  if(remoteSession&&!passwordResetMode){
    await loadRemoteData(false);
    remotePollTimer=setInterval(()=>loadRemoteData(false,{source:"poll"}),REMOTE_POLL_MS);
  }else if(!remoteSession){
    setSyncStatus("warn","Entre para carregar o bolão online.");
    render(activeTab);
  }
}

function applyRemoteData(payload){
  const next=defaultState();
  (payload.profiles||[]).forEach(profile=>{
    const idx=profile.participant_index;
    if(Number.isInteger(idx)&&idx>=0){
      // Ignora profile.participant_name (não é validado pelo RLS) — usa o nome canônico do DEFAULT_PARTICIPANTS
      next.participants[idx]=DEFAULT_PARTICIPANTS[idx]||next.participants[idx]||participantName(idx);
    }
  });
  const settings=payload.settings;
  if(settings){
    const parsedEntry=Number(settings.entry_value);
    next.config.entryValue=Number.isFinite(parsedEntry)?parsedEntry:next.config.entryValue;
    next.config.prizePercents=Array.isArray(settings.prize_percents)?settings.prize_percents:next.config.prizePercents;
  }
  (payload.results||[]).forEach(row=>{
    next.results[row.game_id]=normalizeResult(row.game_id,{
      s1:row.s1,
      s2:row.s2,
      koWinner:row.ko_winner,
      koDecision:row.ko_decision,
      afterEt1:row.after_et_s1,
      afterEt2:row.after_et_s2,
      pens1:row.pens_s1,
      pens2:row.pens_s2,
      penaltyShootout:row.penalty_shootout
    });
  });
  (payload.predictions||[]).forEach(row=>{
    next.palpites[`${row.participant_index}_${row.game_id}`]=normalizePrediction(row.game_id,{s1:row.s1,s2:row.s2,koWinner:row.ko_winner});
  });
  (payload.podium||[]).forEach(row=>{
    next.podio[row.participant_index]={p1:row.p1||"",p2:row.p2||"",p3:row.p3||"",p4:row.p4||""};
  });
  if(payload.actualPodio){
    next.actualPodio={
      p1:payload.actualPodio.p1||"",
      p2:payload.actualPodio.p2||"",
      p3:payload.actualPodio.p3||"",
      p4:payload.actualPodio.p4||""
    };
  }
  predictionKeysToKeepLocal().forEach(key=>{
    if(S.palpites[key]) next.palpites[key]={...S.palpites[key]};
    else delete next.palpites[key];
  });
  // Preserva edições do admin ainda não confirmadas pelo servidor (#7).
  new Set([...dirtyResultKeys,...pendingResultWrites]).forEach(id=>{
    if(S.results[id]) next.results[id]={...S.results[id]};
    else delete next.results[id];
  });
  new Set([...dirtyPodioKeys,...pendingPodioWrites]).forEach(pi=>{
    if(S.podio[pi]) next.podio[pi]={...S.podio[pi]};
    else delete next.podio[pi];
  });
  if(dirtyActualPodio||pendingActualPodioWrite) next.actualPodio={...(S.actualPodio||{})};
  if(dirtyConfig||pendingConfigWrite) next.config={...S.config};
  S=migrateState(next);
  save();
}

async function fetchResultsRemote(){
  const rich=await remoteClient.from("results").select("game_id,s1,s2,ko_winner,ko_decision,after_et_s1,after_et_s2,pens_s1,pens_s2,penalty_shootout");
  if(!rich.error) return rich;
  const full=await remoteClient.from("results").select("game_id,s1,s2,ko_winner,ko_decision");
  if(!full.error) return full;
  const message=remoteErrorText(full.error).toLowerCase();
  if(!message.includes("ko_")) return full;
  const withWinner=await remoteClient.from("results").select("game_id,s1,s2,ko_winner");
  if(!withWinner.error) return withWinner;
  return remoteClient.from("results").select("game_id,s1,s2");
}
async function fetchPredictionsRemote(){
  const full=await remoteClient.from("predictions").select("participant_index,game_id,s1,s2,ko_winner");
  if(!full.error) return full;
  const message=remoteErrorText(full.error).toLowerCase();
  if(!message.includes("ko_")) return full;
  return remoteClient.from("predictions").select("participant_index,game_id,s1,s2");
}

async function loadRemoteData(showToast=false,options={}){
  if(!remoteClient||!remoteSession) return;
  const deferRender=options.source==="poll"&&shouldDeferRemoteRender();
  setSyncStatus("warn","Sincronizando...");
  const [profiles,settings,results,predictions,podium,actualPodio]=await Promise.all([
    remoteClient.from("profiles").select("id,participant_index,participant_name,role"),
    remoteClient.from("settings").select("entry_value,prize_percents").eq("id","main").maybeSingle(),
    fetchResultsRemote(),

    remoteClient.from("actual_podium").select("p1,p2,p3,p4").eq("id","main").maybeSingle()
  ]);
  const failed=[profiles,settings,results,predictions,podium,actualPodio].find(r=>r.error);
  if(failed){
    setSyncStatus("err",remoteErrorText(failed.error));
    if(!deferRender) render(activeTab);
    return;
  }
  remoteProfiles=profiles.data||[];
  currentProfile=remoteProfiles.find(profile=>profile.id===remoteSession.user.id)||null;
  // Se ainda não tem perfil vinculado, busca o slot de convite para exibir no painel
  if(!currentProfile&&inviteSlot===null) fetchInviteSlot();
  applyRemoteData({
    profiles:remoteProfiles,
    settings:settings.data,
    results:results.data,
    predictions:predictions.data,
    podium:podium.data,
    actualPodio:actualPodio.data
  });
  if(currentProfile&&!palSelectionTouched) palPi=currentProfile.participant_index;
  setSyncStatus("ok",currentProfile?`Online como ${participantName(currentProfile.participant_index)}`:"Conta sem participante vinculado.");
  if(showToast&&currentProfile) toast("Bolão online sincronizado.");
  // Admins sincronizam os horários dos jogos pra o trigger do banco bloquear palpites após o início.
  if(isAdmin()) syncGameKickoffsRemote();
  if(activeTab==="api-test"){
    await loadApiTestRemote(false,{silent:true,skipRender:true});
  }
  if(!deferRender) render(activeTab);
}

// Busca qual participant_index o e-mail logado tem na tabela invited_emails.
// Atualiza a variável inviteSlot e re-renderiza os painéis afetados.
async function fetchInviteSlot(){
  if(!remoteClient||!remoteSession){inviteSlot=null;return;}
  inviteSlot='loading';
  const deferRender=hasFocusedFormControl();
  if(!deferRender) renderAuthControls();
  const email=remoteSession.user.email||'';
  const {data,error}=await remoteClient.from('invited_emails')
    .select('participant_index')
    .eq('email',email)
    .maybeSingle();
  inviteSlot=(error||!data)?'not_invited':data.participant_index;
  if(!deferRender){
    renderAuthControls();
    if(activeTab==='config') renderConfig();
  }
}

// Usado apenas no setup inicial (sem admin): adiciona o próprio e-mail à lista de convidados.
// Após o primeiro admin existir, somente o admin consegue inserir em invited_emails.
async function bootstrapAddSelfToInvite(source="config"){
  if(!remoteClient||!remoteSession){toast("Entre antes de continuar.");return;}
  if(hasAdminProfile()){toast("Fale com o administrador do bolão para ser adicionado à lista.");return;}
  const idxEl=document.getElementById(source==="top"?"topBootstrapIdx":"bootstrapIdx");
  const idx=parseInt(idxEl?.value,10);
  if(!Number.isInteger(idx)||idx<0||idx>=S.participants.length){toast("Escolha seu nome na lista.");return;}
  const email=remoteSession.user.email||"";
  setSyncStatus("warn","Adicionando à lista de convidados...");
  const {error}=await remoteClient.from("invited_emails").insert({email,participant_index:idx});
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  inviteSlot=null; // força re-fetch para pegar o slot recém-adicionado
  await fetchInviteSlot();
}

async function claimParticipant(source="config"){
  if(!remoteClient||!remoteSession){toast("Entre antes de vincular seu nome.");return;}
  // O slot é determinado pelo servidor (invited_emails), não pelo dropdown — segurança contra impersonação
  if(typeof inviteSlot!=='number'||inviteSlot<0||inviteSlot>=S.participants.length){
    toast(inviteSlot==='not_invited'
      ?"Seu e-mail não está na lista de convidados. Fale com o administrador."
      :"Aguarde a verificação do convite e tente novamente.");
    return;
  }
  const idx=inviteSlot;
  setSyncStatus("warn","Vinculando participante...");
  const {error}=await remoteClient.from("profiles").insert({
    id:remoteSession.user.id,
    participant_index:idx,
    participant_name:participantName(idx),
    role:"participant"
  });
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  palPi=idx;
  palSelectionTouched=false;
  authPanelOpen=false;
  await loadRemoteData(true);
  if(!hasAdminProfile()) toast("Conta vinculada. Como ainda não existe administrador, você já pode assumir esse papel.");
}

async function bootstrapFirstAdmin(){

async function updateProfileRole(profileId,role){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador altera permissões.");return;}
  const profile=remoteProfiles.find(item=>item.id===profileId);
  if(!profile){toast("Conta não encontrada. Sincronize e tente de novo.");return;}
  if(role!=="admin"&&isLastRemainingAdmin(profileId)){toast("Mantenha pelo menos um administrador ativo.");return;}
  const targetName=participantName(profile.participant_index);
  const message=role==="admin"
    ? `Transformar ${targetName} em administrador?`
    : `Remover o acesso de administrador de ${targetName}?`;
