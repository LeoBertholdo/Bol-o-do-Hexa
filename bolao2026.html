<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Copa 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
:root{
  --green:#00843d;
  --green-2:#005f2f;
  --yellow:#ffdf00;
  --blue:#002776;
  --blue-2:#071c4d;
  --sky:#e9f4ff;
  --bg:#f6f8ee;
  --surface:#fffdf4;
  --surface-2:#ffffff;
  --border:#dce5d8;
  --text:#172033;
  --muted:#697589;
  --gold:#f5c542;
  --silver:#b9c3cf;
  --bronze:#c98747;
  --red:#d83a34;
  --shadow:0 18px 50px rgba(0,39,118,.12);
}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
  background:
    linear-gradient(135deg,rgba(0,132,61,.1) 0 16%,transparent 16% 100%),
    linear-gradient(180deg,#f8fbf1 0%,#eef5ff 52%,#f7f9f1 100%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.22;
  background-image:
    linear-gradient(30deg, rgba(0,39,118,.08) 12%, transparent 12.5%, transparent 87%, rgba(0,39,118,.08) 87.5%, rgba(0,39,118,.08)),
    linear-gradient(150deg, rgba(0,39,118,.08) 12%, transparent 12.5%, transparent 87%, rgba(0,39,118,.08) 87.5%, rgba(0,39,118,.08));
  background-size:72px 72px;
}
button,input,select{font:inherit}
button{cursor:pointer}
button:disabled,input:disabled,select:disabled{cursor:not-allowed;opacity:.58}
input:disabled,select:disabled{background:#f4f7f5;color:#8792a3}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(255,223,0,.72);outline-offset:2px}

/* ACCOUNT MENU */
.account-menu{position:relative;display:flex;align-items:center;gap:8px;z-index:2}
.account-buttons{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn-auth{
  border:1px solid rgba(255,255,255,.38);
  background:rgba(255,255,255,.12);
  color:#fff;
  padding:10px 13px;
  border-radius:8px;
  font-size:.78rem;
  font-weight:950;
  white-space:nowrap;
}
.btn-auth.primary{background:var(--yellow);border-color:var(--yellow);color:var(--blue);box-shadow:0 8px 22px rgba(0,0,0,.14)}
.btn-auth.user{max-width:220px;overflow:hidden;text-overflow:ellipsis}
.account-panel{
  position:absolute;
  top:calc(100% + 10px);
  right:0;
  width:min(360px,calc(100vw - 28px));
  display:none;
  color:var(--text);
  background:rgba(255,253,244,.98);
  border:1px solid rgba(220,229,216,.96);
  border-radius:8px;
  padding:14px;
  box-shadow:0 22px 56px rgba(0,39,118,.28);
}
.account-panel.open{display:block}
.account-panel:before{
  content:"";
  position:absolute;
  right:24px;
  top:-8px;
  width:14px;
  height:14px;
  transform:rotate(45deg);
  background:rgba(255,253,244,.98);
  border-left:1px solid rgba(220,229,216,.96);
  border-top:1px solid rgba(220,229,216,.96);
}
.account-panel .card{margin:0;box-shadow:none;border-color:rgba(220,229,216,.95)}
.account-panel .login-grid{grid-template-columns:1fr;margin-top:10px}
.account-panel .txt-inp,.account-panel .txt-select{text-align:left;height:42px}
.account-panel .action-btn{min-width:130px}

/* HEADER */
.hero{
  position:relative;
  overflow:visible;
  z-index:10;
  color:#fff;
  background:
    linear-gradient(90deg,rgba(0,39,118,.88) 0%,rgba(0,76,45,.68) 34%,rgba(0,0,0,.22) 68%,rgba(0,0,0,.42) 100%),
    url("assets/header-hexa-2026.png") center 52%/cover no-repeat,
    linear-gradient(128deg,#004c2d 0%,#002776 58%,#071c4d 100%);
  border-bottom:1px solid rgba(255,255,255,.2);
  box-shadow:0 16px 46px rgba(0,39,118,.28);
}
.hero:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.04) 46%,rgba(0,0,0,.24));
  opacity:.72;
  z-index:0;
  pointer-events:none;
}
header{
  position:relative;
  z-index:1;
  max-width:1120px;
  margin:0 auto;
  padding:22px 16px 18px;
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}
.brand-kicker{font-size:.7rem;text-transform:uppercase;letter-spacing:1.4px;font-weight:900;color:var(--yellow);margin-bottom:4px}
h1{font-size:clamp(1.58rem,4.35vw,2.8rem);line-height:1;font-weight:950;letter-spacing:0}
.sub{font-size:.84rem;opacity:.9;margin-top:7px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn-save{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.34);padding:10px 12px;border-radius:8px;font-weight:950;font-size:.78rem;box-shadow:none}
.btn-save:hover{background:rgba(255,255,255,.18)}
.btn-save:active,.icon-btn:active,.btn-ok:active{transform:translateY(1px)}

/* NAV */
nav{
  position:sticky;
  top:0;
  z-index:5;
  background:rgba(255,253,244,.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  gap:4px;
  padding:8px max(10px,calc((100vw - 1120px)/2 + 10px));
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
nav button{
  min-width:0;
  flex:0 0 auto;
  background:transparent;
  border:1px solid transparent;
  padding:10px 12px;
  border-radius:8px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:.82rem;
  font-weight:850;
  transition:background .15s,color .15s,border-color .15s;
}
nav button.active{color:var(--blue);background:#fff;border-color:var(--border);box-shadow:0 6px 18px rgba(0,39,118,.08)}

/* CONTENT */
.tab{display:none;position:relative;z-index:1;padding:18px 14px 34px;max-width:1120px;margin:0 auto}
.tab.active{display:block}
.panel{background:rgba(255,253,244,.86);border:1px solid rgba(220,229,216,.9);border-radius:8px;padding:14px;box-shadow:var(--shadow)}
.card{background:var(--surface-2);border-radius:8px;border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,39,118,.06)}
.card-title{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin:4px 0 12px;font-weight:950}
.microcopy{font-size:.78rem;color:var(--muted);line-height:1.5}

/* HOME */
.home-dashboard{display:grid;gap:14px}
.home-spotlight{
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:minmax(0,1.26fr) minmax(300px,.74fr);
  gap:14px;
  padding:16px;
  border:1px solid rgba(255,255,255,.48);
  border-radius:8px;
  color:#fff;
  background:
    linear-gradient(135deg,rgba(0,39,118,.96),rgba(0,95,47,.94)),
    linear-gradient(90deg,rgba(255,223,0,.16),transparent);
  box-shadow:0 22px 56px rgba(0,39,118,.22);
}
.home-spotlight:after{
  content:"";
  position:absolute;
  inset:auto 0 0 auto;
  width:58%;
  height:100%;
  background:linear-gradient(115deg,transparent 0 34%,rgba(255,255,255,.12) 34% 35%,transparent 35% 100%);
  pointer-events:none;
}
.home-copy,.home-prize-board{position:relative;z-index:1}
.home-kicker,.section-kicker{
  font-size:.68rem;
  text-transform:uppercase;
  letter-spacing:1.2px;
  font-weight:950;
}
.home-actions{display:flex;gap:8px;flex-wrap:wrap}
.home-link-btn,.home-ghost-btn{
  border:1px solid rgba(255,255,255,.28);
  border-radius:8px;
  padding:10px 12px;
  font-size:.78rem;
  font-weight:950;
  white-space:nowrap;
}
.home-link-btn{background:var(--yellow);color:var(--blue);border-color:var(--yellow)}
.home-ghost-btn{background:rgba(255,255,255,.1);color:#fff}
.home-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
.home-metric{
  border:1px solid rgba(255,255,255,.18);
  border-radius:8px;
  padding:11px;
  background:rgba(255,255,255,.1);
  min-width:0;
}
.home-metric strong{display:block;font-size:1.3rem;line-height:1;font-weight:950;color:#fff}
.home-metric span{display:block;margin-top:5px;font-size:.65rem;text-transform:uppercase;letter-spacing:.55px;color:rgba(255,255,255,.76);font-weight:900}
.home-metric small{display:block;margin-top:7px;font-size:.71rem;line-height:1.4;color:rgba(255,255,255,.82);font-weight:750}
.home-metric.progress-metric{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  gap:9px;
}
.home-metric.progress-metric span{margin-top:0}
.progress-metric-main{
  width:100%;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
}
.progress-metric-ratio{
  display:block;
  font-size:1.92rem;
  letter-spacing:0;
  line-height:1;
}
.progress-metric-percent{
  display:block;
  color:#fff;
  font-size:1.2rem;
  font-weight:950;
  line-height:1;
  text-align:right;
}
.progress-metric-bar{
  position:relative;
  width:100%;
  height:7px;
  overflow:hidden;
  border-radius:999px;
  background:rgba(255,255,255,.13);
}
.progress-metric-bar:before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:var(--progress);
  border-radius:inherit;
  background:var(--yellow);
}
.progress-metric-foot{
  width:100%;
  padding-top:1px;
  border-top:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.8);
  font-size:.72rem;
  font-weight:850;
  line-height:1.2;
}
.position-value{
  display:block;
  margin-top:7px;
  font-size:1.58rem;
  line-height:1;
  font-weight:950;
  color:#fff;
}
.position-value.top-1{color:var(--gold)}
.position-value.top-2{color:var(--silver)}
.position-value.top-3{color:var(--bronze)}
.position-help{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
.metric-inline-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  padding:6px 10px;
  background:rgba(255,255,255,.12);
  color:#fff;
  font-size:.7rem;
  font-weight:900;
}
.home-copy-footer{margin-top:10px}
.metric-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(255,255,255,.28);
  border-radius:999px;
  padding:7px 10px;
  background:rgba(255,255,255,.1);
  color:#fff;
  font-size:.7rem;
  font-weight:900;
}
.prize-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.prize-head .home-copy-footer{
  margin-top:0;
  flex-shrink:0;
}
.home-prize-board{
  align-self:stretch;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:12px;
  padding:14px;
  border:1px solid rgba(255,255,255,.34);
  border-radius:8px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
}
.prize-total .label{font-size:.66rem;text-transform:uppercase;letter-spacing:1px;font-weight:950;color:rgba(255,255,255,.76)}
.prize-total .value{margin-top:5px;font-size:1.6rem;line-height:1.05;font-weight:950;color:#fff}
.prize-total .note{margin-top:6px;font-size:.72rem;line-height:1.45;color:rgba(255,255,255,.72)}
.prize-split{display:grid;gap:10px}
.prize-row{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:10px 0;
  border-top:1px solid rgba(255,255,255,.16);
  font-size:.82rem;
}
.prize-rank{
  width:31px;
  height:31px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.78rem;
  font-weight:950;
  flex-shrink:0;
}
.prize-rank.gold{background:var(--gold);color:#664b00}
.prize-rank.silver{background:var(--silver);color:#334155}
.prize-rank.bronze{background:var(--bronze);color:#fff}
.prize-copy{min-width:0}
.prize-copy strong{display:block;font-size:.92rem;color:#fff;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prize-copy span{display:block;margin-top:4px;font-size:.66rem;color:rgba(255,255,255,.72);font-weight:850}
.prize-score{text-align:right;min-width:52px}
.prize-score strong{display:block;font-size:1.1rem;color:#fff;line-height:1;font-weight:950}
.prize-score span{display:block;margin-top:3px;font-size:.58rem;text-transform:uppercase;letter-spacing:.4px;color:rgba(255,255,255,.68);font-weight:900}
.home-layout{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);gap:14px;align-items:start}
.home-side{display:grid;gap:14px}
.home-section{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 16px 42px rgba(0,39,118,.1);
}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.section-kicker{color:var(--green);margin-bottom:5px}
.section-head h2{font-size:1rem;line-height:1.12;font-weight:950;color:var(--text)}
.section-sub{font-size:.76rem;color:var(--muted);line-height:1.45;margin-top:4px}
.mini-action{
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  color:var(--blue);
  padding:8px 10px;
  font-size:.74rem;
  font-weight:950;
  white-space:nowrap;
}
.mini-action:hover{border-color:#b8c7df;background:#f7fbff}
.ranking-compact{min-height:0}
.home-ranking-full .lb-row:last-child{margin-bottom:0}
.full-ranking-list{display:grid;gap:8px}
.mini-ranking-list{display:grid;gap:7px;max-height:384px;overflow:auto;padding-right:2px;scrollbar-width:thin}
.mini-rank-row{
  display:grid;
  grid-template-columns:34px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:9px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
}
.mini-rank-row.top-1{background:linear-gradient(110deg,#fff8d8,#fffdf4 46%,#fff);border-color:#f5c542}
.mini-rank-row.top-2{background:linear-gradient(110deg,#f4f7fb,#fff 48%,#fff);border-color:#b9c3cf}
.mini-rank-row.top-3{background:linear-gradient(110deg,#fff0df,#fff 48%,#fff);border-color:#c98747}
.mini-rank{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eef3f8;
  color:var(--muted);
  font-size:.72rem;
  font-weight:950;
}
.mini-rank.gold{background:var(--gold);color:#664b00}
.mini-rank.silver{background:var(--silver);color:#334155}
.mini-rank.bronze{background:var(--bronze);color:#fff}
.mini-name{min-width:0;font-size:.88rem;font-weight:950}
.mini-name span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;color:var(--muted);font-size:.66rem;font-weight:850}
.mini-points{text-align:right;min-width:48px}
.mini-points strong{display:block;color:var(--green);font-size:1.15rem;line-height:1;font-weight:950}
.mini-points span{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:900;letter-spacing:.35px}
.fixture-list{display:grid;gap:10px}
.fixture-row{
  display:grid;
  gap:12px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  box-shadow:0 8px 20px rgba(0,39,118,.05);
}
.fixture-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.fixture-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:6px 10px;
  border-radius:999px;
  background:#f4f8ff;
  color:var(--blue);
  font-size:.75rem;
  font-weight:950;
  line-height:1;
}
.fixture-phase{
  font-size:.66rem;
  text-transform:uppercase;
  letter-spacing:.6px;
  color:var(--muted);
  font-weight:900;
}
.fixture-match{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  gap:10px;
  align-items:center;
}
.fixture-row .team{
  font-size:.96rem;
  font-weight:850;
}
.fixture-row .team-name{
  white-space:normal;
  line-height:1.2;
}
.fixture-vs{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:34px;
  min-height:34px;
  padding:0 9px;
  border-radius:999px;
  background:#f2f5f9;
  color:var(--muted);
  font-size:.72rem;
  font-weight:950;
  line-height:1;
}
.fixture-row.is-result .fixture-vs{
  min-width:58px;
  background:#edf9f0;
  color:var(--green);
}
.fixture-empty{
  padding:14px;
  border:1px dashed #c9d5c7;
  border-radius:8px;
  background:#fbfff8;
  color:var(--muted);
  font-size:.8rem;
  font-weight:850;
}
.brazil-table{display:grid;gap:6px}
.brazil-row{
  display:grid;
  grid-template-columns:30px minmax(0,1fr) repeat(4,34px);
  gap:6px;
  align-items:center;
  padding:8px 9px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fff;
  font-size:.75rem;
}
.brazil-row.head{
  background:#f2f7ef;
  color:var(--muted);
  font-size:.58rem;
  text-transform:uppercase;
  letter-spacing:.45px;
  font-weight:950;
}
.brazil-row.brazil-highlight{border-color:#a7d8b4;background:#f3fff5}
.brazil-row .team-cell{font-size:.78rem}
.brazil-row strong{color:var(--green);font-weight:950}
.brazil-next{
  margin-top:10px;
  padding:10px;
  border:1px solid #d8e5ff;
  border-radius:8px;
  background:#f7fbff;
  font-size:.78rem;
  color:#31415f;
  line-height:1.45;
}
.home-insights{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.home-insights.single{grid-template-columns:1fr}
.quick-insight{
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:13px;
  box-shadow:0 10px 26px rgba(0,39,118,.07);
}
.quick-insight .label{font-size:.62rem;text-transform:uppercase;letter-spacing:.65px;color:var(--muted);font-weight:950}
.quick-insight .value{margin-top:6px;font-size:1.18rem;color:var(--blue);font-weight:950;line-height:1.05}
.quick-insight .note{margin-top:5px;font-size:.72rem;color:var(--muted);line-height:1.4}
.position-insight{
  background:linear-gradient(135deg,#fffef7 0%,#f4fbff 100%);
  border-color:#d8e5ff;
  box-shadow:0 12px 30px rgba(0,39,118,.08);
}
.position-insight .value{color:var(--green)}
.position-insight .note strong{color:var(--text)}
.insight-action{margin-top:12px}

/* RANKING */
.ranking-page{display:grid;gap:14px}
.chart-shell{
  display:grid;
  gap:12px;
  background:#fff;
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 14px 34px rgba(0,39,118,.07);
}
.chart-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.chart-presets,.chart-legend{display:flex;gap:8px;flex-wrap:wrap}
.chart-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 11px;
  background:#fff;
  color:var(--muted);
  font-size:.74rem;
  font-weight:900;
}
.chart-chip.active{border-color:transparent;color:#fff;box-shadow:0 10px 20px rgba(0,39,118,.16)}
.chart-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-stage{
  border:1px solid #e5edf8;
  border-radius:8px;
  padding:12px;
  background:linear-gradient(180deg,#fbfdff 0%,#f6fbf8 100%);
}
.chart-stage svg{display:block;width:100%;height:auto}
.chart-axis{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:.68rem;color:var(--muted);font-weight:850}
.chart-empty{
  padding:18px;
  border:1px dashed #c7d7f0;
  border-radius:8px;
  background:#f7fbff;
  font-size:.8rem;
  color:#41516d;
  font-weight:850;
}
.ranking-grid{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(280px,.82fr);gap:14px;align-items:start}
.ranking-side{display:grid;gap:14px}
.ranking-card{
  background:#fff;
  border:1px solid rgba(220,229,216,.95);
  border-radius:8px;
  padding:14px;
  box-shadow:0 14px 34px rgba(0,39,118,.06);
}
.ranking-card h3{font-size:1rem;line-height:1.1;color:var(--text);font-weight:950}
.ranking-card p{margin-top:6px;font-size:.76rem;color:var(--muted);line-height:1.45}
.ranking-card .mini-action{margin-top:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.stat-box{background:linear-gradient(180deg,#fff,#fbfff3);border-radius:8px;border:1px solid var(--border);padding:12px;text-align:center}
.stat-box .bv{font-size:1.45rem;font-weight:950;color:var(--blue)}
.stat-box .bl{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:850;letter-spacing:.5px}
.lb-row{display:grid;grid-template-columns:auto minmax(120px,1fr) auto;align-items:center;gap:12px;padding:12px;border-radius:8px;margin-bottom:8px;background:#fff;border:1px solid var(--border);box-shadow:0 8px 18px rgba(0,39,118,.05)}
.podium-row{position:relative;padding:15px 14px;border-width:2px;box-shadow:0 16px 34px rgba(0,39,118,.12)}
.podium-row .pname{font-size:1.06rem}
.podium-row .pts{font-size:1.72rem}
.top-1{background:linear-gradient(110deg,#fff8d8,#fffdf4 46%,#fff);border-color:#f5c542}
.top-2{background:linear-gradient(110deg,#f4f7fb,#fff 48%,#fff);border-color:#b9c3cf}
.top-3{background:linear-gradient(110deg,#fff0df,#fff 48%,#fff);border-color:#c98747}
.rank{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:950;font-size:.82rem;flex-shrink:0}
.podium-row .rank{width:42px;height:42px;font-size:.95rem;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.r1{background:var(--gold);color:#664b00}.r2{background:var(--silver);color:#334155}.r3{background:var(--bronze);color:#fff}.ro{background:#eef3f8;color:var(--muted)}
.pname{font-weight:900;font-size:.98rem;min-width:0}
.lb-row.me{
  border-color:#9fc5ff;
  background:linear-gradient(110deg,#f7fbff,#ffffff 48%,#f7fbff);
  box-shadow:0 12px 28px rgba(0,39,118,.1);
}
.pstats{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.stat{min-width:44px;text-align:center;padding:4px 6px;border-radius:7px;background:#f7fafc;border:1px solid #edf2f7}
.sv{font-size:.9rem;font-weight:950}
.sl{font-size:.56rem;text-transform:uppercase;color:var(--muted);font-weight:850;letter-spacing:.35px}
.pts{min-width:58px;text-align:center;font-size:1.45rem;font-weight:950;color:var(--green);line-height:1}
.crav-stat{background:#fff8d7;border-color:#f4d35e}
.crav-stat .sv,.inv-stat .sv{display:inline-flex;align-items:center;justify-content:center;gap:5px}
.crav-stat .sv{color:#8a5b00}
.crav-stat .sv:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 0 3px #fff0a6}
.inv-stat{background:#fff1f1;border-color:#fecaca}
.inv-stat .sv{color:var(--red)}
.inv-stat .sv:before{content:"";width:11px;height:7px;border-top:3px solid var(--red);border-bottom:3px solid var(--red);transform:skewX(-18deg);opacity:.9}

/* GROUP TABLES */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(265px,1fr));gap:12px}
.group-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 22px rgba(0,39,118,.06)}
.group-title{display:flex;justify-content:space-between;align-items:center;background:#f2f7ef;padding:10px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;font-weight:950;color:var(--blue)}
.group-table{width:100%;border-collapse:collapse;font-size:.78rem}
.group-table th,.group-table td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:center}
.group-table th{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:900;background:#fbfdf8}
.group-table td:first-child,.group-table th:first-child{text-align:left}
.group-table tr:last-child td{border-bottom:0}
.team-cell{display:flex;align-items:center;gap:6px;min-width:0;font-weight:850}
.team-cell .team-name{white-space:normal}
.group-table .pts-cell{font-weight:950;color:var(--green)}
.qual-row{background:#f3fff5}
.third-row{background:#fffdf0}
.pos-pill{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#eef3f8;color:var(--muted);font-size:.68rem;font-weight:950}
.qual-row .pos-pill{background:#d1fae5;color:#065f46}
.third-row .pos-pill{background:#fff0a6;color:#725400}

/* FILTERS */
.fbar,.psel,.section-switch{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fbtn,.pbtn,.seg-btn{
  padding:8px 11px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:#fff;
  font-size:.76rem;
  font-weight:850;
  cursor:pointer;
  color:var(--muted);
}
.fbtn.active,.pbtn.active,.seg-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pbtn.active{background:var(--green);border-color:var(--green)}
.section-switch{padding:4px;background:#eaf2e7;border:1px solid var(--border);border-radius:10px;width:max-content;max-width:100%}
.seg-btn{border-color:transparent;background:transparent}
.seg-btn.active{background:#fff;color:var(--blue);box-shadow:0 5px 16px rgba(0,39,118,.08)}

/* GAMES */
.phase-hdr{display:flex;align-items:center;gap:8px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:#fff;background:linear-gradient(90deg,var(--blue),var(--green));padding:8px 11px;border-radius:8px;margin:16px 0 8px;font-weight:950}
.game-row,.pal-row{display:grid;grid-template-columns:64px minmax(0,1fr) auto;align-items:center;gap:10px;padding:10px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:7px}
.gid{font-size:.68rem;color:var(--muted);font-weight:900}
.gteams{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:8px;min-width:0}
.team{display:flex;align-items:center;gap:7px;min-width:0;font-size:.86rem;font-weight:760}
.team.r{justify-content:flex-end;text-align:right}
.team.muted{color:var(--muted);font-weight:650}
.team-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flag{font-size:1.08rem;line-height:1;filter:saturate(1.08)}
.score-wrap{display:flex;align-items:center;gap:5px;justify-content:center}
.score-control{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;box-shadow:inset 0 1px 0 rgba(0,0,0,.02)}
.score-control input{width:42px;height:38px;border:0;text-align:center;font-size:.95rem;font-weight:950;color:var(--text);background:#fff}
.score-control input::-webkit-outer-spin-button,.score-control input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-control input[type=number]{appearance:textfield;-moz-appearance:textfield}
.step-btn{width:31px;height:38px;border:0;background:#eef4f0;color:var(--blue);font-size:1.1rem;font-weight:950}
.step-btn:hover{background:#e0ecff}
.ssep{color:var(--blue);font-weight:950;font-size:.95rem}
.btn-ok,.btn-x{border:none;border-radius:8px;font-weight:950;white-space:nowrap}
.btn-ok{background:var(--green);color:#fff;padding:10px 12px}
.btn-ok:disabled{opacity:.45;cursor:not-allowed}
.btn-x{background:#fee2e2;color:var(--red);padding:9px 10px}
.res{display:flex;align-items:center;gap:4px;font-weight:950;font-size:.94rem;flex-shrink:0}
.res .sc{background:var(--green);color:#fff;padding:4px 9px;border-radius:7px;min-width:28px;text-align:center}
.ko-note{background:#fffbe6;border:1px solid #f3df89;color:#725400;border-radius:8px;padding:10px 12px;font-size:.8rem;font-weight:750;margin-bottom:12px}

/* PALPITES */
.pal-tools{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
.progress-pill{background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 11px;font-size:.75rem;font-weight:900;color:var(--blue)}
.pal-row{grid-template-columns:64px minmax(0,1fr) auto}
.pgn{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:7px;align-items:center;min-width:0}
.sbadge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:.68rem;font-weight:950;flex-shrink:0}
.b3{background:#d1fae5;color:#065f46}.b1{background:#dbeafe;color:#1e40af}.bn2{background:#fee2e2;color:#b91c1c}.b0{background:#f3f4f6;color:#6b7280}.bem{background:#f3f4f6;color:#a3aab6}

/* PODIO */
.podio-wrap{overflow-x:auto}
.podio-tbl{width:100%;border-collapse:collapse;font-size:.82rem;background:#fff;border-radius:8px;overflow:hidden}
.podio-tbl th,.podio-tbl td{padding:9px;border-bottom:1px solid var(--border);text-align:center}
.podio-tbl th{background:#f2f7ef;font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.podio-tbl td:first-child{text-align:left;font-weight:900;white-space:nowrap}
.txt-inp,.txt-select,.podio-tbl input{width:100%;min-width:92px;border:1.5px solid var(--border);border-radius:7px;padding:8px;font-size:.82rem;text-align:center;background:#fff}
.txt-inp:focus,.txt-select:focus,.podio-tbl input:focus{outline:none;border-color:var(--blue)}
.ppts{font-weight:950;color:var(--green)}

/* CONFIG */
.cfg-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:0}
.cfg-row.profile-row{align-items:flex-start}
.cfg-lbl{flex:1}.cfg-lbl strong{display:block;font-size:.9rem}.cfg-lbl span{font-size:.74rem;color:var(--muted)}
.cfg-inp{border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:.9rem;width:92px;text-align:center;background:#fff}
.rules-box{font-size:.84rem;line-height:1.95;color:#435064}
.rules-box strong{color:var(--text)}
.action-row{display:flex;gap:9px;flex-wrap:wrap}
.cfg-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.action-btn,.action-label{flex:1;min-width:170px;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-weight:900;cursor:pointer;font-size:.84rem;text-align:center}
.action-label{background:var(--blue)}
.action-btn.secondary{background:#eef4ff;color:var(--blue);border:1px solid #d8e5ff}
.role-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:.68rem;font-weight:950;letter-spacing:.3px;border:1px solid rgba(0,39,118,.12);background:#eef5ff;color:var(--blue)}
.role-chip.admin{background:#fff8d6;border-color:rgba(245,197,66,.55);color:#7a5600}
.role-chip.participant{background:#edf7f0;border-color:rgba(0,132,61,.18);color:var(--green-2)}
.sync-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}
.sync-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:999px;padding:8px 11px;font-size:.74rem;font-weight:900;background:#fff;color:var(--blue)}
.sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
.sync-pill.ok .sync-dot{background:var(--green)}
.sync-pill.warn .sync-dot{background:var(--gold)}
.sync-pill.err .sync-dot{background:var(--red)}
.login-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:10px}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(100px);background:#172033;color:#fff;padding:10px 18px;border-radius:999px;font-size:.84rem;font-weight:850;transition:transform .3s;z-index:1000;pointer-events:none;box-shadow:0 12px 28px rgba(0,0,0,.22)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:980px){
  .home-spotlight,.home-layout{grid-template-columns:1fr}
  .home-prize-board{max-width:none}
  .home-insights{grid-template-columns:1fr}
}

@media(max-width:760px){
  h1{font-size:1.55rem}
  .hero{background-position:center center,68% center,center center}
  header{align-items:flex-start;flex-direction:column;padding:16px 12px 14px;gap:12px}
  .header-actions{width:100%;justify-content:flex-start}
  nav{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:7px 8px;
  }
  nav button{
    flex:0 0 auto;
    min-height:40px;
    padding:8px 5px;
    font-size:.74rem;
    font-weight:900;
  }
  .tab{padding:12px 10px 28px}
  .panel,.card,.home-section,.ranking-card{padding:12px}
  .home-dashboard{gap:12px}
  .home-spotlight{padding:13px}
  .home-metrics{grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
  .home-metric{padding:9px}
  .progress-metric-ratio{font-size:1.45rem}
  .progress-metric-percent{font-size:1rem}
  .ranking-grid{grid-template-columns:1fr}
  .section-head{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    align-items:start;
    gap:10px;
    margin-bottom:10px;
  }
  .section-head h2{font-size:.96rem}
  .mini-action{width:max-content;max-width:100%;padding:8px 9px;font-size:.7rem}
  .fixture-list{gap:8px}
  .fixture-row{
    grid-template-columns:72px minmax(0,1fr);
    align-items:center;
    gap:10px;
    padding:10px;
  }
  .fixture-meta{
    align-self:stretch;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    gap:6px;
  }
  .fixture-time{min-height:28px;padding:5px 9px;font-size:.72rem}
  .fixture-phase{font-size:.58rem;letter-spacing:.45px;line-height:1.15}
  .fixture-match{
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    gap:6px;
  }
  .fixture-row .team{font-size:.82rem;gap:5px}
  .fixture-row .team.r{justify-content:flex-end;text-align:right}
  .fixture-vs{
    justify-self:center;

    min-height:0;

  }

  .brazil-row{grid-template-columns:26px minmax(0,1fr) repeat(4,30px);font-size:.7rem;padding:8px 7px}
  .brazil-row .team-cell{font-size:.74rem}
  .stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  .lb-row{grid-template-columns:auto minmax(0,1fr)}

  .game-row{grid-template-columns:48px minmax(0,1fr);align-items:start}
  .game-row .btn-ok,.game-row .btn-x{grid-column:2;justify-self:end}
  .pal-row{grid-template-columns:48px minmax(0,1fr);align-items:start}
  .pal-row .sbadge{grid-column:2;justify-self:end}
  .gteams,.pgn{grid-template-columns:1fr;gap:6px}
  .team.r{justify-content:flex-start;text-align:left}
  .score-wrap{justify-content:flex-start}
  .pal-row .score-wrap{justify-content:space-between}
}

@media(max-width:520px){
  .brand-kicker,.home-kicker,.section-kicker{letter-spacing:.9px}
  .account-buttons,.home-actions,.pal-tools{width:100%}
  .btn-auth,.btn-save,.home-link-btn,.home-ghost-btn{padding:9px 10px;font-size:.74rem}
  nav{gap:5px;padding:6px;overflow-x:auto}
  nav button{min-height:38px;padding:7px 4px;font-size:.68rem}
  .tab{padding:10px 8px 26px}
  .home-section,.card,.panel,.ranking-card{padding:10px}
  .home-metrics,.home-insights{grid-template-columns:1fr}
  .prize-head{align-items:flex-start;flex-direction:column;gap:8px}
  .section-head{grid-template-columns:1fr auto;gap:8px}
  .section-head h2{font-size:.94rem}
  .section-sub,.microcopy{font-size:.72rem}
  .fixture-row{grid-template-columns:62px minmax(0,1fr);gap:8px;padding:9px}
  .fixture-time{font-size:.7rem;padding:5px 8px}
  .fixture-row .team{font-size:.78rem;line-height:1.15}
  .flag{font-size:1rem}
  .brazil-row{grid-template-columns:24px minmax(0,1fr) repeat(4,27px);gap:4px}
  .group-table th,.group-table td{padding:6px 5px}
  .phase-hdr{font-size:.66rem;padding:7px 9px}
  .game-row,.pal-row{grid-template-columns:42px minmax(0,1fr);gap:8px;padding:9px}
  .gid{font-size:.62rem}
  .team{font-size:.8rem}
  .score-control input{width:36px;height:34px}
  .step-btn{width:28px;height:34px}
  .btn-ok,.btn-x{padding:8px 9px;font-size:.76rem}
  .action-btn,.action-label{min-width:130px;padding:10px;font-size:.78rem}
  .cfg-row{align-items:flex-start;flex-direction:column;gap:8px}
  .cfg-inp{width:100%;max-width:180px}
}
</style>
</head>
<body>

<div class="hero">
  <header>
    <div>
      <div class="brand-kicker">Em busca do hexa</div>
      <h1>Bolão da Copa 2026</h1>
    </div>
    <div class="header-actions">
      <div class="account-menu" id="accountMenu" onclick="event.stopPropagation()"></div>
      <button class="btn-save" onclick="saveBackup()">Backup</button>
    </div>

</div>

<nav id="nav">
  <button class="active" onclick="goTab('home')">Início</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const GROUPS = {

  "Brasil":"🇧🇷","Marrocos":"🇲🇦","Haiti":"🇭🇹","Escócia":"\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}",

function parseDateKey(key){
  const [y,m,d]=String(key).split("-").map(Number);
  return new Date(y,m-1,d);
}
function dateKeyFromDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function addDaysKey(key,days){
  const date=parseDateKey(key);
  date.setDate(date.getDate()+days);
  return dateKeyFromDate(date);
}
function todayKey(){return dateKeyFromDate(new Date());}
function scheduleFromUTC(utc){
  const parts=Object.fromEntries(BR_DATE_TIME_FORMAT.formatToParts(new Date(utc)).map(({type,value})=>[type,value]));
  return {date:`${parts.year}-${parts.month}-${parts.day}`,time:`${parts.hour}:${parts.minute}`};
}
function compareGameSchedule(a,b){
  return `${a.date||""} ${a.time||""} ${a.id}`.localeCompare(`${b.date||""} ${b.time||""} ${b.id}`,"pt-BR");
}
function formatGameDate(key){
  return new Intl.DateTimeFormat("pt-BR",{weekday:"short",day:"2-digit",month:"short"}).format(parseDateKey(key)).replace(/\./g,"");
}

function groupFixtureFromRow(row){
  const [id,group,round,t1,t2,utc]=row;
  return {id,phase:`Grupo ${group}`,phaseKey:"groups",round,group,t1,t2,utc,...scheduleFromUTC(utc)};
}
function koFixtureFromRow(row){
  const [id,phaseKey,slot,matchNo,utc,seeds,thirdOwner,sources,sourceKind]=row;
  const phase=KO_PHASES.find(p=>p.k===phaseKey)?.full||phaseKey;
  return {id,phase,phaseKey,round:1,ko:true,slot,matchNo,utc,seeds,thirdOwner,sources,sourceKind:sourceKind||"winner",...scheduleFromUTC(utc)};
}
function genGames(){
  return [
    ...OFFICIAL_GROUP_FIXTURES.map(groupFixtureFromRow),
    ...OFFICIAL_KO_FIXTURES.map(koFixtureFromRow)
  ];
}
const GAMES = genGames();

function defaultState(){
  return {
    results:{},
    palpites:{},
    podio:{},
    actualPodio:{},
    config:{entryValue:200,prizePercents:[60,25,15]},
    participants:[...DEFAULT_PARTICIPANTS]
  };
}

function loadState(){
  if(!CAN_USE_LOCAL_STORAGE) return migrateState(defaultState());
  const keys=[STORAGE_KEY,...OLD_STORAGE_KEYS];
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw) return migrateState(JSON.parse(raw));
    }catch(e){}
  }
  return migrateState(defaultState());
}

function migrateState(raw){
  const base=defaultState();
  const state={...base,...(raw||{})};
  state.results=state.results&&typeof state.results==="object"?state.results:{};
  state.palpites=state.palpites&&typeof state.palpites==="object"?state.palpites:{};
  state.podio=state.podio&&typeof state.podio==="object"?state.podio:{};
  state.actualPodio=state.actualPodio&&typeof state.actualPodio==="object"?state.actualPodio:{};
  state.config={...base.config,...(state.config||{})};
  state.config.prizePercents=Array.isArray(state.config.prizePercents)?state.config.prizePercents.slice(0,3):[60,25,15];
  while(state.config.prizePercents.length<3) state.config.prizePercents.push(0);
  state.participants=Array.isArray(state.participants)&&state.participants.length?state.participants:[...DEFAULT_PARTICIPANTS];
  DEFAULT_PARTICIPANTS.forEach(name=>{
    if(!state.participants.includes(name)) state.participants.push(name);
  });
  delete state.gameTeams;
  return state;
}

let S=loadState();

function save(){
  S.savedAt=new Date().toISOString();
  if(!CAN_USE_LOCAL_STORAGE) return;
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(S));
  }catch(e){}
}

function remoteErrorText(error){
  const msg=error&&error.message?error.message:String(error||"");
  if(msg.includes("duplicate key")) return "Esse participante já foi vinculado a outra conta.";
  if(msg.includes("row-level security")) return "Seu login não tem permissão para essa alteração.";
  return msg||"Não consegui conversar com o Supabase.";
}
function authRedirectURL(){
  const url=new URL(window.location.href);
  url.search="";
  url.hash="";
  return /^https?:\/\//i.test(url.href)?url.toString():null;
}
function parseAuthParams(urlLike=window.location.href){
  const url=new URL(urlLike,window.location.href);
  const query=new URLSearchParams(url.search);
  const hash=new URLSearchParams(url.hash.replace(/^#/,""));
  return {query,hash};
}
function urlHasRecoveryParams(urlLike=window.location.href){
  const {query,hash}=parseAuthParams(urlLike);
  return query.get("type")==="recovery"||hash.get("type")==="recovery";
}
function clearRecoveryParams(){
  const url=new URL(window.location.href);
  url.hash="";
  ["type","access_token","refresh_token","expires_at","expires_in","token_type","code"].forEach(key=>url.searchParams.delete(key));
  window.history.replaceState({},document.title,url.toString());
}

async function initRemote(){
  if(!isRemoteConfigured()){
    setSyncStatus("local","Modo local: preencha as chaves do Supabase para publicar.");
    authReady=true;
    render(activeTab);
    return;
  }
  if(!window.supabase){
    setSyncStatus("err","Biblioteca do Supabase não carregou.");
    authReady=true;
    render(activeTab);
    return;
  }
  let pendingRecoveryLink=urlHasRecoveryParams(window.location.href);
  remoteClient=window.supabase.createClient(SUPABASE_CONFIG.url,SUPABASE_CONFIG.anonKey);
  setSyncStatus("warn","Conectando ao Supabase...");
  remoteClient.auth.onAuthStateChange((event,session)=>{
    remoteSession=session;
    currentProfile=null;
    if(!session) remoteProfiles=[];
    if(event==="PASSWORD_RECOVERY"||(session&&pendingRecoveryLink&&!passwordResetMode)){
      pendingRecoveryLink=false;
      enterPasswordRecoveryMode();
      return;
    }
    if(remotePollTimer){clearInterval(remotePollTimer);remotePollTimer=null;}
    if(session){
      if(passwordResetMode){
        render(activeTab);
        return;
      }
      loadRemoteData(true);
      remotePollTimer=setInterval(()=>loadRemoteData(false),REMOTE_POLL_MS);
    }else{
      passwordResetMode=false;
      setSyncStatus("warn","Entre para carregar o bolão online.");
      render(activeTab);
    }
  });
  const {data,error}=await remoteClient.auth.getSession();
  if(error){
    setSyncStatus("err",remoteErrorText(error));
    authReady=true;
    render(activeTab);
    return;
  }
  remoteSession=data.session;
  if(remoteSession&&pendingRecoveryLink){
    pendingRecoveryLink=false;
    enterPasswordRecoveryMode();
  }
  authReady=true;
  if(remoteSession&&!passwordResetMode){
    await loadRemoteData(false);
    remotePollTimer=setInterval(()=>loadRemoteData(false),REMOTE_POLL_MS);
  }else if(!remoteSession){
    setSyncStatus("warn","Entre para carregar o bolão online.");
    render(activeTab);
  }
}

function applyRemoteData(payload){
  const next=defaultState();
  (payload.profiles||[]).forEach(profile=>{
    const idx=profile.participant_index;
    if(Number.isInteger(idx)&&idx>=0){
      next.participants[idx]=profile.participant_name||next.participants[idx]||participantName(idx);
    }
  });
  const settings=payload.settings;
  if(settings){
    next.config.entryValue=Number(settings.entry_value)||next.config.entryValue;
    next.config.prizePercents=Array.isArray(settings.prize_percents)?settings.prize_percents:next.config.prizePercents;
  }
  (payload.results||[]).forEach(row=>{
    next.results[row.game_id]={s1:row.s1,s2:row.s2};
  });
  (payload.predictions||[]).forEach(row=>{
    next.palpites[`${row.participant_index}_${row.game_id}`]={s1:row.s1,s2:row.s2};
  });
  (payload.podium||[]).forEach(row=>{
    next.podio[row.participant_index]={p1:row.p1||"",p2:row.p2||"",p3:row.p3||"",p4:row.p4||""};
  });
  if(payload.actualPodio){
    next.actualPodio={
      p1:payload.actualPodio.p1||"",
      p2:payload.actualPodio.p2||"",
      p3:payload.actualPodio.p3||"",
      p4:payload.actualPodio.p4||""
    };
  }
  S=migrateState(next);
  save();
}

async function loadRemoteData(showToast=false){
  if(!remoteClient||!remoteSession) return;
  setSyncStatus("warn","Sincronizando...");
  const [profiles,settings,results,predictions,podium,actualPodio]=await Promise.all([
    remoteClient.from("profiles").select("id,participant_index,participant_name,role"),
    remoteClient.from("settings").select("entry_value,prize_percents").eq("id","main").maybeSingle(),
    remoteClient.from("results").select("game_id,s1,s2"),
    remoteClient.from("predictions").select("participant_index,game_id,s1,s2"),
    remoteClient.from("podium_predictions").select("participant_index,p1,p2,p3,p4"),
    remoteClient.from("actual_podium").select("p1,p2,p3,p4").eq("id","main").maybeSingle()
  ]);
  const failed=[profiles,settings,results,predictions,podium,actualPodio].find(r=>r.error);
  if(failed){
    setSyncStatus("err",remoteErrorText(failed.error));
    render(activeTab);
    return;
  }
  remoteProfiles=profiles.data||[];
  currentProfile=remoteProfiles.find(profile=>profile.id===remoteSession.user.id)||null;
  // Se ainda não tem perfil vinculado, busca o slot de convite para exibir no painel
  if(!currentProfile&&inviteSlot===null) fetchInviteSlot();
  applyRemoteData({
    profiles:remoteProfiles,
    settings:settings.data,
    results:results.data,
    predictions:predictions.data,
    podium:podium.data,
    actualPodio:actualPodio.data
  });
  if(currentProfile&&!palSelectionTouched) palPi=currentProfile.participant_index;
  setSyncStatus("ok",currentProfile?`Online como ${participantName(currentProfile.participant_index)}`:"Conta sem participante vinculado.");
  if(showToast&&currentProfile) toast("Bolão online sincronizado.");
  render(activeTab);
}

function authValue(source,field){
  const ids=source==="top"
    ? {email:"topLoginEmail",password:"topLoginPassword",passwordConfirm:"topLoginPasswordConfirm",participant:"topClaimParticipant"}
    : {email:"loginEmail",password:"loginPassword",passwordConfirm:"loginPasswordConfirm",participant:"claimParticipant"};
  return document.getElementById(ids[field])?.value;
}
async function signIn(source="config"){
  if(!remoteClient) return;
  const email=norm(authValue(source,"email"));
  const password=authValue(source,"password")||"";
  if(!email||!password){toast("Informe e-mail e senha.");return;}
  setSyncStatus("warn","Entrando...");
  const {error}=await remoteClient.auth.signInWithPassword({email,password});
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  authPanelOpen=false;
  toast("Login feito.");
}
async function signUp(source="config"){
  if(!remoteClient) return;
  const email=norm(authValue(source,"email"));
  const password=authValue(source,"password")||"";
  if(!email||password.length<6){toast("Use e-mail e uma senha com pelo menos 6 caracteres.");return;}
  setSyncStatus("warn","Criando conta...");
  const {data,error}=await remoteClient.auth.signUp({email,password});
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  if(data.session) toast("Conta criada.");
  else toast("Conta criada. Confira seu e-mail para confirmar.");
}
async function sendPasswordReset(source="config"){
  if(!remoteClient) return;
  const email=norm(authValue(source,"email"));
  if(!email){toast("Informe seu e-mail.");return;}
  setSyncStatus("warn","Enviando link de recuperação...");
  const options={};
  const redirectTo=authRedirectURL();
  if(redirectTo) options.redirectTo=redirectTo;
  const {error}=await remoteClient.auth.resetPasswordForEmail(email,options);
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  authMode="signin";
  authPanelOpen=false;
  setSyncStatus("ok","Link de recuperação enviado para seu e-mail.");
  toast("Confira seu e-mail para redefinir a senha.");
  render(activeTab);
}
async function updatePassword(source="config"){
  if(!remoteClient||!remoteSession){toast("Abra o link recebido no e-mail para continuar.");return;}
  const password=authValue(source,"password")||"";
  const passwordConfirm=authValue(source,"passwordConfirm")||"";
  if(password.length<6){toast("Use uma senha com pelo menos 6 caracteres.");return;}
  if(password!==passwordConfirm){toast("As senhas não coincidem.");return;}
  setSyncStatus("warn","Salvando nova senha...");
  const {error}=await remoteClient.auth.updateUser({password});
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  passwordResetMode=false;
  authMode="signin";
  authPanelOpen=false;
  clearRecoveryParams();
  await loadRemoteData(false);
  setSyncStatus("ok","Senha atualizada.");
  toast("Senha atualizada. Agora seu acesso voltou ao normal.");

  const {data,error}=await remoteClient.from('invited_emails')

async function claimParticipant(source="config"){
  if(!remoteClient||!remoteSession){toast("Entre antes de vincular seu nome.");return;}
  // O slot é determinado pelo servidor (invited_emails), não pelo dropdown — segurança contra impersonação
  if(typeof inviteSlot!=='number'||inviteSlot<0||inviteSlot>=S.participants.length){
    toast(inviteSlot==='not_invited'
      ?"Seu e-mail não está na lista de convidados. Fale com o administrador."
      :"Aguarde a verificação do convite e tente novamente.");
    return;
  }
  const idx=inviteSlot;
  setSyncStatus("warn","Vinculando participante...");
  const {error}=await remoteClient.from("profiles").insert({
    id:remoteSession.user.id,
    participant_index:idx,
    participant_name:participantName(idx),
    role:"participant"
  });
  if(error){setSyncStatus("err",remoteErrorText(error));toast(remoteErrorText(error));return;}
  palPi=idx;
  palSelectionTouched=false;
  authPanelOpen=false;
  await loadRemoteData(true);
  if(!hasAdminProfile()) toast("Conta vinculada. Como ainda não existe administrador, você já pode assumir esse papel.");
}

async function bootstrapFirstAdmin(){
  if(!remoteClient||!remoteSession||!currentProfile){toast("Entre e vincule seu nome antes.");return;}
  if(isAdmin()){toast("Sua conta já é administradora.");return;}
  if(hasAdminProfile()){toast("Já existe um administrador neste bolão.");await loadRemoteData(false);return;}
  if(!window.confirm("Sua conta vai virar a primeira administradora deste bolão. Deseja continuar?")) return;
  const ok=await remoteWrite(()=>remoteClient.from("profiles").update({role:"admin"}).eq("id",remoteSession.user.id));
  if(!ok) return;
  await loadRemoteData(false);
  toast("Você agora é administrador.");
}

async function updateProfileRole(profileId,role){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador altera permissões.");return;}
  const profile=remoteProfiles.find(item=>item.id===profileId);
  if(!profile){toast("Conta não encontrada. Sincronize e tente de novo.");return;}
  if(role!=="admin"&&isLastRemainingAdmin(profileId)){toast("Mantenha pelo menos um administrador ativo.");return;}
  const targetName=participantName(profile.participant_index);
  const message=role==="admin"
    ? `Transformar ${targetName} em administrador?`
    : `Remover o acesso de administrador de ${targetName}?`;
  if(!window.confirm(message)) return;
  const ok=await remoteWrite(()=>remoteClient.from("profiles").update({role}).eq("id",profileId));
  if(!ok) return;
  await loadRemoteData(false);
  toast(`${targetName} agora está como ${roleLabel(role).toLowerCase()}.`);
}

async function pushLocalStateToRemote(){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador pode publicar o backup online.");return;}
  setSyncStatus("warn","Enviando backup para o Supabase...");
  const resultRows=Object.entries(S.results).map(([game_id,res])=>({game_id,s1:res.s1,s2:res.s2,updated_by:remoteSession.user.id}));
  const predictionRows=Object.entries(S.palpites).map(([key,pal])=>{
    const cut=key.indexOf("_");
    return {
      user_id:null,
      participant_index:Number(key.slice(0,cut)),
      game_id:key.slice(cut+1),
      s1:pal.s1??null,
      s2:pal.s2??null
    };
  }).filter(row=>Number.isInteger(row.participant_index)&&row.game_id);
  const podiumRows=Object.entries(S.podio).map(([participant_index,pd])=>({
    user_id:null,
    participant_index:Number(participant_index),
    p1:pd.p1||null,
    p2:pd.p2||null,
    p3:pd.p3||null,
    p4:pd.p4||null
  })).filter(row=>Number.isInteger(row.participant_index));
  const writes=[
    remoteClient.from("settings").upsert({id:"main",entry_value:S.config.entryValue,prize_percents:S.config.prizePercents,updated_by:remoteSession.user.id},{onConflict:"id"}),
    remoteClient.from("actual_podium").upsert({id:"main",...(S.actualPodio||{}),updated_by:remoteSession.user.id},{onConflict:"id"})
  ];
  if(resultRows.length) writes.push(remoteClient.from("results").upsert(resultRows,{onConflict:"game_id"}));
  if(predictionRows.length) writes.push(remoteClient.from("predictions").upsert(predictionRows,{onConflict:"participant_index,game_id"}));
  if(podiumRows.length) writes.push(remoteClient.from("podium_predictions").upsert(podiumRows,{onConflict:"participant_index"}));
  const responses=await Promise.all(writes);
  const failed=responses.find(r=>r.error);
  if(failed){setSyncStatus("err",remoteErrorText(failed.error));toast(remoteErrorText(failed.error));return;}
  await loadRemoteData(false);
  toast("Backup publicado no Supabase.");
}

}

    <button class="step-btn" type="button" onclick="bumpField('${id}',-1)" ${dis}>−</button>
    <input id="${id}" type="number" min="0" max="30" inputmode="numeric" value="${esc(v)}" placeholder="${esc(placeholder)}" ${onChange?`${eventName}="${onChange}"`:""} ${dis}>

  </div>`;

function bumpField(id,delta){
  const input=document.getElementById(id);
  if(!input) return;
  const current=input.value===""?0:parseInt(input.value,10);
  input.value=Math.max(0,Math.min(30,(Number.isNaN(current)?0:current)+delta));
  input.dispatchEvent(new Event("input",{bubbles:true}));
  input.dispatchEvent(new Event("change",{bubbles:true}));
}

function score(pal,res){
  if(!pal||!res||pal.s1==null||pal.s2==null||res.s1==null||res.s2==null) return null;
  const ps1=+pal.s1, ps2=+pal.s2, rs1=+res.s1, rs2=+res.s2;
  if(ps1===rs1&&ps2===rs2) return 3;
  if(ps1!==ps2&&ps1===rs2&&ps2===rs1) return -2;
  const pw=ps1>ps2?1:ps1<ps2?2:0;
  const rw=rs1>rs2?1:rs1<rs2?2:0;
  if(pw===rw) return 1;
  return 0;
}
function podioScore(pal,actual){
  if(!pal||!actual) return 0;
  let p=0;
  if(actual.p1&&pal.p1===actual.p1) p+=20;
  if(actual.p2&&pal.p2===actual.p2) p+=10;
  if(actual.p3&&pal.p3===actual.p3) p+=5;
  if(actual.p4&&pal.p4===actual.p4) p+=3;
  return p;
}

    const pal=S.palpites[`${pi}_${g.id}`];
    const sc=score(pal,res);
    if(sc==null) return;
    played++;
    pts+=sc;
    if(sc===3) crav++;
    if(sc===1) corr++;
    if(sc===-2) inv++;
  });
  const pp=podioScore(S.podio[pi]||{},S.actualPodio||{});
  return {pts:pts+pp,crav,corr,inv,played,pp};
}
function ranking(){

    if(a.inv!==b.inv) return a.inv-b.inv;

function groupStandings(){
  const tables={};
  Object.entries(GROUPS).forEach(([grp,teams])=>{
    tables[grp]=teams.map(team=>({group:grp,team,played:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,pos:0}));
  });
  groupGames().forEach(game=>{
    const res=S.results[game.id];
    if(!res) return;
    const table=tables[game.group];
    const a=table.find(row=>row.team===game.t1);
    const b=table.find(row=>row.team===game.t2);
    a.played++; b.played++;
    a.gf+=+res.s1; a.ga+=+res.s2; b.gf+=+res.s2; b.ga+=+res.s1;
    a.gd=a.gf-a.ga; b.gd=b.gf-b.ga;
    if(+res.s1>+res.s2){a.w++; b.l++; a.pts+=3;}
    else if(+res.s1<+res.s2){b.w++; a.l++; b.pts+=3;}
    else{a.d++; b.d++; a.pts++; b.pts++;}
  });
  Object.values(tables).forEach(table=>{
    table.sort(compareTeams);
    table.forEach((row,i)=>row.pos=i+1);
  });
  return tables;
}
function compareTeams(a,b){
  if(b.pts!==a.pts) return b.pts-a.pts;
  if(b.gd!==a.gd) return b.gd-a.gd;
  if(b.gf!==a.gf) return b.gf-a.gf;
  return a.team.localeCompare(b.team,"pt-BR");
}
function groupPhaseComplete(){
  return groupGames().every(g=>S.results[g.id]);
}
function qualifiers(){
  if(!groupPhaseComplete()) return {ready:false,teams:[]};
  const tables=groupStandings();
  const winners=[], runners=[], thirds=[];
  GROUP_KEYS.forEach(group=>{
    winners.push(tables[group][0]);
    runners.push(tables[group][1]);
    thirds.push(tables[group][2]);
  });
  winners.sort(compareTeams);
  runners.sort(compareTeams);
  thirds.sort(compareTeams);
  return {ready:true,teams:[...winners,...runners,...thirds.slice(0,8)],winners,runners,thirds:thirds.slice(0,8)};
}
function winnerOf(id){
  const game=gameById(id);
  if(!game) return "";
  const teams=gameTeams(game);
  const res=S.results[id];
  if(!res||!teams.t1||!teams.t2||res.s1===res.s2) return "";
  return +res.s1>+res.s2?teams.t1:teams.t2;
}
function loserOf(id){
  const game=gameById(id);
  if(!game) return "";
  const teams=gameTeams(game);
  const res=S.results[id];
  if(!res||!teams.t1||!teams.t2||res.s1===res.s2) return "";
  return +res.s1>+res.s2?teams.t2:teams.t1;
}
function seedLabel(seed){
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return `${direct[1]}º Grupo ${direct[2]}`;
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third) return `3º ${third[1].split("").join("/")}`;
  return seed||"A definir";
}
function thirdPlaceContext(){
  if(!groupPhaseComplete()) return null;
  const tables=groupStandings();
  const thirds=GROUP_KEYS.map(group=>tables[group][2]).sort(compareTeams).slice(0,8);
  const key=thirds.map(row=>row.group).sort().join("");
  const allocation=THIRD_PLACE_ALLOCATION[key];
  if(!allocation) return null;
  return {allocation,thirdByGroup:Object.fromEntries(thirds.map(row=>[row.group,row]))};
}
function resolveSeed(seed,thirdOwner){
  if(!groupPhaseComplete()) return "";
  const tables=groupStandings();
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return tables[direct[2]]?.[Number(direct[1])-1]?.team||"";
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third){
    const context=thirdPlaceContext();
    const group=context?.allocation?.[thirdOwner];
    if(!group||!third[1].includes(group)) return "";
    return context.thirdByGroup[group]?.team||"";
  }
  return "";
}
function r32Teams(game){
  const t1=resolveSeed(game.seeds?.[0],game.thirdOwner);
  const t2=resolveSeed(game.seeds?.[1],game.thirdOwner);
  return {t1:t1||seedLabel(game.seeds?.[0]),t2:t2||seedLabel(game.seeds?.[1]),ready:Boolean(t1&&t2)};
}
function matchId(matchNo){return GAME_ID_BY_MATCH_NO[matchNo]||"";}
function winnerOfMatch(matchNo){
  const id=matchId(matchNo);
  return id?winnerOf(id):"";
}
function loserOfMatch(matchNo){
  const id=matchId(matchNo);
  return id?loserOf(id):"";
}
function sourceTeam(matchNo,kind){
  const team=kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo);
  return team||`${kind==="loser"?"Perdedor":"Vencedor"} M${matchNo}`;
}
function sourceReady(matchNo,kind){
  return Boolean(kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo));
}
function gameTeams(game){
  if(!game.ko) return {t1:game.t1,t2:game.t2,ready:true};
  if(game.phaseKey==="r32") return r32Teams(game);
  const sources=game.sources||[];
  const kind=game.sourceKind==="loser"?"loser":"winner";
  if(sources.length>=2){
    return {
      t1:sourceTeam(sources[0],kind),
      t2:sourceTeam(sources[1],kind),
      ready:sourceReady(sources[0],kind)&&sourceReady(sources[1],kind)
    };
  }
  return {t1:"A definir",t2:"A definir",ready:false};
}

function rankingTimeline(rows){
  const resolved=GAMES.filter(g=>S.results[g.id]).sort(compareGameSchedule);
  const labels=["Início"];
  const totals={};
  const series=rows.map((p,idx)=>{
    totals[p.i]=0;
    return {i:p.i,name:p.name,color:RANKING_SERIES_COLORS[idx%RANKING_SERIES_COLORS.length],values:[0]};
  });
  resolved.forEach(game=>{
    labels.push(game.id);
    series.forEach(line=>{
      const res=S.results[game.id];
      const pal=S.palpites[`${line.i}_${game.id}`];
      const gain=score(pal,res);
      totals[line.i]+=gain==null?0:gain;
      line.values.push(totals[line.i]);
    });
  });
  const actual=S.actualPodio||{};
  const includePodio=["p1","p2","p3","p4"].some(k=>norm(actual[k]));
  if(includePodio){
    labels.push("Pódio");
    series.forEach(line=>{
      totals[line.i]+=podioScore(S.podio[line.i]||{},actual);
      line.values.push(totals[line.i]);
    });
  }
  const allValues=series.flatMap(line=>line.values);
  const maxVal=Math.max(3,...allValues);
  const minVal=Math.min(0,...allValues);
  return {labels,series,maxVal,minVal,resolvedCount:resolved.length,includePodio};
}
function rankingLinePath(values,width,height,padX,padY,minVal,maxVal){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,values.length-1);
  const range=Math.max(1,maxVal-minVal);
  return values.map((value,index)=>{
    const x=padX+(usableWidth*(index/steps));
    const y=height-padY-(usableHeight*((value-minVal)/range));
    return `${index===0?"M":"L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
  }).join(" ");
}
function rankingPointDot(value,index,totalPoints,width,height,padX,padY,minVal,maxVal,color){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,totalPoints-1);
  const range=Math.max(1,maxVal-minVal);
  const x=padX+(usableWidth*(index/steps));
  const y=height-padY-(usableHeight*((value-minVal)/range));
  return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="2"></circle>`;
}

function confirmRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  const game=gameById(id);
  const teams=gameTeams(game);
  if(game.ko&&!teams.ready){toast("Complete os jogos anteriores para liberar este confronto.");return;}
  const s1=parseInt(document.getElementById(`r1_${id}`)?.value,10);
  const s2=parseInt(document.getElementById(`r2_${id}`)?.value,10);
  if(Number.isNaN(s1)||Number.isNaN(s2)||s1<0||s2<0){toast("Placar inválido.");return;}
  if(game.ko&&s1===s2){toast("Em mata-mata, informe o placar final com vencedor.");return;}
  S.results[id]={s1,s2};
  delete resultDrafts[id];
  const clearedIds=clearDependentKnockouts(id);
  save();
  saveResultRemote(id);
  // Propaga a cascata de deleção ao Supabase para evitar que o poll ressuscite resultados inválidos
  if(remoteClient&&isAdmin()&&clearedIds.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedIds));
  }
  toast("Resultado salvo.");
  render(activeTab);
}
// Retorna array de game_ids deletados para que o chamador possa propagá-los ao Supabase
function clearDependentKnockouts(id){
  const order=["R32","R16","QF","SF","P3","FINAL"];
  const prefix=id.split("_")[0];
  const idx=order.indexOf(prefix);
  const cleared=[];
  if(idx<0&&id!=="P3"&&id!=="FINAL"){
    if(id.startsWith("G")){
      koGames().forEach(g=>{
        if(S.results[g.id]) cleared.push(g.id);
        delete S.results[g.id];
        delete resultDrafts[g.id];
      });
    }
    return cleared;
  }
  const start=idx<0?order.length:idx+1;
  koGames().forEach(g=>{
    const gp=g.id.split("_")[0];
    if(order.indexOf(gp)>=start){
      if(S.results[g.id]) cleared.push(g.id);
      delete S.results[g.id];
      delete resultDrafts[g.id];
    }
  });
  return cleared;
}
function clearRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  if(!confirm("Remover este resultado?")) return;
  delete S.results[id];
  resultDrafts[id]={s1:0,s2:0};
  const clearedOnRemove=clearDependentKnockouts(id);
  save();
  deleteResultRemote(id);
  // Propaga a cascata ao Supabase
  if(remoteClient&&isAdmin()&&clearedOnRemove.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedOnRemove));
  }
  render(activeTab);
}

function renderPalpiteRow(game){
  const key=`${palPi}_${game.id}`;
  const pal=S.palpites[key]||{};
  const res=S.results[game.id];
  const teams=gameTeams(game);
  const canEdit=canEditParticipant(palPi);
  // Bloqueia palpites de jogos que já começaram (usa UTC do jogo)
  const gameStarted=!!(game.utc&&new Date()>=new Date(game.utc));
  const disabled=!canEdit||gameStarted;
  // Badge de pontuação
  let badge=`<div class="sbadge bem">–</div>`;
  if(pal.s1!=null&&pal.s2!=null&&res){
    const sc=score(pal,res);
    const cls=sc===3?"b3":sc===1?"b1":sc===-2?"bn2":"b0";
    const lbl=sc===3?"+3":sc===1?"+1":sc===-2?"−2":"0";
    badge=`<div class="sbadge ${cls}">${lbl}</div>`;
  } else if(gameStarted&&canEdit&&(pal.s1==null||pal.s2==null)){
    // Jogo encerrado sem palpite completo: sinaliza ao participante
    badge=`<div class="sbadge b0" title="Jogo encerrado sem palpite">–</div>`;
  }
  const waiting=game.ko&&!teams.ready;
  if(waiting){
    return `<div class="pal-row">
      <div class="gid">${esc(game.id)}</div>
      <div class="gteams">${teamHTML(teams.t1,"",true)}<div class="microcopy">Aguardando definição</div>${teamHTML(teams.t2,"",true)}</div>
      ${badge}
    </div>`;
  }
  // Valores exibidos nos inputs:
  // - Campo editável sem palpite → 0 (ponto de partida para facilitar a seleção)
  // - Campo bloqueado sem palpite → null (fica em branco, fica claro que não foi preenchido)
  const v1=canEdit&&!gameStarted?(pal.s1??0):pal.s1;
  const v2=canEdit&&!gameStarted?(pal.s2??0):pal.s2;
  // Indicador "Encerrado" abaixo dos placares quando jogo começou mas resultado ainda não saiu
  const encerradoNote=gameStarted&&!res
    ?`<div style="text-align:center;font-size:0.68rem;color:var(--text-muted,#888);margin-top:2px">Encerrado</div>`
    :``;
  return `<div class="pal-row">
    <div class="gid">${esc(game.id)}</div>
    <div class="gteams">
        ${teamHTML(teams.t1,"r",!teams.ready)}
      <div>
        <div class="score-wrap">
          ${scoreControl(`p_${palPi}_${game.id}_1`,v1,`setPal(${palPi},'${game.id}',1,this.value)`,"–","onchange",disabled)}
          <span class="ssep">×</span>
          ${scoreControl(`p_${palPi}_${game.id}_2`,v2,`setPal(${palPi},'${game.id}',2,this.value)`,"–","onchange",disabled)}
        </div>
        ${encerradoNote}
      </div>
      ${teamHTML(teams.t2,"",!teams.ready)}
    </div>
    ${badge}
  </div>`;
}

              <div class="cfg-lbl"><strong>${esc(participantName(ie.participant_index))}</strong><span>${esc(ie.email)}</span></div>
              <button class="action-btn secondary" onclick="removeInvitedEmail('${ie.email.replace(/'/g,"\\'")}')">Remover</button>
            </div>`).join("")}
      <div class="cfg-row" style="margin-top:12px;gap:6px;flex-wrap:wrap">
        <input class="txt-inp" id="inviteEmailInp" type="email" placeholder="e-mail do convidado" style="flex:1;min-width:180px">
        <select class="txt-select" id="inviteIdxSel" style="width:auto">
          ${S.participants.map((name,i)=>`<option value="${i}">${esc(name)}</option>`).join("")}
        </select>
        <button class="action-btn" onclick="addInvitedEmail()">Adicionar</button>
      </div>
    </div>`:``}
    <div class="card">
      <div class="card-title">Participantes</div>
      <div class="rules-box">${S.participants.map((name,i)=>`<div>${i+1}. <strong>${esc(name)}</strong></div>`).join("")}</div>
    </div>
    <div class="card">
      <div class="card-title">Financeiro</div>
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>Entrada por participante</strong><span>Valor em reais.</span></div>
        <input class="cfg-inp" type="number" min="1" value="${S.config.entryValue}" onchange="updCfg('entryValue',+this.value)" ${locked?"disabled":""}>
      </div>
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>Total arrecadado</strong><span>${n} participantes × ${brl(S.config.entryValue)}.</span></div>
        <span style="font-weight:950;color:var(--green)">${brl(total)}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Distribuição dos prêmios</div>
      ${["1º lugar","2º lugar","3º lugar"].map((lbl,i)=>`
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>${lbl}</strong><span>${brl(prizes[i])}</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          <input class="cfg-inp" type="number" min="0" max="100" value="${pcts[i]}" onchange="updPrize(${i},+this.value)" ${locked?"disabled":""}>
          <span class="microcopy">%</span>
        </div>
      </div>`).join("")}
      <div class="microcopy" style="font-weight:850;color:${Math.abs(diff)<1?"#065f46":"#b91c1c"}">
        ${Math.abs(diff)<1?"Distribuição balanceada.":`Diferença de ${brl(Math.abs(diff))}; ajuste os percentuais.`}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Regras de pontuação</div>
      <div class="rules-box">
        <div><strong>Cravada:</strong> placar exato vale <strong style="color:#065f46">+3 pontos</strong>.</div>
        <div><strong>Resultado certo:</strong> vencedor ou empate correto, sem placar exato, vale <strong style="color:#1e40af">+1 ponto</strong>.</div>
        <div><strong>Invertida:</strong> placar exatamente ao contrário vale <strong style="color:#b91c1c">−2 pontos</strong>.</div>
        <div><strong>Erro:</strong> resultado incorreto vale <strong>0 ponto</strong>.</div>
        <hr style="margin:10px 0;border:none;border-top:1px solid var(--border)">
        <div><strong>Pódio:</strong> campeão +20, vice +10, 3º lugar +5 e 4º lugar +3.</div>
        <div><strong>Mata-mata:</strong> os confrontos são montados automaticamente a partir da classificação da fase de grupos e avançam conforme os resultados preenchidos.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Backup de dados</div>
      <div class="action-row">
        <button class="action-btn" onclick="saveBackup()">Exportar JSON</button>
        <label class="action-label">Importar JSON<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
        ${isOnlineMode()&&isAdmin()?`<button class="action-btn secondary" onclick="pushLocalStateToRemote()">Publicar dados locais no Supabase</button>`:""}
        ${canEditResults()?`<button class="action-btn secondary" onclick="resetCompetitionData()">Resetar competição</button>`:""}
      </div>
      <div class="microcopy" style="margin-top:10px">Os dados também ficam neste navegador como cópia de segurança. Exporte um backup regularmente.</div>
      <div class="microcopy" style="margin-top:4px">O reset apaga resultados, palpites e pódios; participantes, contas vinculadas e configurações permanecem.</div>
      ${S.savedAt?`<div class="microcopy" style="margin-top:4px">Último salvamento: ${new Date(S.savedAt).toLocaleString("pt-BR")}.</div>`:""}
    </div>
  </div>`;
  document.getElementById("tab-config").innerHTML=h;
}
function updCfg(k,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config[k]=Number.isFinite(v)&&v>0?v:S.config[k];
  save();
  saveConfigRemote();
  renderConfig();
}
function updPrize(i,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config.prizePercents[i]=Number.isFinite(v)?Math.max(0,Math.min(100,v)):0;
  save();
  saveConfigRemote();
  renderConfig();
}
// ── Gerenciamento de convidados (invited_emails) ──────────────────────────
async function loadInvitedEmails(){
  if(!remoteClient||!remoteSession||!isAdmin()) return;
  const {data}=await remoteClient.from('invited_emails').select('email,participant_index').order('participant_index');
  invitedEmailsList=data||[];
  if(activeTab==='config') renderConfig();
}
async function addInvitedEmail(){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  const email=(document.getElementById('inviteEmailInp')?.value||'').toLowerCase().trim();
  const idx=parseInt(document.getElementById('inviteIdxSel')?.value,10);
  if(!email||!email.includes('@')){toast("Informe um e-mail válido.");return;}
  if(!Number.isInteger(idx)||idx<0||idx>=S.participants.length){toast("Escolha um participante válido.");return;}
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').upsert({email,participant_index:idx},{onConflict:'email'}));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite salvo para ${email}.`);}
}
async function removeInvitedEmail(email){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  if(!confirm(`Remover o convite de ${email}?\nSe esta pessoa já tiver vinculado a conta, ela não conseguirá criar um novo perfil caso saia.`)) return;
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').delete().eq('email',email));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite de ${email} removido.`);}
}

function resetCompetitionDataState(){
  S.results={};
  S.palpites={};
  S.podio={};
  S.actualPodio={};
  save();
}

async function resetCompetitionData(){
  const message=isOnlineMode()
    ? "Isso vai apagar todos os resultados, palpites e pódios salvos aqui e no Supabase. Participantes e configurações serão mantidos. Deseja continuar?"
    : "Isso vai apagar todos os resultados, palpites e pódios salvos neste navegador. Participantes e configurações serão mantidos. Deseja continuar?";
  if(!window.confirm(message)) return;
  if(isOnlineMode()){
    if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
    if(!isAdmin()){toast("Só o administrador pode resetar a competição.");return;}
    setSyncStatus("warn","Limpando dados da competição...");
    const responses=await Promise.all([
      remoteClient.from("results").delete().neq("game_id",""),
      remoteClient.from("predictions").delete().gte("participant_index",0),
      remoteClient.from("podium_predictions").delete().gte("participant_index",0),
      remoteClient.from("actual_podium").upsert({
        id:"main",
        p1:null,
        p2:null,
        p3:null,
        p4:null,
        updated_by:remoteSession.user.id
      },{onConflict:"id"})
    ]);
    const failed=responses.find(r=>r.error);
    if(failed){
      setSyncStatus("err",remoteErrorText(failed.error));
      toast(remoteErrorText(failed.error));
      await loadRemoteData(false);
      return;
    }
  }
  resetCompetitionDataState();
  render(activeTab);
  if(isOnlineMode()){
    await loadRemoteData(false);
    toast("Competição resetada no navegador e no Supabase.");
  }else{
    toast("Competição resetada neste navegador.");
  }
}

function saveBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`bolao2026_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Backup exportado.");
}
function importBackup(input){
  const f=input.files[0];
  if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      S=migrateState(JSON.parse(e.target.result));
      save();
      toast(isOnlineMode()&&isAdmin()?"Backup importado. Use Publicar dados locais no Supabase para enviar online.":"Backup importado.");
      render(activeTab);
    }catch(err){toast("Arquivo inválido.");}
  };
  reader.readAsText(f);
}
function toast(msg,ms=2400){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),ms);
}

document.addEventListener("click",event=>{
  const menu=document.getElementById("accountMenu");
  if(authPanelOpen&&menu&&!menu.contains(event.target)) closeAuthPanel();
});
document.addEventListener("keydown",event=>{
  if(event.key==="Escape"&&authPanelOpen) closeAuthPanel();
});

render("home");
initRemote();
</script>
