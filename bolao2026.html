.api-test-page.v2 .api-test-filters{grid-template-columns:minmax(0,1.5fr) 160px 180px auto;gap:10px;margin-top:16px !important;padding:10px;border:1px solid var(--v2-line);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(247,250,255,.85));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:var(--v2-shadow-sm)}
.api-test-page.v2 .api-test-filters .txt-inp,.api-test-page.v2 .api-test-filters .txt-select{border-radius:10px;border:1px solid var(--v2-line-strong);background:#fff;height:42px;font-weight:850;transition:border-color .15s ease,box-shadow .15s ease}
.api-test-page.v2 .api-test-filters .txt-inp:focus,.api-test-page.v2 .api-test-filters .txt-select:focus{outline:none;border-color:var(--v2-blue);box-shadow:0 0 0 3px rgba(10,42,138,.14)}
.api-test-page.v2 .api-test-filters .txt-inp[type="search"]{padding-left:34px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");background-repeat:no-repeat;background-position:11px center;background-size:15px 15px}
.api-test-page.v2 .api-test-filters .action-btn{border-radius:10px;height:42px;background:#fff;border:1px solid var(--v2-line-strong);color:var(--v2-blue);font-weight:950;transition:all .15s ease}
.api-test-page.v2 .api-test-filters .action-btn:hover{background:var(--v2-surface-3);border-color:var(--v2-blue)}

/* ----- DAY SECTIONS — bold dividers --------------------------------------- */
.api-test-page.v2 .api-test-list{gap:20px;margin-top:14px}
.api-test-page.v2 .api-test-day{padding:16px 16px 18px;border-radius:18px;border:1px solid var(--v2-line);background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);box-shadow:var(--v2-shadow-sm)}
.api-test-page.v2 .api-test-day-head{padding:0 4px 12px;margin-bottom:14px;border-bottom:1px dashed var(--v2-line-strong);align-items:center}
.api-test-page.v2 .api-test-day-title{font-size:.95rem;letter-spacing:-.01em;font-weight:950;color:var(--v2-ink);display:flex;align-items:center;gap:10px}
.api-test-page.v2 .api-test-day-title::before{content:"";display:inline-block;width:5px;height:20px;border-radius:3px;background:linear-gradient(180deg,var(--v2-green),var(--v2-blue))}
.api-test-page.v2 .api-test-day-count{padding:5px 12px;border-radius:999px;background:linear-gradient(135deg,var(--v2-blue),var(--v2-blue-deep));color:#fff;font-size:.56rem;letter-spacing:.75px;box-shadow:0 4px 10px -4px rgba(10,42,138,.4)}
.api-test-page.v2 .api-test-day-games{gap:12px}

/* ----- GAME CARD BASE ----------------------------------------------------- */
.api-test-page.v2 .api-test-game{position:relative;border-radius:14px;border:1px solid var(--v2-line);background:#fff;padding:14px 16px 14px 18px;gap:14px;box-shadow:var(--v2-shadow-sm);transition:transform .18s ease,box-shadow .2s ease,border-color .2s ease;overflow:visible;grid-template-columns:92px minmax(0,1fr) 160px;align-items:center;min-height:84px}
.api-test-page.v2 .api-test-game::before{width:4px;border-radius:14px 0 0 14px;background:linear-gradient(180deg,#cbd5e1,#94a3b8)}
.api-test-page.v2 .api-test-game:hover{transform:translateY(-2px);box-shadow:var(--v2-shadow-md);border-color:rgba(10,42,138,.22)}
.api-test-page.v2 .api-test-game:hover::before{filter:brightness(1.08)}

/* upcoming */
.api-test-page.v2 .api-test-game.is-upcoming{background:linear-gradient(180deg,#fff 0%,#f6faff 100%);border-color:rgba(10,42,138,.14);grid-template-columns:92px minmax(0,1fr) 170px;min-height:90px}
.api-test-page.v2 .api-test-game.is-upcoming::before{background:linear-gradient(180deg,var(--v2-blue),#1e40af)}
.api-test-page.v2 .api-test-game.is-closed{background:linear-gradient(180deg,#fff7ed 0%,#fff 100%);border-color:rgba(245,158,11,.28);grid-template-columns:92px minmax(0,1fr) 170px;min-height:90px}
.api-test-page.v2 .api-test-game.is-closed::before{background:linear-gradient(180deg,#f59e0b,#b45309)}

/* final */
.api-test-page.v2 .api-test-game.is-final{background:linear-gradient(180deg,#f8fafc 0%,#fff 100%);border-color:var(--v2-line);padding:12px 14px 12px 18px;border-radius:12px;grid-template-columns:76px minmax(0,1fr) 150px;min-height:72px;gap:12px}
.api-test-page.v2 .api-test-game.is-final::before{background:linear-gradient(180deg,#475569,#0f172a)}

/* live — animated gradient border + soft outer glow */
.api-test-page.v2 .api-test-game.is-live{border-color:transparent;background:linear-gradient(#fff,#fff) padding-box,linear-gradient(135deg,#10b981 0%,#34d399 50%,#10b981 100%) border-box;border:2px solid transparent;box-shadow:0 0 0 4px rgba(16,185,129,.10),0 18px 38px -18px rgba(0,132,61,.30);animation:v2LiveGlow 2.4s ease-in-out infinite;grid-template-columns:98px minmax(0,1fr) 170px;min-height:120px;padding:14px 16px 14px 16px}
.api-test-page.v2 .api-test-game.is-live::before{display:none}
@keyframes v2LiveGlow{0%,100%{box-shadow:0 0 0 4px rgba(16,185,129,.10),0 18px 38px -18px rgba(0,132,61,.30)}50%{box-shadow:0 0 0 6px rgba(16,185,129,.18),0 22px 42px -16px rgba(0,132,61,.45)}}

/* saved / hit — subtle reinforcement */
.api-test-page.v2 .api-test-game.is-saved{box-shadow:var(--v2-shadow-sm),inset 4px 0 0 -1px rgba(10,42,138,.15)}
.api-test-page.v2 .api-test-game.is-hit{box-shadow:var(--v2-shadow-sm),inset 4px 0 0 -1px rgba(16,185,129,.25)}
.api-test-page.v2 .api-test-game.is-hit::after{content:"✓ CRAVOU";position:absolute;top:10px;right:12px;font-size:.5rem;font-weight:950;color:#fff;background:linear-gradient(135deg,#10b981,#059669);border-radius:999px;padding:3px 8px;letter-spacing:.7px;box-shadow:0 4px 10px -4px rgba(16,185,129,.5);z-index:1}
.api-test-page.v2 .api-test-game.is-final.is-hit::after{top:8px;right:10px;font-size:.46rem;padding:2px 7px}

/* ----- META COL (state tag + time + round) -------------------------------- */
.api-test-page.v2 .api-test-meta{gap:7px;padding-left:0;align-items:flex-start}
.api-test-page.v2 .api-test-state-tag{font-size:.54rem;padding:5px 10px;letter-spacing:.75px;min-height:22px;border-radius:999px;font-weight:950;background:#eef5ff;border-color:transparent;color:var(--v2-blue);box-shadow:0 2px 6px -2px rgba(10,42,138,.18)}
.api-test-page.v2 .api-test-state-tag.upcoming{background:linear-gradient(135deg,var(--v2-blue),var(--v2-blue-deep));color:#fff;border-color:transparent}
.api-test-page.v2 .api-test-state-tag.closed{background:linear-gradient(135deg,#f59e0b,#b45309);color:#fff;border-color:transparent}
.api-test-page.v2 .api-test-state-tag.live{background:linear-gradient(135deg,var(--v2-green-soft),var(--v2-green));color:#fff;border-color:transparent;box-shadow:0 4px 12px -3px rgba(16,185,129,.45)}
.api-test-page.v2 .api-test-state-tag.live::before{content:"●";margin-right:5px;animation:v2LivePulse 1.4s ease-in-out infinite;display:inline-block}
.api-test-page.v2 .api-test-state-tag.final{background:linear-gradient(135deg,#334155,#0f172a);color:#fff;border-color:transparent}
.api-test-page.v2 .api-test-state-tag.final::before{color:#fff;margin-right:5px}
.api-test-page.v2 .api-test-state-tag.final.unconfirmed{background:linear-gradient(135deg,#fbbf24,#d97706);color:#fff}
@keyframes v2LivePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.7)}}
.api-test-page.v2 .api-test-time{font-size:.88rem;font-weight:950;color:var(--v2-ink);letter-spacing:-.01em}
.api-test-page.v2 .api-test-time::before{display:none}
.api-test-page.v2 .api-test-round{font-size:.6rem;letter-spacing:.7px;color:var(--v2-mute);font-weight:900}
.api-test-page.v2 .api-test-game.is-live .api-test-time{color:var(--v2-green);font-size:.95rem}
.api-test-page.v2 .api-test-game.is-live .api-test-time::before{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--v2-green-soft);content:"";margin-right:5px;animation:v2LivePulse 1.4s ease-in-out infinite}

/* ----- MATCHLINE & CLUBS -------------------------------------------------- */
.api-test-page.v2 .api-test-matchline{gap:10px}
.api-test-page.v2 .api-test-club{font-size:.84rem;font-weight:850;color:var(--v2-ink);gap:7px;letter-spacing:-.005em;min-width:0}
.api-test-page.v2 .api-test-club span{min-width:0;max-width:none;white-space:normal;overflow-wrap:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.15}
.api-test-page.v2 .api-test-club img{width:32px;height:32px;filter:saturate(1.05) drop-shadow(0 3px 8px rgba(0,39,118,.16));transition:transform .25s cubic-bezier(.4,1.4,.6,1);flex:0 0 auto}
.api-test-page.v2 .api-test-game:hover .api-test-club img{transform:scale(1.08) rotate(-3deg)}
.api-test-page.v2 .api-test-game:hover .api-test-club.away img{transform:scale(1.08) rotate(3deg)}
.api-test-page.v2 .api-test-game.is-live .api-test-club{font-size:.92rem;font-weight:900;gap:8px}
.api-test-page.v2 .api-test-game.is-live .api-test-club img{width:38px;height:38px}
.api-test-page.v2 .api-test-game.is-final .api-test-club{font-size:.8rem;font-weight:800;gap:6px}
.api-test-page.v2 .api-test-game.is-final .api-test-club img{width:24px;height:24px}

/* ----- PRIMARY SCORE (center of matchline) -------------------------------- */
.api-test-page.v2 .api-test-primary-score{min-width:66px}
.api-test-page.v2 .api-test-primary-score .api-test-score{gap:6px}
.api-test-page.v2 .api-test-primary-score .api-test-score b{min-width:34px;padding:7px 9px;font-size:1rem;font-weight:950;background:linear-gradient(180deg,#fff,var(--v2-surface-3));border:1.5px solid rgba(10,42,138,.18);border-radius:9px;box-shadow:0 3px 10px -5px rgba(10,42,138,.2);color:var(--v2-ink);letter-spacing:-.02em}
.api-test-page.v2 .api-test-game.is-live .api-test-primary-score .api-test-score b{min-width:44px;padding:9px 12px;font-size:1.32rem;background:linear-gradient(180deg,#ecfdf5,#d1fae5);border:2px solid rgba(16,185,129,.55);color:var(--v2-green);box-shadow:0 6px 18px -8px rgba(16,185,129,.4);border-radius:10px}
.api-test-page.v2 .api-test-game.is-final .api-test-primary-score .api-test-score b{min-width:30px;padding:5px 8px;font-size:.92rem;background:linear-gradient(180deg,#1e293b,#334155);color:#fff;border-color:#334155;border-radius:8px;box-shadow:0 3px 9px -4px rgba(15,23,42,.4)}
.api-test-page.v2 .api-test-versus{font-size:.72rem;color:rgba(10,42,138,.32);font-weight:950;letter-spacing:2.5px}

/* ----- SIDE PANEL (prediction vs official — STAR FEATURE) ----------------- */
.api-test-page.v2 .api-test-side-panel{gap:9px;padding:11px 13px;border-radius:12px;border:1px solid var(--v2-line);background:linear-gradient(180deg,#fbfdff 0%,#fff 100%);justify-items:center;min-width:0;box-shadow:inset 0 1px 0 rgba(255,255,255,1);width:100%}
.api-test-page.v2 .api-test-game.is-saved .api-test-side-panel{border-color:rgba(10,42,138,.22);background:linear-gradient(180deg,#f5f9ff,#fff)}
.api-test-page.v2 .api-test-game.is-hit .api-test-side-panel{border-color:rgba(16,185,129,.32);background:linear-gradient(180deg,#f1fff6,#fff)}
.api-test-page.v2 .api-test-side-panel .api-test-side-row,
.api-test-page.v2 .api-test-side-panel .api-test-side-result{justify-self:stretch;width:100%}
.api-test-page.v2 .api-test-side-label{font-size:.5rem;font-weight:950;letter-spacing:.95px;color:var(--v2-blue);text-transform:uppercase}
.api-test-page.v2 .api-test-side-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap}
.api-test-page.v2 .api-test-mini-score{gap:5px}
.api-test-page.v2 .api-test-mini-score b{min-width:26px;padding:5px 7px;font-size:.82rem;background:linear-gradient(180deg,#fff,var(--v2-surface-3));border:1.5px solid rgba(10,42,138,.22);color:var(--v2-blue);border-radius:8px;font-weight:950;letter-spacing:-.02em;box-shadow:0 2px 6px -2px rgba(10,42,138,.15)}
.api-test-page.v2 .api-test-mini-score span{color:rgba(10,42,138,.35);font-size:.7rem;font-weight:950}

/* RESULT CHIPS — the punchy outcome tags */
.api-test-page.v2 .api-test-side-result{padding:7px 11px;border-radius:8px;font-size:.6rem;letter-spacing:.85px;font-weight:950;background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;text-align:center;text-transform:uppercase;line-height:1}
.api-test-page.v2 .api-test-side-result.hit{background:linear-gradient(135deg,#10b981 0%,#059669 100%);border-color:#059669;color:#fff;box-shadow:0 4px 14px -4px rgba(16,185,129,.5)}
.api-test-page.v2 .api-test-side-result.ok{background:linear-gradient(135deg,#3b82f6 0%,#1e40af 100%);border-color:#1e40af;color:#fff;box-shadow:0 4px 12px -4px rgba(59,130,246,.4)}
.api-test-page.v2 .api-test-side-result.bad{background:linear-gradient(135deg,#ef4444 0%,#b91c1c 100%);border-color:#b91c1c;color:#fff;box-shadow:0 4px 12px -4px rgba(239,68,68,.4)}
.api-test-page.v2 .api-test-side-result.is-empty{background:transparent;border:1.5px dashed rgba(10,42,138,.18);color:#94a3b8;font-style:normal}
/* "Sem palpite" inline (substitui o mini-score na side-row) — fica pílula sutil */
.api-test-page.v2 .api-test-side-row .api-test-side-result.is-empty{width:auto;padding:4px 10px;font-size:.55rem;border-radius:999px;letter-spacing:.7px}

/* ----- PICK EDITOR (inputs for predictions) — centralizado ---------------- */
.api-test-page.v2 .api-test-pick-editor{gap:8px;width:100%;display:grid;justify-items:center}
.api-test-page.v2 .api-test-pick-score-editor{gap:6px;justify-content:center}
.api-test-page.v2 .api-test-pick-input{width:38px;height:38px;border:1.5px solid rgba(10,42,138,.28);background:#fff;border-radius:10px;font-size:1.05rem;font-weight:950;color:var(--v2-blue);box-shadow:0 4px 10px -4px rgba(10,42,138,.18);transition:border-color .15s ease,box-shadow .15s ease,transform .15s ease}
.api-test-page.v2 .api-test-pick-input:focus{outline:none;border-color:var(--v2-blue);box-shadow:0 0 0 3px rgba(10,42,138,.18);transform:translateY(-1px)}
.api-test-page.v2 .api-test-pick-input:disabled{opacity:.55;background:#f8fafc}
.api-test-page.v2 .api-test-pick-x{font-size:.9rem;color:rgba(10,42,138,.4);font-weight:950;letter-spacing:2px}
.api-test-page.v2 .api-test-pick-actions{gap:8px;justify-content:center;width:100%;flex-wrap:wrap}

/* MINI-ACTION — unified pill-style button system */
.api-test-page.v2 .api-test-mini-action{font-size:.58rem;font-weight:950;letter-spacing:.7px;color:var(--v2-blue);transition:all .15s ease;line-height:1;cursor:pointer}
.api-test-page.v2 .api-test-mini-action:hover{color:var(--v2-blue-deep);text-decoration:none;opacity:.85}
/* Standalone mini-action (Editar/Cancelar/Travar/Corrigir) ganha look de pílula ghost */
.api-test-page.v2 .api-test-side-panel > .api-test-mini-action,
.api-test-page.v2 .api-test-pick-actions .api-test-mini-action:not(.primary),
.api-test-page.v2 .api-test-correction .api-test-mini-action,
.api-test-page.v2 .api-test-inline-editor .api-test-mini-action,
.api-test-page.v2 .api-test-admin-actions .api-test-mini-action{display:inline-flex;align-items:center;justify-content:center;padding:6px 13px;background:rgba(10,42,138,.06);border:1px solid rgba(10,42,138,.18);border-radius:999px;color:var(--v2-blue);text-decoration:none;white-space:nowrap;justify-self:center}
.api-test-page.v2 .api-test-side-panel > .api-test-mini-action:hover,
.api-test-page.v2 .api-test-pick-actions .api-test-mini-action:not(.primary):hover,
.api-test-page.v2 .api-test-correction .api-test-mini-action:hover,
.api-test-page.v2 .api-test-inline-editor .api-test-mini-action:hover,
.api-test-page.v2 .api-test-admin-actions .api-test-mini-action:hover{background:rgba(10,42,138,.12);border-color:var(--v2-blue);color:var(--v2-blue);transform:translateY(-1px);opacity:1}
.api-test-page.v2 .api-test-side-panel > .api-test-mini-action:disabled,
.api-test-page.v2 .api-test-pick-actions .api-test-mini-action:disabled,
.api-test-page.v2 .api-test-correction .api-test-mini-action:disabled,
.api-test-page.v2 .api-test-inline-editor .api-test-mini-action:disabled{opacity:.45;cursor:not-allowed;transform:none;background:rgba(10,42,138,.04)}
/* Primary CTA */
.api-test-page.v2 .api-test-mini-action.primary{padding:8px 16px;background:linear-gradient(135deg,var(--v2-blue) 0%,var(--v2-blue-deep) 100%);color:#fff;border:1px solid var(--v2-blue);border-radius:999px;letter-spacing:.7px;box-shadow:0 4px 14px -4px rgba(10,42,138,.4);text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.api-test-page.v2 .api-test-mini-action.primary:hover{transform:translateY(-1px);text-decoration:none;opacity:1;color:#fff;box-shadow:0 6px 18px -4px rgba(10,42,138,.55);background:linear-gradient(135deg,var(--v2-blue-deep),var(--v2-blue))}
.api-test-page.v2 .api-test-mini-action.primary:disabled{opacity:.45;transform:none;cursor:not-allowed;box-shadow:none}
/* .api-test-correction container centralizado */
.api-test-page.v2 .api-test-correction{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;width:100%;justify-self:center;margin-top:2px}
/* Admin compact (correção placar oficial pelo admin) — centralizar inputs e botões */
.api-test-page.v2 .api-test-admin-compact{display:grid;justify-items:center;gap:7px;width:100%}
.api-test-page.v2 .api-test-inline-editor{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;width:100%}
.api-test-page.v2 .api-test-admin-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;width:100%}

/* ----- LIVE PANEL (center of LIVE game card) ------------------------------ */
.api-test-page.v2 .api-test-live-panel{padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,#ecfdf5 0%,#fff 100%);border:1.5px solid rgba(16,185,129,.28);gap:9px;width:100%}
.api-test-page.v2 .api-test-live-head{gap:8px}
.api-test-page.v2 .api-test-live-pill{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:#059669;padding:5px 10px;font-size:.54rem;letter-spacing:.85px;box-shadow:0 4px 12px -4px rgba(16,185,129,.45)}
.api-test-page.v2 .api-test-live-pill::before{background:#fff}
.api-test-page.v2 .api-test-live-clock{background:linear-gradient(135deg,var(--v2-green-soft),var(--v2-green));color:#fff;border:none;padding:6px 12px;font-size:.6rem;letter-spacing:.85px;font-weight:950;box-shadow:0 4px 12px -4px rgba(16,185,129,.5)}
.api-test-page.v2 .api-test-live-label{font-size:.54rem;letter-spacing:.9px;color:var(--v2-green);font-weight:950}
.api-test-page.v2 .api-test-live-block{gap:5px}
.api-test-page.v2 .api-test-game.is-live .api-test-score{gap:6px}
.api-test-page.v2 .api-test-game.is-live .api-test-score b{min-width:42px;padding:8px 11px;font-size:1.2rem;background:linear-gradient(180deg,#ecfdf5,#d1fae5);border:1.5px solid rgba(16,185,129,.5);color:var(--v2-green);border-radius:10px;font-weight:950;letter-spacing:-.02em;box-shadow:0 4px 12px -4px rgba(16,185,129,.3)}
.api-test-page.v2 .api-test-game.is-live .api-test-score.is-waiting b{background:#f8fafc;color:#cbd5e1;border-color:#e2e8f0;box-shadow:none}
.api-test-page.v2 .api-test-game.is-live .api-test-pick-score b{background:linear-gradient(180deg,#fff,var(--v2-surface-3));border-color:rgba(10,42,138,.22);color:var(--v2-blue);font-size:1rem;min-width:36px;padding:6px 9px}
.api-test-page.v2 .api-test-live-empty{font-size:.56rem;letter-spacing:.7px;color:#94a3b8;font-weight:950}
.api-test-page.v2 .api-test-pal-result{font-size:.62rem;letter-spacing:.8px;font-weight:950;padding:5px 10px;border-radius:999px;display:inline-block;background:#f1f5f9;color:#475569}

function parseDateKey(key){
  const [y,m,d]=String(key).split("-").map(Number);
  return new Date(y,m-1,d);
}
function dateKeyFromDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function addDaysKey(key,days){
  const date=parseDateKey(key);
  date.setDate(date.getDate()+days);
  return dateKeyFromDate(date);
}
function todayKey(){return dateKeyFromDate(new Date());}
function scheduleFromUTC(utc){
  const parts=Object.fromEntries(BR_DATE_TIME_FORMAT.formatToParts(new Date(utc)).map(({type,value})=>[type,value]));
  return {date:`${parts.year}-${parts.month}-${parts.day}`,time:`${parts.hour}:${parts.minute}`};
}
function compareGameSchedule(a,b){
  return `${a.date||""} ${a.time||""} ${a.id}`.localeCompare(`${b.date||""} ${b.time||""} ${b.id}`,"pt-BR");
}
function formatGameDate(key){
  return new Intl.DateTimeFormat("pt-BR",{weekday:"short",day:"2-digit",month:"short"}).format(parseDateKey(key)).replace(/\./g,"");
}
function formatGameDateParts(key){
  const date=parseDateKey(key);
  const parts=Object.fromEntries(new Intl.DateTimeFormat("pt-BR",{weekday:"short",day:"2-digit",month:"short"}).formatToParts(date).map(({type,value})=>[type,value]));
  const weekdayLong=new Intl.DateTimeFormat("pt-BR",{weekday:"long"}).format(date).replace(/\./g,"");
  return {
    weekdayShort:(parts.weekday||"").replace(/\./g,""),
    weekdayLong,
    dayMonth:`${parts.day||""} ${parts.month||""}`.trim().replace(/\./g,"")
  };
}

  const base=defaultState();
  const state={...base,...(raw||{})};
  state.results=state.results&&typeof state.results==="object"
    ? Object.fromEntries(Object.entries(state.results).map(([gameId,result])=>[gameId,normalizeResult(gameId,result)]).filter(([,result])=>result))
    : {};
  state.palpites=state.palpites&&typeof state.palpites==="object"
    ? Object.fromEntries(Object.entries(state.palpites).map(([key,prediction])=>[key,normalizePredictionKey(key,prediction)]).filter(([,prediction])=>prediction))
    : {};
  state.podio=state.podio&&typeof state.podio==="object"
    ? Object.fromEntries(Object.entries(state.podio).map(([participantIndex,podio])=>[participantIndex,normalizePodio(podio)]))
    : {};
  state.actualPodio=normalizePodio(state.actualPodio&&typeof state.actualPodio==="object"?state.actualPodio:{});
  state.config={...base.config,...(state.config||{})};
  state.config.prizePercents=Array.isArray(state.config.prizePercents)?state.config.prizePercents.slice(0,3):[60,25,15];
  while(state.config.prizePercents.length<3) state.config.prizePercents.push(0);
  state.participants=Array.isArray(state.participants)&&state.participants.length?state.participants:[...DEFAULT_PARTICIPANTS];
  DEFAULT_PARTICIPANTS.forEach(name=>{
    if(!state.participants.includes(name)) state.participants.push(name);
  });
  delete state.gameTeams;
  return state;
}

function completePredictionVisibleZero(pal){
  if(!pal) return;
  if(pal.s1!=null&&pal.s2==null&&Number(pal.s1)>0) pal.s2=0;
  if(pal.s2!=null&&pal.s1==null&&Number(pal.s2)>0) pal.s1=0;
}
function applyLocalPredictionDraft(pi,gid,w,value){
  if(!canEditParticipant(pi)) return;
  const game=gameById(gid);
  if(predictionDeadlineClosed(game)) return;
  const key=`${pi}_${gid}`;
  if(!S.palpites[key]) S.palpites[key]={};
  const n=parseInt(value,10);
  if(!Number.isNaN(n)&&n>=0){
    S.palpites[key][w===1?"s1":"s2"]=Math.min(30,n);
    completePredictionVisibleZero(S.palpites[key]);
  }else{
    delete S.palpites[key][w===1?"s1":"s2"];
  }
  if(!game?.ko||!hasScore(S.palpites[key])||+S.palpites[key].s1!==+S.palpites[key].s2){
    delete S.palpites[key].koWinner;
    delete S.palpites[key].koDecision;
  }
  if(!Object.keys(S.palpites[key]).length) delete S.palpites[key];
  dirtyPredictionKeys.add(key);
  save();
}
function readPredictionInputId(id){
  const main=String(id||"").match(/^(?:p|bk)_(\d+)_(.+)_([12])$/);
  if(!main) return null;
  return {pi:Number(main[1]),gid:main[2],which:Number(main[3])};
}
function readApiTestInputId(id){
  const raw=String(id||"");
  if(raw.startsWith("apiTestOverrideHome_")) return {type:"scoreOverride",side:"home",id:raw.slice("apiTestOverrideHome_".length)};
  if(raw.startsWith("apiTestOverrideAway_")) return {type:"scoreOverride",side:"away",id:raw.slice("apiTestOverrideAway_".length)};
  if(raw.startsWith("apiTestS1_")) return {type:"prediction",which:1,id:raw.slice("apiTestS1_".length)};
  if(raw.startsWith("apiTestS2_")) return {type:"prediction",which:2,id:raw.slice("apiTestS2_".length)};
  return null;
}
function trackScoreDraftInput(input){
  const predictionInfo=readPredictionInputId(input.id);
  if(predictionInfo){
    applyLocalPredictionDraft(predictionInfo.pi,predictionInfo.gid,predictionInfo.which,input.value);
    return;
  }
  const apiInfo=readApiTestInputId(input.id);
  if(apiInfo?.type==="prediction"){
    const key=apiTestPredictionKey(apiTestPi,apiInfo.id);
    const draft={...(apiTestPredictionDrafts[key]||{})};
    const n=parseInt(input.value,10);
    if(!Number.isNaN(n)&&n>=0) draft[apiInfo.which===1?"s1":"s2"]=Math.min(30,n);
    else delete draft[apiInfo.which===1?"s1":"s2"];
    if(Object.keys(draft).length) apiTestPredictionDrafts[key]=draft;
    else delete apiTestPredictionDrafts[key];
    saveApiTestState();
  }else if(apiInfo?.type==="scoreOverride"){
    const draft={...(apiTestScoreDrafts[apiInfo.id]||{})};
    const n=parseInt(input.value,10);
    if(!Number.isNaN(n)&&n>=0) draft[apiInfo.side]=Math.min(30,n);
    else delete draft[apiInfo.side];
    if(Object.keys(draft).length) apiTestScoreDrafts[apiInfo.id]=draft;
    else delete apiTestScoreDrafts[apiInfo.id];
  }
}
function remoteErrorText(error){
  const msg=error&&error.message?error.message:String(error||"");
  if(msg.includes("Palpites encerrados")) return msg;
  if(msg.includes("ko_winner")||msg.includes("ko_decision")||msg.includes("after_et")||msg.includes("pens_s")||msg.includes("penalty_shootout")) return "Atualize o Supabase com as colunas do mata-mata para salvar desempates, prorrogação e pênaltis.";
  if(msg.includes("No suitable key")||msg.includes("wrong key type")||error?.code==="PGRST301") return "A chave pública do Supabase parece inválida ou foi trocada. Atualize o anonKey/publishable key no SUPABASE_CONFIG.";
  if(msg.includes("duplicate key")) return "Esse participante já foi vinculado a outra conta.";
  if(msg.includes("row-level security")) return "Seu login não tem permissão para essa alteração.";
  return msg||"Não consegui conversar com o Supabase.";
}

async function initRemote(){
  if(!isRemoteConfigured()){
    setSyncStatus("local","Modo local: preencha as chaves do Supabase para publicar.");
    authReady=true;
    render(activeTab);
    return;
  }
  if(!window.supabase){
    setSyncStatus("err","Biblioteca do Supabase não carregou.");
    authReady=true;
    render(activeTab);
    return;
  }
  let pendingRecoveryLink=urlHasRecoveryParams(window.location.href);
  remoteClient=window.supabase.createClient(SUPABASE_CONFIG.url,SUPABASE_CONFIG.anonKey);
  setSyncStatus("warn","Conectando ao Supabase...");
  remoteClient.auth.onAuthStateChange((event,session)=>{
    remoteSession=session;
    currentProfile=null;
    if(!session) remoteProfiles=[];
    if(event==="PASSWORD_RECOVERY"||(session&&pendingRecoveryLink&&!passwordResetMode)){
      pendingRecoveryLink=false;
      enterPasswordRecoveryMode();
      return;
    }
    if(remotePollTimer){clearInterval(remotePollTimer);remotePollTimer=null;}
    if(session){
      if(passwordResetMode){
        render(activeTab);
        return;
      }
      loadRemoteData(true);
      remotePollTimer=setInterval(()=>loadRemoteData(false,{source:"poll"}),REMOTE_POLL_MS);
    }else{
      passwordResetMode=false;
      setSyncStatus("warn","Entre para carregar o bolão online.");
      render(activeTab);
    }
  });
  const {data,error}=await remoteClient.auth.getSession();
  if(error){
    setSyncStatus("err",remoteErrorText(error));
    authReady=true;
    render(activeTab);
    return;
  }
  remoteSession=data.session;
  if(remoteSession&&pendingRecoveryLink){
    pendingRecoveryLink=false;
    enterPasswordRecoveryMode();
  }
  authReady=true;
  if(remoteSession&&!passwordResetMode){
    await loadRemoteData(false);
    remotePollTimer=setInterval(()=>loadRemoteData(false,{source:"poll"}),REMOTE_POLL_MS);
  }else if(!remoteSession){
    setSyncStatus("warn","Entre para carregar o bolão online.");
    render(activeTab);
  }
}

function applyRemoteData(payload){
  const next=defaultState();
  (payload.profiles||[]).forEach(profile=>{
    const idx=profile.participant_index;
    if(Number.isInteger(idx)&&idx>=0){
      // Ignora profile.participant_name (não é validado pelo RLS) — usa o nome canônico do DEFAULT_PARTICIPANTS
      next.participants[idx]=DEFAULT_PARTICIPANTS[idx]||next.participants[idx]||participantName(idx);
    }
  });
  const settings=payload.settings;
  if(settings){
    const parsedEntry=Number(settings.entry_value);
    next.config.entryValue=Number.isFinite(parsedEntry)?parsedEntry:next.config.entryValue;
    next.config.prizePercents=Array.isArray(settings.prize_percents)?settings.prize_percents:next.config.prizePercents;
  }
  (payload.results||[]).forEach(row=>{
    next.results[row.game_id]=normalizeResult(row.game_id,{
      s1:row.s1,
      s2:row.s2,
      koWinner:row.ko_winner,
      koDecision:row.ko_decision,
      afterEt1:row.after_et_s1,
      afterEt2:row.after_et_s2,
      pens1:row.pens_s1,
      pens2:row.pens_s2,
      penaltyShootout:row.penalty_shootout
    });
  });
  (payload.predictions||[]).forEach(row=>{
    next.palpites[`${row.participant_index}_${row.game_id}`]=normalizePrediction(row.game_id,{s1:row.s1,s2:row.s2,koWinner:row.ko_winner});
  });
  (payload.podium||[]).forEach(row=>{
    next.podio[row.participant_index]={p1:row.p1||"",p2:row.p2||"",p3:row.p3||"",p4:row.p4||""};
  });
  if(payload.actualPodio){
    next.actualPodio={
      p1:payload.actualPodio.p1||"",
      p2:payload.actualPodio.p2||"",
      p3:payload.actualPodio.p3||"",
      p4:payload.actualPodio.p4||""
    };
  }
  predictionKeysToKeepLocal().forEach(key=>{
    if(S.palpites[key]) next.palpites[key]={...S.palpites[key]};
    else delete next.palpites[key];
  });
  // Preserva edições do admin ainda não confirmadas pelo servidor (#7).
  new Set([...dirtyResultKeys,...pendingResultWrites]).forEach(id=>{
    if(S.results[id]) next.results[id]={...S.results[id]};
    else delete next.results[id];
  });
  new Set([...dirtyPodioKeys,...pendingPodioWrites]).forEach(pi=>{
    if(S.podio[pi]) next.podio[pi]={...S.podio[pi]};
    else delete next.podio[pi];
  });
  if(dirtyActualPodio||pendingActualPodioWrite) next.actualPodio={...(S.actualPodio||{})};
  if(dirtyConfig||pendingConfigWrite) next.config={...S.config};
  S=migrateState(next);
  save();
}

async function fetchResultsRemote(){
  const rich=await remoteClient.from("results").select("game_id,s1,s2,ko_winner,ko_decision,after_et_s1,after_et_s2,pens_s1,pens_s2,penalty_shootout");
  if(!rich.error) return rich;
  const full=await remoteClient.from("results").select("game_id,s1,s2,ko_winner,ko_decision");
  if(!full.error) return full;
  const message=remoteErrorText(full.error).toLowerCase();
  if(!message.includes("ko_")) return full;
  const withWinner=await remoteClient.from("results").select("game_id,s1,s2,ko_winner");
  if(!withWinner.error) return withWinner;
  return remoteClient.from("results").select("game_id,s1,s2");
}
async function fetchPredictionsRemote(){
  const full=await remoteClient.from("predictions").select("participant_index,game_id,s1,s2,ko_winner");
  if(!full.error) return full;
  const message=remoteErrorText(full.error).toLowerCase();
  if(!message.includes("ko_")) return full;
  return remoteClient.from("predictions").select("participant_index,game_id,s1,s2");
}

async function loadRemoteData(showToast=false,options={}){
  if(!remoteClient||!remoteSession) return;
  const deferRender=options.source==="poll"&&shouldDeferRemoteRender();
  setSyncStatus("warn","Sincronizando...");
  const [profiles,settings,results,predictions,podium,actualPodio]=await Promise.all([
    remoteClient.from("profiles").select("id,participant_index,participant_name,role"),
    remoteClient.from("settings").select("entry_value,prize_percents").eq("id","main").maybeSingle(),
    fetchResultsRemote(),
    fetchPredictionsRemote(),
    remoteClient.from("podium_predictions").select("participant_index,p1,p2,p3,p4"),
    remoteClient.from("actual_podium").select("p1,p2,p3,p4").eq("id","main").maybeSingle()
  ]);
  const failed=[profiles,settings,results,predictions,podium,actualPodio].find(r=>r.error);
  if(failed){
    setSyncStatus("err",remoteErrorText(failed.error));
    if(!deferRender) render(activeTab);
    return;
  }
  remoteProfiles=profiles.data||[];
  currentProfile=remoteProfiles.find(profile=>profile.id===remoteSession.user.id)||null;
  // Se ainda não tem perfil vinculado, busca o slot de convite para exibir no painel
  if(!currentProfile&&inviteSlot===null) fetchInviteSlot();
  applyRemoteData({
    profiles:remoteProfiles,
    settings:settings.data,
    results:results.data,
    predictions:predictions.data,
    podium:podium.data,
    actualPodio:actualPodio.data
  });
  if(currentProfile&&!palSelectionTouched) palPi=currentProfile.participant_index;
  setSyncStatus("ok",currentProfile?`Online como ${participantName(currentProfile.participant_index)}`:"Conta sem participante vinculado.");
  if(showToast&&currentProfile) toast("Bolão online sincronizado.");
  // Admins sincronizam os horários dos jogos para o trigger do banco calcular os prazos.
  if(isAdmin()) syncGameKickoffsRemote();
  if(activeTab==="api-test"){
    await loadApiTestRemote(false,{silent:true,skipRender:true});
  }
  if(!deferRender) render(activeTab);
}

      :"Aguarde a verificação do convite e tente novamente.");

  const {error}=await remoteClient.from("profiles").insert({
    id:remoteSession.user.id,

async function bootstrapFirstAdmin(){
  if(!remoteClient||!remoteSession||!currentProfile){toast("Entre e vincule seu nome antes.");return;}
  if(isAdmin()){toast("Sua conta já é administradora.");return;}
  if(hasAdminProfile()){toast("Já existe um administrador neste bolão.");await loadRemoteData(false);return;}
  if(!window.confirm("Sua conta vai virar a primeira administradora deste bolão. Deseja continuar?")) return;
  const ok=await remoteWrite(()=>remoteClient.from("profiles").update({role:"admin"}).eq("id",remoteSession.user.id));
  if(!ok) return;
  await loadRemoteData(false);
  toast("Você agora é administrador.");
}

async function updateProfileRole(profileId,role){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador altera permissões.");return;}
  const profile=remoteProfiles.find(item=>item.id===profileId);
  if(!profile){toast("Conta não encontrada. Sincronize e tente de novo.");return;}
  if(role!=="admin"&&isLastRemainingAdmin(profileId)){toast("Mantenha pelo menos um administrador ativo.");return;}
  const targetName=participantName(profile.participant_index);
  const message=role==="admin"
    ? `Transformar ${targetName} em administrador?`
    : `Remover o acesso de administrador de ${targetName}?`;
  if(!window.confirm(message)) return;
  const ok=await remoteWrite(()=>remoteClient.from("profiles").update({role}).eq("id",profileId));
  if(!ok) return;
  await loadRemoteData(false);
  toast(`${targetName} agora está como ${roleLabel(role).toLowerCase()}.`);
}

async function remoteWrite(task){
  if(!remoteClient) return true;
  if(!remoteSession){toast("Entre para salvar online.");return false;}
  setSyncStatus("warn","Salvando online...");
  const {error}=await task();
  if(error){
    setSyncStatus("err",remoteErrorText(error));
    toast(remoteErrorText(error));
    await loadRemoteData(false);
    return false;
  }
  setSyncStatus("ok","Salvo online.");
  return true;
}

// Empurra os horários estáticos do calendário pra tabela game_kickoffs.
// O trigger no banco usa essa tabela para calcular os prazos de palpites.
// Idempotente — só admins precisam rodar; demais usuários falham por RLS sem problema.
let gameKickoffsSyncedAt=0;
async function syncGameKickoffsRemote(){
  if(!remoteClient||!remoteSession) return;
  if(Date.now()-gameKickoffsSyncedAt<5*60*1000) return; // no máximo 1x a cada 5 min
  const rows=GAMES.filter(g=>g.utc).map(g=>({game_id:g.id,kickoff_utc:g.utc}));
  if(!rows.length) return;
  gameKickoffsSyncedAt=Date.now();
  const {error}=await remoteClient.from("game_kickoffs").upsert(rows,{onConflict:"game_id"});
  if(error){
    // Se a tabela ainda não existir no projeto, não atrapalha o uso. Apenas registra no console.
    if(!/game_kickoffs/.test(error.message||"")) console.warn("game_kickoffs upsert:",error.message);
  }
}

async function pushLocalStateToRemote(){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador pode publicar o backup online.");return;}
  if(!window.confirm("Isso vai sobrescrever os dados do Supabase com a cópia deste navegador. Palpites mais recentes feitos por outros participantes podem ser perdidos. Continuar?")) return;
  setSyncStatus("warn","Enviando backup para o Supabase...");
  const adminUserId=remoteSession.user.id;
  const resultRows=Object.entries(S.results).map(([game_id,res])=>({
    game_id,
    s1:res.s1,
    s2:res.s2,
    ko_winner:res.koWinner||null,
    ko_decision:res.koDecision||null,
    after_et_s1:res.afterEt1??null,
    after_et_s2:res.afterEt2??null,
    pens_s1:res.pens1??null,
    pens_s2:res.pens2??null,
    penalty_shootout:res.penaltyShootout?.length?res.penaltyShootout:null,
    updated_by:adminUserId
  }));
  // user_id propositalmente em branco: assim cada participante consegue reclamar
  // a linha como dele na próxima edição (a policy aceita user_id null).
  const predictionRows=Object.entries(S.palpites).map(([key,pal])=>{
    const cut=key.indexOf("_");
    return {
      user_id:null,
      participant_index:Number(key.slice(0,cut)),
      game_id:key.slice(cut+1),
      s1:pal.s1??null,
      s2:pal.s2??null,
      ko_winner:pal.koWinner||null,
      ko_decision:null
    };
  }).filter(row=>Number.isInteger(row.participant_index)&&row.game_id);
  const podiumRows=Object.entries(S.podio).map(([participant_index,pd])=>{
    const clean=normalizePodio(pd);
    return {
      user_id:null,
      participant_index:Number(participant_index),
      p1:clean.p1||null,
      p2:clean.p2||null,
      p3:clean.p3||null,
      p4:clean.p4||null
    };
  }).filter(row=>Number.isInteger(row.participant_index));
  const actualPodioRow=normalizePodio(S.actualPodio||{});
  const writes=[
    remoteClient.from("settings").upsert({id:"main",entry_value:S.config.entryValue,prize_percents:S.config.prizePercents,updated_by:remoteSession.user.id},{onConflict:"id"}),
    remoteClient.from("actual_podium").upsert({
      id:"main",
      p1:actualPodioRow.p1||null,
      p2:actualPodioRow.p2||null,
      p3:actualPodioRow.p3||null,
      p4:actualPodioRow.p4||null,
      updated_by:remoteSession.user.id
    },{onConflict:"id"})
  ];
  if(resultRows.length) writes.push(remoteClient.from("results").upsert(resultRows,{onConflict:"game_id"}));
  if(predictionRows.length) writes.push(remoteClient.from("predictions").upsert(predictionRows,{onConflict:"participant_index,game_id"}));
  if(podiumRows.length) writes.push(remoteClient.from("podium_predictions").upsert(podiumRows,{onConflict:"participant_index"}));
  const responses=await Promise.all(writes);
  const failed=responses.find(r=>r.error);
  if(failed){setSyncStatus("err",remoteErrorText(failed.error));toast(remoteErrorText(failed.error));return;}
  await loadRemoteData(false);
  toast("Backup publicado no Supabase.");
}

}
function jsAttr(v){return esc(JSON.stringify(String(v??"")));}
function norm(v){return String(v||"").trim();}
function optionalScore(v){
  if(v==null||v==="") return null;
  const n=parseInt(v,10);
  return !Number.isNaN(n)&&n>=0?Math.min(30,n):null;
}
function normalizePenaltyShootout(value){
  if(!Array.isArray(value)) return [];
  return value.map(item=>{
    if(!item||typeof item!=="object") return null;
    const side=norm(item.side||item.teamSide||item.team||item.homeAway).toLowerCase();
    const cleanSide=side==="home"||side==="t1"||side==="1"?"t1":side==="away"||side==="t2"||side==="2"?"t2":"";
    if(!cleanSide) return null;

function normalizeResult(id,result){
  if(!result||typeof result!=="object") return null;

  const s2=parseInt(result.s2,10);
  if(Number.isNaN(s1)||Number.isNaN(s2)||s1<0||s2<0) return null;
  const clean={s1:Math.min(30,s1),s2:Math.min(30,s2)};
  const game=gameById(id);
  const koWinner=norm(result.koWinner||result.ko_winner||result.winner||result.advancer);
  const koDecision=normalizeKoDecision(result.koDecision||result.ko_decision||result.decision);
  if(game?.ko&&koWinner) clean.koWinner=koWinner;
  if(game?.ko&&koDecision) clean.koDecision=koDecision;
  const afterEt1=optionalScore(result.afterEt1??result.after_et_s1??result.aet1??result.afterExtra1);
  const afterEt2=optionalScore(result.afterEt2??result.after_et_s2??result.aet2??result.afterExtra2);
  const pens1=optionalScore(result.pens1??result.pens_s1??result.penalties1);
  const pens2=optionalScore(result.pens2??result.pens_s2??result.penalties2);
  const penaltyShootout=normalizePenaltyShootout(result.penaltyShootout||result.penalty_shootout);
  if(game?.ko&&afterEt1!=null&&afterEt2!=null){clean.afterEt1=afterEt1;clean.afterEt2=afterEt2;}
  if(game?.ko&&pens1!=null&&pens2!=null){clean.pens1=pens1;clean.pens2=pens2;}
  if(game?.ko&&penaltyShootout.length) clean.penaltyShootout=penaltyShootout;
  return clean;
}
function normalizePredictionKey(key,prediction){

function normalizePrediction(id,prediction){

    const s2=parseInt(prediction.s2,10);
    if(!Number.isNaN(s2)&&s2>=0) clean.s2=Math.min(30,s2);

  completePredictionVisibleZero(clean);

function normalizeKoDecision(value){
  const key=norm(value).toLowerCase();
  if(!key) return "";
  if(key==="extra_time"||key==="prorrogacao"||key==="prorrogação"||key==="overtime"||key==="et") return "extra_time";
  if(key==="penalties"||key==="penaltis"||key==="pênaltis"||key==="penalty"||key==="pens") return "penalties";
  return KO_DECISION_LABELS[key]?key:"";
}

  return KO_DECISION_LABELS[normalizeKoDecision(key)]||"";
}
function podioLabel(key){return PODIO_LABELS[key]||key;}
function normalizePodio(podio){
  const next={};
  const seen=new Set();
  PODIO_KEYS.forEach(key=>{
    const value=norm(podio&&podio[key]);
    if(!value||seen.has(value)){
      next[key]="";
      return;
    }
    next[key]=value;
    seen.add(value);
  });
  return next;
}
function podioDuplicateKey(podio,key,value){
  const pick=norm(value);
  if(!pick) return null;
  return PODIO_KEYS.find(other=>other!==key&&norm(podio&&podio[other])===pick)||null;
}
function draftPodio(podio,key,value){
  const next={...normalizePodio(podio)};
  const pick=norm(value);
  const duplicateKey=podioDuplicateKey(next,key,pick);
  if(duplicateKey) return {ok:false,duplicateKey,value:pick,next};
  next[key]=pick;
  return {ok:true,next:normalizePodio(next)};
}

function predictedAdvancer(game,pal,teams=gameTeams(game)){
  if(!game?.ko||!pal||!teams.ready) return "";
  if(+pal.s1>+pal.s2) return teams.t1;
  if(+pal.s1<+pal.s2) return teams.t2;
  return koAdvancerComplete(game,pal,teams)?norm(pal.koWinner):"";
}
function actualAdvancer(game,res,teams=gameTeams(game)){
  if(!game?.ko||!res||!teams.ready) return "";
  if(+res.s1>+res.s2) return teams.t1;
  if(+res.s1<+res.s2) return teams.t2;
  return koAdvancerFromResult(game,res,teams);
}
function scoreDetails(pal,res,game=null){
  if(!pal||!res||pal.s1==null||pal.s2==null||res.s1==null||res.s2==null) return null;
  const ps1=+pal.s1, ps2=+pal.s2, rs1=+res.s1, rs2=+res.s2;
  if(game?.ko&&rs1===rs2){
    const teams=gameTeams(game);
    const predicted=predictedAdvancer(game,pal,teams);
    const actual=actualAdvancer(game,res,teams);
    const palDraw=ps1===ps2;
    if(!palDraw) return {pts:0,base:0,passBonus:0,exact:false,koDraw:true};
    const exact=ps1===rs1&&ps2===rs2;
    const base=exact?2:1;
    const passBonus=predicted&&actual&&predicted===actual?1:0;
    return {pts:base+passBonus,base,passBonus,exact,koDraw:true};
  }
  let base=0;
  const exact=ps1===rs1&&ps2===rs2;
  if(exact) base=3;
  else if(ps1!==ps2&&ps1===rs2&&ps2===rs1) base=-2;
  else{
    const pw=ps1>ps2?1:ps1<ps2?2:0;
    const rw=rs1>rs2?1:rs1<rs2?2:0;
    if(pw===rw) base=1;
  }
  let passBonus=0;
  if(game?.ko){
    const teams=gameTeams(game);
    const predicted=predictedAdvancer(game,pal,teams);
    const actual=actualAdvancer(game,res,teams);
    if(predicted&&actual&&predicted===actual) passBonus=1;
  }
  return {pts:base+passBonus,base,passBonus,exact,koDraw:false};
}
function score(pal,res,game=null){
  const details=scoreDetails(pal,res,game);
  return details?details.pts:null;
}
function podioScore(pal,actual){
  if(!pal||!actual) return 0;
  const cleanPal=normalizePodio(pal);
  const cleanActual=normalizePodio(actual);
  let p=0;
  if(cleanActual.p1&&cleanPal.p1===cleanActual.p1) p+=20;
  if(cleanActual.p2&&cleanPal.p2===cleanActual.p2) p+=10;
  if(cleanActual.p3&&cleanPal.p3===cleanActual.p3) p+=5;
  if(cleanActual.p4&&cleanPal.p4===cleanActual.p4) p+=3;
  return p;
}
function playerStats(pi){
  let pts=0,crav=0,corr=0,inv=0,played=0;
  GAMES.forEach(g=>{
    const res=S.results[g.id];
    const pal=S.palpites[`${pi}_${g.id}`];
    const details=scoreDetails(pal,res,g);
    if(!details) return;
    played++;
    pts+=details.pts;
    if(details.exact) crav++;
    if(details.base===1) corr++;
    if(details.base===-2) inv++;
  });
  const pp=podioScore(S.podio[pi]||{},S.actualPodio||{});
  return {pts:pts+pp,crav,corr,inv,played,pp};
}

function groupStandings(){
  const tables={};
  Object.entries(GROUPS).forEach(([grp,teams])=>{
    tables[grp]=teams.map(team=>({group:grp,team,played:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,pos:0}));
  });
  groupGames().forEach(game=>{
    const res=S.results[game.id];
    if(!res) return;
    const table=tables[game.group];
    const a=table.find(row=>row.team===game.t1);
    const b=table.find(row=>row.team===game.t2);
    a.played++; b.played++;
    a.gf+=+res.s1; a.ga+=+res.s2; b.gf+=+res.s2; b.ga+=+res.s1;
    a.gd=a.gf-a.ga; b.gd=b.gf-b.ga;
    if(+res.s1>+res.s2){a.w++; b.l++; a.pts+=3;}
    else if(+res.s1<+res.s2){b.w++; a.l++; b.pts+=3;}
    else{a.d++; b.d++; a.pts++; b.pts++;}
  });
  Object.entries(tables).forEach(([group,table])=>{
    tables[group]=rankGroupTable(table,group);
    tables[group].forEach((row,i)=>row.pos=i+1);
  });
  return tables;
}
function teamConductScore(team){
  return Number(TEAM_CONDUCT_SCORES[team]||0);
}
function fifaRankingOrder(team,ranking=FIFA_RANKING_ORDER){
  return Number(ranking[team]||Number.POSITIVE_INFINITY);
}
function fifaRankingCriteria(){
  return FIFA_RANKING_HISTORY.map(ranking=>({value:row=>fifaRankingOrder(row.team,ranking),dir:"asc"}));
}
function splitByCriterion(rows,getValue,dir="desc"){
  const buckets=new Map();
  rows.forEach(row=>{
    const value=getValue(row);
    const key=String(value);
    if(!buckets.has(key)) buckets.set(key,{value,rows:[]});
    buckets.get(key).rows.push(row);
  });
  return Array.from(buckets.values())
    .sort((a,b)=>{
      if(typeof a.value==="number"&&typeof b.value==="number"){
        return dir==="asc"?a.value-b.value:b.value-a.value;
      }
      const result=String(a.value).localeCompare(String(b.value),"pt-BR");
      return dir==="asc"?result:-result;
    })
    .map(bucket=>bucket.rows);
}
function applyCriteriaGroups(rows,criteria){
  return criteria.reduce((groups,criterion)=>{
    return groups.flatMap(group=>group.length<2?[group]:splitByCriterion(group,criterion.value,criterion.dir));
  },[rows]);
}
function sameTeamSet(a,b){
  if(a.length!==b.length) return false;
  const teams=new Set(a.map(row=>row.team));
  return b.every(row=>teams.has(row.team));
}
function headToHeadStats(group,rows){
  const teams=new Set(rows.map(row=>row.team));
  const stats=Object.fromEntries(rows.map(row=>[row.team,{pts:0,gf:0,ga:0,gd:0}]));
  groupGames().forEach(game=>{
    const res=S.results[game.id];
    if(!res||game.group!==group||!teams.has(game.t1)||!teams.has(game.t2)) return;
    const a=stats[game.t1];
    const b=stats[game.t2];
    const s1=+res.s1;
    const s2=+res.s2;
    a.gf+=s1; a.ga+=s2; b.gf+=s2; b.ga+=s1;
    if(s1>s2) a.pts+=3;
    else if(s1<s2) b.pts+=3;
    else{a.pts++; b.pts++;}
  });
  Object.values(stats).forEach(row=>row.gd=row.gf-row.ga);
  return stats;
}
function applyHeadToHeadStep(rows,group){
  const h2h=headToHeadStats(group,rows);
  const groups=applyCriteriaGroups(rows,[
    {value:row=>h2h[row.team].pts,dir:"desc"},
    {value:row=>h2h[row.team].gd,dir:"desc"},
    {value:row=>h2h[row.team].gf,dir:"desc"}
  ]);
  return groups.flatMap(groupRows=>{
    if(groupRows.length<2||sameTeamSet(groupRows,rows)) return [groupRows];
    return applyHeadToHeadStep(groupRows,group);
  });
}
function rankEqualPointRows(rows,group){
  return applyHeadToHeadStep(rows,group).flatMap(groupRows=>{
    if(groupRows.length<2) return groupRows;
    return applyCriteriaGroups(groupRows,[
      {value:row=>row.gd,dir:"desc"},
      {value:row=>row.gf,dir:"desc"},
      {value:row=>teamConductScore(row.team),dir:"desc"},
      ...fifaRankingCriteria(),
      {value:row=>row.team,dir:"asc"}
    ]).flat();
  });
}
function rankGroupTable(table,group){
  return splitByCriterion(table,row=>row.pts,"desc").flatMap(rows=>{
    return rows.length<2?rows:rankEqualPointRows(rows,group);
  });
}
function compareTeams(a,b){
  if(b.pts!==a.pts) return b.pts-a.pts;
  if(b.gd!==a.gd) return b.gd-a.gd;
  if(b.gf!==a.gf) return b.gf-a.gf;
  const conduct=teamConductScore(b.team)-teamConductScore(a.team);
  if(conduct) return conduct;
  for(const ranking of FIFA_RANKING_HISTORY){
    const rankA=fifaRankingOrder(a.team,ranking);
    const rankB=fifaRankingOrder(b.team,ranking);
    if(rankA!==rankB) return rankA-rankB;
  }
  return a.team.localeCompare(b.team,"pt-BR");
}
function groupPhaseComplete(){
  return groupGames().every(g=>S.results[g.id]);
}
function qualifiers(){
  if(!groupPhaseComplete()) return {ready:false,teams:[]};
  const tables=groupStandings();
  const winners=[], runners=[], thirds=[];
  GROUP_KEYS.forEach(group=>{
    winners.push(tables[group][0]);
    runners.push(tables[group][1]);
    thirds.push(tables[group][2]);
  });
  winners.sort(compareTeams);
  runners.sort(compareTeams);
  thirds.sort(compareTeams);
  return {ready:true,teams:[...winners,...runners,...thirds.slice(0,8)],winners,runners,thirds:thirds.slice(0,8)};
}

function shouldShowExtraTimeScore(base1,base2,after1,after2){
  return isDrawScore(base1,base2)&&after1!=null&&after2!=null;
}
function shouldShowPenaltyScore(after1,after2,pens1,pens2){
  return isDrawScore(after1,after2)&&pens1!=null&&pens2!=null;
}
function resultDetailHTML(game,res,teams=gameTeams(game)){
  if(!game?.ko||!res) return "";
  const rows=[];
  if(shouldShowExtraTimeScore(res.s1,res.s2,res.afterEt1,res.afterEt2)){
    rows.push(`<div class="result-detail-line">Após prorrogação: ${esc(res.afterEt1)} × ${esc(res.afterEt2)}</div>`);
  }
  if(shouldShowPenaltyScore(res.afterEt1,res.afterEt2,res.pens1,res.pens2)){
    const events=normalizePenaltyShootout(res.penaltyShootout);
    const t1Events=penaltyEventsForSide(events,"t1");
    const t2Events=penaltyEventsForSide(events,"t2");
    rows.push(`<div class="penalty-detail">
      <strong>Pênaltis: ${esc(res.pens1)} × ${esc(res.pens2)}</strong>
      <div class="penalty-row"><span class="penalty-team">${esc(teams.t1||"Time 1")}</span>${penaltyDotsHTML(t1Events,res.pens1)}</div>
      <div class="penalty-row"><span class="penalty-team">${esc(teams.t2||"Time 2")}</span>${penaltyDotsHTML(t2Events,res.pens2)}</div>
    </div>`);
  }
  return rows.length?`<div class="result-detail">${rows.join("")}</div>`:"";
}
function seedLabel(seed){
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return `${direct[1]}º Grupo ${direct[2]}`;
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third) return `3º ${third[1].split("").join("/")}`;
  return seed||"A definir";
}
function thirdPlaceContext(){
  if(!groupPhaseComplete()) return null;
  const tables=groupStandings();
  const thirds=GROUP_KEYS.map(group=>tables[group][2]).sort(compareTeams).slice(0,8);
  const key=thirds.map(row=>row.group).sort().join("");
  const allocation=THIRD_PLACE_ALLOCATION[key];
  if(!allocation) return null;
  return {allocation,thirdByGroup:Object.fromEntries(thirds.map(row=>[row.group,row]))};
}
function resolveSeed(seed,thirdOwner){
  if(!groupPhaseComplete()) return "";
  const tables=groupStandings();
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return tables[direct[2]]?.[Number(direct[1])-1]?.team||"";
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third){
    const context=thirdPlaceContext();
    const group=context?.allocation?.[thirdOwner];
    if(!group||!third[1].includes(group)) return "";
    return context.thirdByGroup[group]?.team||"";
  }
  return "";
}
function r32Teams(game){
  const t1=resolveSeed(game.seeds?.[0],game.thirdOwner);
  const t2=resolveSeed(game.seeds?.[1],game.thirdOwner);
  return {t1:t1||seedLabel(game.seeds?.[0]),t2:t2||seedLabel(game.seeds?.[1]),ready:Boolean(t1&&t2)};
}
function matchId(matchNo){return GAME_ID_BY_MATCH_NO[matchNo]||"";}
function winnerOfMatch(matchNo){
  const id=matchId(matchNo);
  return id?winnerOf(id):"";
}
function loserOfMatch(matchNo){
  const id=matchId(matchNo);
  return id?loserOf(id):"";
}
function sourceTeam(matchNo,kind){
  const team=kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo);
  return team||`${kind==="loser"?"Perdedor":"Vencedor"} M${matchNo}`;
}
function sourceReady(matchNo,kind){
  return Boolean(kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo));
}
function gameTeams(game){
  if(!game.ko) return {t1:game.t1,t2:game.t2,ready:true};
  if(game.phaseKey==="r32") return r32Teams(game);
  const sources=game.sources||[];
  const kind=game.sourceKind==="loser"?"loser":"winner";
  if(sources.length>=2){
    return {
      t1:sourceTeam(sources[0],kind),
      t2:sourceTeam(sources[1],kind),
      ready:sourceReady(sources[0],kind)&&sourceReady(sources[1],kind)
    };
  }
  return {t1:"A definir",t2:"A definir",ready:false};
}

function apiTestPlayerStats(pi){
  let pts=0,crav=0,corr=0,inv=0,played=0,predicted=0,live=0,finalized=0;
  apiTestFixturesBeforeCopa().forEach(fixture=>{
    const prediction=apiTestPrediction(pi,fixture.id);
    if(prediction) predicted++;
    if(prediction&&apiTestIsActiveFixture(fixture)) live++;
    const info=apiTestScoreInfo(prediction,fixture);
    if(!info) return;
    const sc=info.value;
    played++;
    if(info.final) finalized++;
    pts+=sc;
    if(sc===3) crav++;
    if(sc===1) corr++;
    if(sc===-2) inv++;
  });
  return {pts,crav,corr,inv,played,predicted,live,finalized};
}
function apiTestRanking(){
  return S.participants.map((name,i)=>({name,i,...apiTestPlayerStats(i)})).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.crav!==a.crav) return b.crav-a.crav;
    if(a.inv!==b.inv) return a.inv-b.inv;
    return a.name.localeCompare(b.name,"pt-BR");
  });
}

async function saveApiTestPrediction(id){
  if(remoteClient&&!remoteSession){
    toast("Entre no bolão para salvar.");
    return;
  }
  if(remoteClient&&remoteSession&&!canEditParticipant(apiTestPi)){
    toast("Você só pode alterar seus próprios palpites.");
    loadApiTestRemote(false);
    return;
  }
  const fixture=apiTestState.fixtures.find(f=>f.id===id);
  if(fixture&&apiTestHasStarted(fixture)){
    toast("Palpites encerrados para esse jogo.");
    render(activeTab);
    return;
  }
  const s1=parseInt(document.getElementById(`apiTestS1_${id}`)?.value,10);
  const s2=parseInt(document.getElementById(`apiTestS2_${id}`)?.value,10);
  if(Number.isNaN(s1)||Number.isNaN(s2)||s1<0||s2<0){
    toast("Placar inválido.");
    return;
  }
  const prediction={s1:Math.min(30,s1),s2:Math.min(30,s2)};
  const key=apiTestPredictionKey(apiTestPi,id);
  apiTestState.predictions[key]=prediction;
  saveApiTestState();
  if(remoteClient&&remoteSession){
    if(!requireOnlineLogin()) return;
    pendingApiTestPredictionWrites.add(key);
    const ok=await remoteWrite(()=>remoteClient.from("test_predictions").upsert({
      tournament:API_TEST_TOURNAMENT,
      participant_index:apiTestPi,
      game_id:id,
      user_id:remoteSession.user.id,
      s1:prediction.s1,
      s2:prediction.s2
    },{onConflict:"tournament,participant_index,game_id"})).finally(()=>pendingApiTestPredictionWrites.delete(key));
    if(!ok) return;
  }
  delete apiTestPredictionDrafts[key];
  delete apiTestEditingPredictions[key];
  saveApiTestState();
  toast("Palpite do Brasileirão salvo.");
  render(activeTab);
}

  const fixture=apiTestState.fixtures.find(f=>f.id===id);

  const finalAway=Math.min(30,away);
  const syncedAt=new Date().toISOString();
  pendingApiTestScoreWrites.add(id);
  const payload={
    status_short:"FT",
    status_long:"Corrigido manualmente",
    elapsed:null,
    goals_home:finalHome,
    goals_away:finalAway,

    is_locked_by_admin:true
  };

    .finally(()=>pendingApiTestScoreWrites.delete(id));

  delete apiTestEditingScores[id];

function chartShortTeamLabel(name){
  if(!name) return "?";
  const cleaned=String(name).replace(/[._-]+/g," ").replace(/\s+/g," ").trim();
  if(!cleaned) return "?";
  const words=cleaned.split(/\s+/).filter(w=>w&&!/^(de|do|da|dos|das|del|la|el|al|fc|sc|ec|ac|cf)$/i.test(w));
  if(words.length>=2){
    return ((words[0][0]||"")+(words[1][0]||"")+(words[2]?.[0]||words[1][1]||"")).toUpperCase().slice(0,3);
  }
  return cleaned.replace(/\s+/g,"").slice(0,3).toUpperCase();
}
function chartShortPlayerLabel(name){
  if(!name) return "?";
  const trimmed=String(name).trim();
  if(!trimmed) return "?";

  return firstWord.length>10?firstWord.slice(0,10)+"…":firstWord;
}
function chartUniqueLabels(names){
  const labels=names.map(n=>chartShortPlayerLabel(n));
  const counts={};
  labels.forEach(l=>{counts[l]=(counts[l]||0)+1;});
  return labels.map((label,idx)=>{
    if(counts[label]<=1) return label;
    const parts=String(names[idx]||"").trim().split(/\s+/);
    const suffix=(parts[1]||parts[0].slice(1,2)||"").trim();
    const initial=suffix?suffix[0].toUpperCase():"";
    return initial?`${label} ${initial}.`:label;
  });
}
function chartNiceTicks(minVal,maxVal,targetCount){
  const range=Math.max(1,maxVal-minVal);
  const rough=range/Math.max(1,targetCount-1);
  const mag=Math.pow(10,Math.floor(Math.log10(rough)));
  const norm=rough/mag;
  let step;
  if(norm<1.5) step=1*mag;
  else if(norm<3) step=2*mag;
  else if(norm<7) step=5*mag;
  else step=10*mag;
  step=Math.max(1,Math.round(step));
  const start=Math.floor(minVal/step)*step;
  const end=Math.ceil(maxVal/step)*step;
  const ticks=[];
  for(let v=start;v<=end+1e-9;v+=step){
    if(v>=minVal-1e-9&&v<=maxVal+1e-9) ticks.push(Math.round(v));
  }
  if(!ticks.length) ticks.push(Math.round(minVal),Math.round(maxVal));
  return Array.from(new Set(ticks));
}
function chartIntegerTicks(minVal,maxVal,maxTicks){
  maxTicks=Math.max(4,maxTicks||12);
  const range=Math.max(1,maxVal-minVal);
  const candidates=[1,2,5,10,20,25,50,100,200,500];
  let step=candidates[candidates.length-1];
  for(const s of candidates){
    if(Math.floor(range/s)+1<=maxTicks){ step=s; break; }
  }
  const start=Math.floor(minVal/step)*step;
  const end=Math.ceil(maxVal/step)*step;
  const ticks=[];
  for(let v=start;v<=end+1e-9;v+=step){
    if(v>=minVal-1e-9&&v<=maxVal+1e-9) ticks.push(Math.round(v));
  }
  if(!ticks.length) ticks.push(Math.round(minVal),Math.round(maxVal));
  return Array.from(new Set(ticks));
}
const CHART_MONTH_NAMES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function chartFormatDateKey(key){
  if(!key) return "?";
  const parts=String(key).split("-");
  if(parts.length<3) return String(key);
  const d=parseInt(parts[2],10);
  const m=parseInt(parts[1],10);
  if(!Number.isFinite(d)||!Number.isFinite(m)) return String(key);
  const mn=CHART_MONTH_NAMES[m-1]||"?";
  return `${String(d).padStart(2,"0")}/${mn}`;
}
function chartDateKeyFromIso(iso){
  if(!iso) return null;
  const d=new Date(iso);
  if(isNaN(d.getTime())) return null;
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function chartAxisIndexes(count,maxLabels){
  if(count<=0) return [];
  if(count===1) return [0];
  if(count<=maxLabels) return Array.from({length:count},(_,i)=>i);
  const stride=Math.ceil((count-1)/(maxLabels-1));
  const out=[];
  for(let i=0;i<count;i+=stride) out.push(i);
  if(out[out.length-1]!==count-1) out.push(count-1);
  return out;
}
function chartEndpointLayout(items,minSpacing,topBound,bottomBound){
  if(!items.length) return [];
  const sorted=items.map((item,idx)=>({...item,_idx:idx})).sort((a,b)=>a.y-b.y);
  for(let i=1;i<sorted.length;i++){
    const prev=sorted[i-1];
    if(sorted[i].y<prev.y+minSpacing) sorted[i].y=prev.y+minSpacing;
  }
  if(sorted.length){
    const last=sorted[sorted.length-1];
    if(last.y>bottomBound){
      let overflow=last.y-bottomBound;
      for(let i=sorted.length-1;i>=0;i--){
        sorted[i].y-=overflow;
        if(i>0&&sorted[i].y-sorted[i-1].y<minSpacing) overflow=Math.max(0,minSpacing-(sorted[i].y-sorted[i-1].y));
        else break;
      }
    }
    if(sorted[0].y<topBound){
      let shift=topBound-sorted[0].y;
      for(let i=0;i<sorted.length;i++){
        sorted[i].y+=shift;
        if(i<sorted.length-1&&sorted[i+1].y-sorted[i].y<minSpacing) shift=Math.max(0,minSpacing-(sorted[i+1].y-sorted[i].y));
        else break;
      }
    }
  }
  const out=new Array(items.length);
  sorted.forEach(item=>{out[item._idx]={...items[item._idx],y:item.y};});
  return out;
}
function apiTestRankingTimeline(rows){
  const fixtures=apiTestFixturesBeforeCopa()
    .filter(fixture=>apiTestCanScoreFixture(fixture)&&apiTestFixtureHasAnyPrediction(fixture))
    .sort(compareApiTestFixtures);
  const dateMap=new Map();
  fixtures.forEach(fx=>{
    const key=chartDateKeyFromIso(fx.dateIso)||"";
    if(!key) return;
    if(!dateMap.has(key)) dateMap.set(key,[]);
    dateMap.get(key).push(fx);
  });
  const dateKeys=Array.from(dateMap.keys()).sort();
  const oneDay=86400000;
  const totals={};
  const series=rows.map((p,idx)=>{
    totals[p.i]=0;
    return {i:p.i,name:p.name,color:RANKING_SERIES_COLORS[idx%RANKING_SERIES_COLORS.length],values:[0]};
  });
  const positions=[];
  let liveCount=0,finalCount=0;
  if(dateKeys.length){
    const earliestMs=parseDateKey(dateKeys[0]).getTime();
    positions.push({ms:earliestMs-oneDay,label:"Início",state:"start"});
    dateKeys.forEach(k=>{
      const fxs=dateMap.get(k);
      let hasLive=false;
      fxs.forEach(fx=>{
        const isLive=!apiTestIsFinal(fx)&&apiTestIsActiveFixture(fx);
        if(isLive){liveCount++;hasLive=true;}
        else finalCount++;
      });
      positions.push({ms:parseDateKey(k).getTime(),label:chartFormatDateKey(k),state:hasLive?"live":"final",dateKey:k});
    });
  }else{
    positions.push({ms:Date.now(),label:"Início",state:"start"});
  }
  dateKeys.forEach(k=>{
    const fxs=dateMap.get(k);
    series.forEach(line=>{
      let dayGain=0;
      fxs.forEach(fixture=>{
        const prediction=apiTestPrediction(line.i,fixture.id);
        const info=apiTestScoreInfo(prediction,fixture);
        dayGain+=info?info.value:0;
      });
      totals[line.i]+=dayGain;
      line.values.push(totals[line.i]);
    });
  });
  const labels=positions.map(p=>p.label);
  const states=positions.map(p=>p.state);
  let xRel=positions.map(()=>0);
  if(positions.length>1){
    const startMs=positions[0].ms;
    const endMs=positions[positions.length-1].ms;
    const span=Math.max(oneDay,endMs-startMs);
    xRel=positions.map(p=>(p.ms-startMs)/span);
  }
  const allValues=series.flatMap(line=>line.values);
  const maxVal=Math.max(3,...allValues);
  const minVal=Math.min(0,...allValues);
  return {states,labels,xRel,series,maxVal,minVal,liveCount,finalCount,fixtureCount:fixtures.length,dateCount:dateKeys.length};
}

function syncApiTestRealtimeSubscription(){
  const shouldRun=Boolean(activeTab==="api-test"&&remoteClient&&remoteSession);

    apiTestRealtimeChannel=remoteClient
      .channel("api-test-live-scores")
      .on("postgres_changes",{event:"*",schema:"public",table:"live_scores"},queueApiTestRealtimeRefresh)
      .subscribe();
  }else if(!shouldRun&&apiTestRealtimeChannel!==null){
    if(remoteClient) remoteClient.removeChannel(apiTestRealtimeChannel);
    apiTestRealtimeChannel=null;
    if(apiTestRealtimeReloadTimer!==null){
      clearTimeout(apiTestRealtimeReloadTimer);
      apiTestRealtimeReloadTimer=null;
    }
  }
  if(shouldRun&&apiTestPollTimer===null){

      if(activeTab!=="api-test"||!remoteClient||!remoteSession) return;
      if(document.hidden) return;

function predictionProgress(){
  const expected=S.participants.length*GAMES.length;
  const filled=S.participants.reduce((total,_,pi)=>{
    return total+GAMES.filter(game=>isPredictionComplete(game,S.palpites[`${pi}_${game.id}`])).length;
  },0);
  return {filled,expected,pct:expected?Math.round(filled*100/expected):0};
}

  return Boolean(entry&&entry.s1!=null&&entry.s2!=null);
}
function isPredictionComplete(game,pal){
  if(!hasScore(pal)) return false;
  if(!game?.ko||+pal.s1!==+pal.s2) return true;
  return koAdvancerComplete(game,pal);
}

function rankingTimeline(rows){
  const resolved=GAMES.filter(g=>S.results[g.id]).sort(compareGameSchedule);
  const dateMap=new Map();
  resolved.forEach(game=>{
    const key=game.date||"";
    if(!key) return;
    if(!dateMap.has(key)) dateMap.set(key,[]);
    dateMap.get(key).push(game);
  });
  const dateKeys=Array.from(dateMap.keys()).sort();
  const actual=S.actualPodio||{};
  const includePodio=["p1","p2","p3","p4"].some(k=>norm(actual[k]));
  const oneDay=86400000;
  const totals={};
  const series=rows.map((p,idx)=>{
    totals[p.i]=0;
    return {i:p.i,name:p.name,color:RANKING_SERIES_COLORS[idx%RANKING_SERIES_COLORS.length],values:[0]};
  });
  const positions=[];
  if(dateKeys.length){
    const earliestMs=parseDateKey(dateKeys[0]).getTime();
    positions.push({ms:earliestMs-oneDay,label:"Início",state:"start"});
    dateKeys.forEach(k=>positions.push({ms:parseDateKey(k).getTime(),label:chartFormatDateKey(k),state:"final",dateKey:k}));
  }else{
    positions.push({ms:Date.now(),label:"Início",state:"start"});
  }
  dateKeys.forEach(k=>{
    const games=dateMap.get(k);
    series.forEach(line=>{
      let gain=0;
      games.forEach(g=>{
        const res=S.results[g.id];
        const pal=S.palpites[`${line.i}_${g.id}`];
        const v=score(pal,res,g);
        if(v!=null) gain+=v;
      });
      totals[line.i]+=gain;
      line.values.push(totals[line.i]);
    });
  });
  if(includePodio){
    const podioMs=positions.length?positions[positions.length-1].ms+(2*oneDay):Date.now();
    positions.push({ms:podioMs,label:"Pódio",state:"podio"});
    series.forEach(line=>{
      totals[line.i]+=podioScore(S.podio[line.i]||{},actual);
      line.values.push(totals[line.i]);
    });
  }
  const labels=positions.map(p=>p.label);
  const states=positions.map(p=>p.state);
  let xRel=positions.map(()=>0);
  if(positions.length>1){
    const startMs=positions[0].ms;
    const endMs=positions[positions.length-1].ms;
    const span=Math.max(oneDay,endMs-startMs);
    xRel=positions.map(p=>(p.ms-startMs)/span);
  }
  const allValues=series.flatMap(line=>line.values);
  const maxVal=Math.max(3,...allValues);
  const minVal=Math.min(0,...allValues);
  return {labels,states,xRel,series,maxVal,minVal,resolvedCount:resolved.length,dateCount:dateKeys.length,includePodio};
}
function rankingLinePath(values,width,height,padX,padY,minVal,maxVal){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,values.length-1);
  const range=Math.max(1,maxVal-minVal);
  return values.map((value,index)=>{
    const x=padX+(usableWidth*(index/steps));
    const y=height-padY-(usableHeight*((value-minVal)/range));
    return `${index===0?"M":"L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
  }).join(" ");
}
function rankingLinePathSegmented(values,states,width,height,padX,padY,minVal,maxVal){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,values.length-1);
  const range=Math.max(1,maxVal-minVal);
  const pt=(value,index)=>{
    const x=padX+(usableWidth*(index/steps));
    const y=height-padY-(usableHeight*((value-minVal)/range));
    return `${x.toFixed(2)} ${y.toFixed(2)}`;
  };
  const solid=[],dashed=[];
  for(let i=1;i<values.length;i++){
    const seg=`M ${pt(values[i-1],i-1)} L ${pt(values[i],i)}`;
    if(states[i]==="live") dashed.push(seg); else solid.push(seg);
  }
  return {solid:solid.join(" "),dashed:dashed.join(" ")};
}
function rankingLinePathFlex(values,xFor,yFor){
  return values.map((value,index)=>`${index===0?"M":"L"} ${xFor(index).toFixed(2)} ${yFor(value).toFixed(2)}`).join(" ");
}
function rankingLinePathSegmentedFlex(values,states,xFor,yFor){
  const pt=(value,index)=>`${xFor(index).toFixed(2)} ${yFor(value).toFixed(2)}`;
  const solid=[],dashed=[];
  for(let i=1;i<values.length;i++){
    const seg=`M ${pt(values[i-1],i-1)} L ${pt(values[i],i)}`;
    if(states[i]==="live") dashed.push(seg); else solid.push(seg);
  }
  return {solid:solid.join(" "),dashed:dashed.join(" ")};
}
function rankingPointDot(value,index,totalPoints,width,height,padX,padY,minVal,maxVal,color){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,totalPoints-1);
  const range=Math.max(1,maxVal-minVal);
  const x=padX+(usableWidth*(index/steps));
  const y=height-padY-(usableHeight*((value-minVal)/range));
  return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="2"></circle>`;
}

  const presetIds=mode==="top3"?rows.slice(0,3).map(p=>p.i):rows.map(p=>p.i);
  const hasAllPreset=presetIds.every(id=>rankingChartSelection.includes(id));
  rankingChartSelection=hasAllPreset
    ?rankingChartSelection.filter(id=>!presetIds.includes(id))
    :Array.from(new Set([...rankingChartSelection,...presetIds]));
  if(activeTab==="ranking") renderRanking();
  if(chartExpanded==="ranking") renderChartModal();
}

function renderRankingChart(rows,isExpanded=false){
  if(!rankingChartTouched&&!rankingChartSelection.length) rankingChartSelection=rankingChartDefaultSelection(rows);
  const selected=rows.filter(p=>rankingChartSelection.includes(p.i));
  const top3Ids=rows.slice(0,3).map(p=>p.i);
  const allIds=rows.map(p=>p.i);
  const top3Active=top3Ids.length>0&&top3Ids.every(id=>rankingChartSelection.includes(id));
  const allActive=allIds.length>0&&allIds.every(id=>rankingChartSelection.includes(id));
  const chart=rankingTimeline(rows);
  const padX=42;
  const padY=22;
  const padRight=isExpanded?140:104;
  const padBottom=isExpanded?50:44;
  const lineHeight=isExpanded?320:300;
  const lineWidth=760;
  const usableWidth=lineWidth-padX-padRight;
  const usableHeight=lineHeight-padY-padBottom;
  const tickValues=chartIntegerTicks(chart.minVal,chart.maxVal,isExpanded?14:11);
  const range=Math.max(1,chart.maxVal-chart.minVal);
  const points=chart.labels.length;
  const xFor=index=>padX+(usableWidth*(chart.xRel?.[index]??(index/Math.max(1,points-1))));
  const yFor=value=>padY+usableHeight-(usableHeight*((value-chart.minVal)/range));
  const summary=[
    chart.dateCount?`${chart.dateCount} ${chart.dateCount===1?"dia":"dias"} com jogo`:"Sem jogos apurados ainda",
    chart.resolvedCount?`${chart.resolvedCount} ${chart.resolvedCount===1?"jogo":"jogos"} apurados`:"",
    chart.includePodio?"Pódio oficial incluído":"",
    selected.length?`${selected.length} de ${rows.length} no gráfico`:""
  ].filter(Boolean);
  const axisMax=isExpanded?14:9;
  const axisIdx=chartAxisIndexes(points,axisMax);
  const uniqueLabels=chartUniqueLabels(selected.map(l=>l.name));

    const s=chart.series.find(ss=>ss.i===line.i);

    return {color:s?.color||"#002776",name:uniqueLabels[idx],value:v,y:yFor(v)};

  return `<section class="chart-shell">
    <div class="chart-toolbar">
      <div>
        <div class="section-kicker">Evolução dos pontos</div>

        ${!isExpanded?`<button class="chart-expand-btn" onclick="openChartModal('ranking')" aria-label="Expandir gráfico">⤢ Expandir</button>`:""}
      </div>
    </div>
    <div class="chart-legend">
      ${rows.map((p,idx)=>{
        const color=RANKING_SERIES_COLORS[idx%RANKING_SERIES_COLORS.length];
        const active=rankingChartSelection.includes(p.i);
        return `<button class="chart-chip ${active?"active":""}" onclick="toggleRankingSeries(${p.i})" style="${active?`background:${color}`:""}">
          <span class="chart-dot" style="background:${color}"></span>
          <span>${esc(p.name)}</span>
        </button>`;
      }).join("")}
    </div>
    ${selected.length?`<div class="chart-stage">
      <svg viewBox="0 0 ${lineWidth} ${lineHeight}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Gráfico de evolução da pontuação do ranking">
        <line x1="${padX}" y1="${padY}" x2="${padX}" y2="${padY+usableHeight}" stroke="rgba(0,39,118,.2)" stroke-width="1"></line>
        ${tickValues.map(value=>{
          const y=yFor(value);
          const isZero=value===0;
          return `<g>
            <line x1="${padX}" y1="${y.toFixed(2)}" x2="${(padX+usableWidth).toFixed(2)}" y2="${y.toFixed(2)}" stroke="rgba(0,39,118,${isZero?".22":".12"})" stroke-width="1"></line>

        ${axisIdx.map(i=>{

          const lbl=chart.labels[i]||"";
          const isStart=i===0;
          const isPodio=chart.includePodio&&i===points-1;
          const tx=isStart?x+4:x;
          const ty=padY+usableHeight+(isStart?15:17);
          const anchor=isStart?"start":"middle";
          const rot=isStart?0:-32;
          return `<g>
            <line x1="${x.toFixed(2)}" y1="${(padY+usableHeight).toFixed(2)}" x2="${x.toFixed(2)}" y2="${(padY+usableHeight+5).toFixed(2)}" stroke="rgba(0,39,118,.25)" stroke-width="1"></line>
            <text class="chart-axis-tick ${isStart?"is-start":""} ${isPodio?"is-podio":""}" x="${tx.toFixed(2)}" y="${ty.toFixed(2)}" text-anchor="${anchor}" font-size="11" fill="#41516d" font-weight="850"${rot?` transform="rotate(${rot} ${tx.toFixed(2)} ${ty.toFixed(2)})"`:""}>${esc(lbl)}</text>

        }).join("")}
        ${selected.map(line=>{

              const isLast=index===values.length-1;

            ${connector}

          </g>`;
        }).join("")}
      </svg>
    </div>`:`<div class="chart-empty">Ative pelo menos um participante para desenhar a curva de evolução.</div>`}
    <div class="chart-axis">${summary.map(label=>`<span>${esc(label)}</span>`).join("")}</div>

function copaGameState(game){
  if(S.results[game.id]) return "final";
  const kickoff=game.utc?new Date(game.utc).getTime():NaN;
  if(Number.isFinite(kickoff)){
    const now=Date.now();
    if(now>=kickoff&&now<kickoff+2*60*60*1000) return "live";
    if(now>=kickoff) return "closed";
  }
  return "upcoming";
}
function copaGameStateLabel(game){
  const state=copaGameState(game);
  if(state==="final") return "Final";
  if(state==="live") return "Ao vivo";
  if(state==="closed") return "Fechado";
  return "Programado";
}
function copaRoundLabel(game){
  if(game.ko) return game.matchNo?`Jogo ${game.matchNo}`:game.phase;
  return game.round?`Rodada ${game.round}`:"Fase de grupos";
}
function copaDayTitle(key){
  const d=parseDateKey(key);
  if(!d||Number.isNaN(d.getTime())) return "Sem data";
  return new Intl.DateTimeFormat("pt-BR",{weekday:"long",day:"2-digit",month:"long"}).format(d);
}

}
function copaBaseGamesByPhase(){
  if(jFilter==="all") return GAMES;
  if(jFilter.startsWith("g-")){
    const gr=jFilter.slice(2);
    return GAMES.filter(g=>g.phase===`Grupo ${gr}`);
  }
  return GAMES.filter(g=>g.phaseKey===jFilter);
}
function copaVisibleGames(){
  const search=jogosSearch.trim().toLowerCase();
  return copaBaseGamesByPhase().filter(game=>{
    const teams=gameTeams(game);
    const haystack=`${game.id} ${game.phase} ${teams.t1} ${teams.t2}`.toLowerCase();
    if(search&&!haystack.includes(search)) return false;
    const state=copaGameState(game);
    if(jogosStatusFilter==="open"&&state!=="upcoming") return false;
    if(jogosStatusFilter==="live"&&state!=="live") return false;
    if(jogosStatusFilter==="finished"&&state!=="final") return false;
    if(jogosStatusFilter==="pending"&&state==="final") return false;
    return true;
  }).sort(compareGameSchedule);
}
