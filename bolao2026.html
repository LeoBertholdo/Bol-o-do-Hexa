function koAdvancerControl(game,teams,draft,disabled){
  if(!game.ko) return "";
  const tied=Number(draft.s1)===Number(draft.s2);
  const visible=koAdvancerVisible(draft);
  const selectDisabled=disabled||!visible;
  const selected=koOutcomeValue(draft.koWinner,draft.koDecision);
  return `<div class="ko-advancer ${visible?"":"hidden"} ${tied?"":"muted"}" id="advwrap_${game.id}">
    <label for="adv_${game.id}">Empate: como foi decidido?</label>
    <select class="txt-select" id="adv_${game.id}" onchange="setResTiebreak('${game.id}',this.value)" ${selectDisabled?"disabled":""}>
      <option value="">Selecione o desempate</option>
      ${koOutcomeOptions(teams,selected)}
    </select>
  </div>`;
}
function koAdvancerVisible(draft){
  return Number(draft.s1)===Number(draft.s2)&&Boolean(draft.touched||draft.showKoAdvancer||draft.koWinner||draft.koDecision);
}
function koOutcomeValue(team,decision){
  const cleanTeam=norm(team);
  const cleanDecision=normalizeKoDecision(decision);
  return cleanTeam&&cleanDecision?`${cleanDecision}::${cleanTeam}`:"";
}
function koAdvancerValue(team){
  return norm(team);
}
function parseKoAdvancerValue(value){
  const raw=String(value||"");
  const parsed=parseKoOutcomeValue(raw);
  return parsed.koWinner||norm(raw);
}
function parseKoOutcomeValue(value){
  const raw=String(value||"");
  const cut=raw.indexOf("::");
  if(cut<0) return {koWinner:"",koDecision:""};
  return {koDecision:normalizeKoDecision(raw.slice(0,cut)),koWinner:norm(raw.slice(cut+2))};
}
function koOutcomeOptions(teams,selected){
  return [teams.t1,teams.t2].filter(Boolean).flatMap(team=>{
    return KO_DECISIONS.map(([decision,label])=>{
      const value=koOutcomeValue(team,decision);
      return `<option value="${esc(value)}" ${selected===value?"selected":""}>${esc(teamFlag(team)+" "+team)} passa ${esc(label)}</option>`;
    });
  }).join("");
}
function setJFilter(k){jFilter=k;renderJogos();}
function setResDraft(id,w,v){
  if(!resultDrafts[id]) resultDrafts[id]={s1:0,s2:0};
  const n=parseInt(v,10);
  const draft=resultDrafts[id];
  draft[w===1?"s1":"s2"]=!Number.isNaN(n)&&n>=0?Math.min(30,n):0;
  draft.touched=true;
  draft.showKoAdvancer=gameById(id)?.ko&&Number(draft.s1)===Number(draft.s2);
  updateKoAdvancerControl(id);
}
function setResTiebreak(id,value){
  if(!resultDrafts[id]) resultDrafts[id]={s1:0,s2:0};
  Object.assign(resultDrafts[id],parseKoOutcomeValue(value));
}
function updateKoAdvancerControl(id){
  const game=gameById(id);
  if(!game?.ko) return;
  const draft=resultDrafts[id]||{s1:0,s2:0};
  const tied=Number(draft.s1)===Number(draft.s2);
  const visible=koAdvancerVisible(draft);
  const wrap=document.getElementById(`advwrap_${id}`);
  const select=document.getElementById(`adv_${id}`);
  if(wrap){
    wrap.classList.toggle("hidden",!visible);
    wrap.classList.toggle("muted",!tied);
  }
  if(select){
    select.disabled=!visible;
    if(!tied) select.value="";
  }
  if(!tied){
    delete draft.koWinner;
    delete draft.koDecision;
  }
}
function confirmRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  const game=gameById(id);
  const teams=gameTeams(game);
  if(game.ko&&!teams.ready){toast("Complete os jogos anteriores para liberar este confronto.");return;}
  const rawS1=parseInt(document.getElementById(`r1_${id}`)?.value,10);
  const rawS2=parseInt(document.getElementById(`r2_${id}`)?.value,10);
  if(Number.isNaN(rawS1)||Number.isNaN(rawS2)||rawS1<0||rawS2<0){toast("Placar inválido.");return;}
  const s1=Math.min(30,rawS1);
  const s2=Math.min(30,rawS2);
  const result={s1,s2};
  if(game.ko&&s1===s2){
    const selected=parseKoOutcomeValue(document.getElementById(`adv_${id}`)?.value||koOutcomeValue(resultDrafts[id]?.koWinner,resultDrafts[id]?.koDecision));
    if(![teams.t1,teams.t2].includes(selected.koWinner)||!koDecisionLabel(selected.koDecision)){
      if(!resultDrafts[id]) resultDrafts[id]={s1,s2};
      Object.assign(resultDrafts[id],{s1,s2,touched:true,showKoAdvancer:true});
      updateKoAdvancerControl(id);
      toast("Escolha como o empate foi decidido.");
      return;
    }
    result.koWinner=selected.koWinner;
    result.koDecision=selected.koDecision;
  }
  S.results[id]=result;
  delete resultDrafts[id];
  const clearedIds=clearDependentKnockouts(id);
  save();
  saveResultRemote(id);
  // Propaga a cascata de deleção ao Supabase para evitar que o poll ressuscite resultados inválidos
  if(remoteClient&&isAdmin()&&clearedIds.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedIds));
  }
  toast("Resultado salvo.");
  render(activeTab);
}
// Retorna array de game_ids deletados para que o chamador possa propagá-los ao Supabase
function clearDependentKnockouts(id){
  const order=["R32","R16","QF","SF","P3","FINAL"];
  const prefix=id.split("_")[0];
  const idx=order.indexOf(prefix);
  const cleared=[];
  if(idx<0&&id!=="P3"&&id!=="FINAL"){
    if(id.startsWith("G")){
      koGames().forEach(g=>{
        if(S.results[g.id]) cleared.push(g.id);
        delete S.results[g.id];
        delete resultDrafts[g.id];
      });
    }
    return cleared;
  }
  const start=idx<0?order.length:idx+1;
  koGames().forEach(g=>{
    const gp=g.id.split("_")[0];
    if(order.indexOf(gp)>=start){
      if(S.results[g.id]) cleared.push(g.id);
      delete S.results[g.id];
      delete resultDrafts[g.id];
    }
  });
  return cleared;
}
function clearRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  if(!confirm("Remover este resultado?")) return;
  delete S.results[id];
  resultDrafts[id]={s1:0,s2:0};
  const clearedOnRemove=clearDependentKnockouts(id);
  save();
  deleteResultRemote(id);
  // Propaga a cascata ao Supabase
  if(remoteClient&&isAdmin()&&clearedOnRemove.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedOnRemove));
  }
  render(activeTab);
}

function palInitials(name){
  if(!name) return "?";
  const parts=String(name).trim().split(/\s+/);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

  // R32 grouped by side (matches that feed into left vs right bracket)
  const r32LeftIds=new Set();
  const r32RightIds=new Set();
  const matchNoToId=Object.fromEntries(koGames().filter(g=>g.phaseKey==="r32").map(g=>[g.matchNo,g.id]));
  r16Left.forEach(g=>(g.sources||[]).forEach(s=>r32LeftIds.add(matchNoToId[s])));
  r16Right.forEach(g=>(g.sources||[]).forEach(s=>r32RightIds.add(matchNoToId[s])));

  const r32Left=r32.filter(g=>r32LeftIds.has(g.id));
  const r32Right=r32.filter(g=>r32RightIds.has(g.id));

  const bracketHTML=`

        ${qfLeft.map(g=>bracketCard(g)).join("")}

      <div class="bracket-col">
        <div class="bracket-col-head">Semi</div>
        ${bracketCard(sfLeft)}

      </div>
      <div class="bracket-col">
        <div class="bracket-col-head">Semi</div>
        ${bracketCard(sfRight)}
      </div>
      <div class="bracket-col">
        <div class="bracket-col-head">Quartas</div>
        ${qfRight.map(g=>bracketCard(g)).join("")}
      </div>
      <div class="bracket-col">
        <div class="bracket-col-head">Oitavas</div>
        ${r16Right.map(g=>bracketCard(g)).join("")}
      </div>
    </div>`;

  const r32HTML=`
    <div class="r32-head">
      <span>\u{1F3DF}\u{FE0F} 16-avos de final</span>
      <span class="count">${r32.length} confrontos</span>
    </div>
    <div class="r32-grid">
      ${r32Left.map(g=>bracketCard(g)).join("")}
      ${r32Right.map(g=>bracketCard(g)).join("")}

  const mobileSections=[
    {title:"16-avos de final",games:r32,extraCls:""},
    {title:"Oitavas de final",games:[...r16Left,...r16Right],extraCls:""},
    {title:"Quartas de final",games:[...qfLeft,...qfRight],extraCls:""},
    {title:"Semifinais",games:[sfLeft,sfRight].filter(Boolean),extraCls:""},
    {title:"Disputa de 3º lugar",games:p3Game?[p3Game]:[],extraCls:"p3-section"},
    {title:"Final",games:finalGame?[finalGame]:[],extraCls:"final-section"}

  const mobileHTML=`<div class="ko-mobile-list">
    ${mobileSections.filter(s=>s.games.length).map(s=>`
      <div class="ko-mobile-section ${s.extraCls}">
        <div class="ko-mobile-head"><span>${esc(s.title)}</span><span class="count">${s.games.length} confronto${s.games.length>1?"s":""}</span></div>
        <div class="ko-mobile-cards">${s.games.map(g=>bracketCard(g)).join("")}</div>
      </div>`).join("")}
  </div>`;

  return `<div class="panel" style="padding:14px">

function predictionStateChipsHTML(key,game,pal,opts={}){
  const complete=isPredictionComplete(game,pal);
  const closed=predictionDeadlineClosed(game);
  const chips=[];
  if(complete){
    let cls="valid";
    let label="Salvo";
    let title="Palpite completo e salvo.";
    if(pendingPredictionWrites.has(key)){
      cls="saving";
      label="Salvando";
      title="Palpite válido, aguardando confirmação online.";
    }else if(isOnlineMode()&&dirtyPredictionKeys.has(key)){
      cls="local";
      label="Salvo local";
      title="Palpite válido, salvo neste navegador e aguardando sincronização.";
    }
    chips.push(`<span class="pal-state-chip ${cls}" title="${esc(title)}"><span class="dot"></span>${esc(label)}</span>`);
  }
  if(closed){
    const label=formatPredictionDeadline(predictionDeadlineMs(game));
    const title=label?`Prazo encerrado em ${label}.`:"Prazo encerrado.";
    chips.push(`<span class="pal-state-chip closed" title="${esc(title)}"><span class="dot"></span>Prazo encerrado</span>`);

function bracketCard(game,opts){
  if(!game) return "";
  opts=opts||{};
  const key=`${palPi}_${game.id}`;
  const pal=S.palpites[key]||{};
  const res=S.results[game.id];
  const teams=gameTeams(game);
  const canEdit=canEditParticipant(palPi);
  const gameStarted=!!(game.utc&&new Date()>=new Date(game.utc));
  const deadlineClosed=predictionDeadlineClosed(game);
  const disabled=!canEdit||deadlineClosed;
  const waiting=!teams.ready;
  const dateParts=game.date?formatGameDateParts(game.date):null;

  let cls="bracket-card";
  if(opts.accent) cls+=" "+opts.accent;
  if(waiting) cls+=" waiting";
  if(gameStarted&&!res) cls+=" live";

  let badge="";
  if(pal.s1!=null&&pal.s2!=null&&res){
    const details=scoreDetails(pal,res,game);
    const sc=details?.pts;
    if(details?.exact){cls+=" hit";badge=`<span class="bk-badge">+${sc} cravou</span>`;}
    else if(sc>0) badge=`<span class="bk-badge">+${sc}</span>`;
    else if(sc===-2) badge=`<span class="bk-badge" style="background:linear-gradient(135deg,#ef4444,#991b1b)">-2</span>`;
    else badge=`<span class="bk-badge" style="background:#9ca3af">0</span>`;
  }

  const v1=canEdit&&!deadlineClosed&&!waiting?(pal.s1??null):pal.s1;
  const v2=canEdit&&!deadlineClosed&&!waiting?(pal.s2??null):pal.s2;
  const inp=(id,val,which)=>`<input id="${id}" type="number" min="0" max="30" inputmode="numeric" value="${val==null?"":esc(val)}" placeholder="–" ${disabled||waiting?"disabled":""} onchange="setPal(${palPi},'${game.id}',${which},this.value)">`;

  const rowHTML=(name,side,val,which)=>{
    const flag=teamFlag(name);
    const placeholder=!flag;
    const rcls=`bk-row ${placeholder?"muted":""}`;
    return `<div class="${rcls}">
      <div class="nm">${flag?`<span class="flag">${flag}</span>`:""}<span class="txt">${esc(name)}</span></div>
      ${inp(`bk_${palPi}_${game.id}_${which}`,val,which)}
    </div>`;
  };

  const meta=`<div class="bk-meta">
    <span>${esc(game.id)}</span>
    ${dateParts?`<span class="date">${esc(dateParts.dayMonth)}${game.time?` · ${esc(game.time)}`:""}</span>`:""}
  </div>`;

  return `<div class="${cls}">
    ${badge}
    ${meta}
    ${rowHTML(teams.t1,"t1",v1,1)}
    <div class="bk-divider"></div>
    ${rowHTML(teams.t2,"t2",v2,2)}
    ${palTiebreakControl(palPi,game,teams,pal,disabled||waiting,"bk")}
    ${predictionStateSlotHTML("bk",palPi,game.id,game,pal,{compact:true})}
  </div>`;
}

function setPal(pi,gid,w,v){
  if(!canEditParticipant(pi)){toast("Você só pode alterar seus próprios palpites.");renderPalpites();return;}
  const game=gameById(gid);
  if(predictionDeadlineClosed(game)){
    toast(predictionClosedMessage(game));
    renderPalpites();
    return;
  }
  const key=`${pi}_${gid}`;
  if(!S.palpites[key]) S.palpites[key]={};
  const n=parseInt(v,10);
  if(!Number.isNaN(n)&&n>=0){
    const clamped=Math.min(30,n);
    if(w===1) S.palpites[key].s1=clamped;
    else S.palpites[key].s2=clamped;
    completePredictionVisibleZero(S.palpites[key]);
  }else{
    if(w===1) delete S.palpites[key].s1;
    else delete S.palpites[key].s2;
  }
  if(!game?.ko||!hasScore(S.palpites[key])||+S.palpites[key].s1!==+S.palpites[key].s2){
    delete S.palpites[key].koWinner;
    delete S.palpites[key].koDecision;
  }
  save();
  if(remoteClient) savePredictionRemote(pi,gid);
  else dirtyPredictionKeys.delete(key);
  renderPalpites();
}
function setPalTiebreak(pi,gid,value){
  if(!canEditParticipant(pi)){toast("Você só pode alterar seus próprios palpites.");renderPalpites();return;}
  const game=gameById(gid);
  if(predictionDeadlineClosed(game)){
    toast(predictionClosedMessage(game));
    renderPalpites();
    return;
  }
  const key=`${pi}_${gid}`;
  const pal=S.palpites[key];
  if(!game?.ko||!hasScore(pal)||+pal.s1!==+pal.s2){
    toast("O desempate só vale para empate no mata-mata.");
    renderPalpites();
    return;
  }
  const teams=gameTeams(game);
  const selected=parseKoAdvancerValue(value);
  if(![teams.t1,teams.t2].includes(selected)){
    delete pal.koWinner;
    delete pal.koDecision;
  }else{
    pal.koWinner=selected;
    delete pal.koDecision;
  }
  save();
  savePredictionRemote(pi,gid);
  renderPalpites();
}

        <div class="cfg-lbl"><strong>Total arrecadado</strong><span>${n} participantes × ${brl(S.config.entryValue)}.</span></div>
        <span style="font-weight:950;color:var(--green)">${brl(total)}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Distribuição dos prêmios</div>
      ${["1º lugar","2º lugar","3º lugar"].map((lbl,i)=>`
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>${lbl}</strong><span>${brl(prizes[i])}</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          <input class="cfg-inp" type="number" min="0" max="100" value="${pcts[i]}" onchange="updPrize(${i},+this.value)" ${locked?"disabled":""}>
          <span class="microcopy">%</span>
        </div>
      </div>`).join("")}
      <div class="microcopy" style="font-weight:850;color:${Math.abs(diff)<1?"#065f46":"#b91c1c"}">
        ${Math.abs(diff)<1?"Distribuição balanceada.":`Diferença de ${brl(Math.abs(diff))}; ajuste os percentuais.`}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Regras de pontuação</div>
      <div class="rules-box">
        <div><strong>Cravada:</strong> placar exato vale <strong style="color:#065f46">+3 pontos</strong>; empate no mata-mata vale 2 antes do bônus de classificado.</div>
        <div><strong>Resultado certo:</strong> vencedor ou empate correto, sem placar exato, vale <strong style="color:#1e40af">+1 ponto</strong>.</div>
        <div><strong>Invertida:</strong> placar exatamente ao contrário vale <strong style="color:#b91c1c">−2 pontos</strong>.</div>
        <div><strong>Erro:</strong> resultado incorreto vale <strong>0 ponto</strong>.</div>
        <hr style="margin:10px 0;border:none;border-top:1px solid var(--border)">
        <div><strong>Pódio:</strong> campeão +20, vice +10, 3º lugar +5 e 4º lugar +3.</div>
        <div><strong>Mata-mata:</strong> acertar quem passa soma <strong style="color:#065f46">+1 ponto extra</strong>. Se o jogo empatar no tempo regulamentar, só pontua quem também palpitou empate: empate cravado vale 2 pontos, empate não cravado vale 1, e acertar quem passa soma +1.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Backup de dados</div>
      <div class="action-row">
        <button class="action-btn" onclick="saveBackup()">Exportar JSON</button>
        <label class="action-label">Importar JSON<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
        ${isOnlineMode()&&isAdmin()?`<button class="action-btn secondary" onclick="pushLocalStateToRemote()">Publicar dados locais no Supabase</button>`:""}
        ${canEditResults()?`<button class="action-btn secondary" onclick="resetCompetitionData()">Resetar competição</button>`:""}
      </div>
      <div class="microcopy" style="margin-top:10px">Os dados também ficam neste navegador como cópia de segurança. Exporte um backup regularmente.</div>
      <div class="microcopy" style="margin-top:4px">O reset apaga resultados, palpites e pódios; participantes, contas vinculadas e configurações permanecem.</div>
      ${S.savedAt?`<div class="microcopy" style="margin-top:4px">Último salvamento: ${new Date(S.savedAt).toLocaleString("pt-BR")}.</div>`:""}
    </div>
  </div>`;
  document.getElementById("tab-config").innerHTML=h;
}
function updCfg(k,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config[k]=Number.isFinite(v)&&v>0?v:S.config[k];
  save();
  saveConfigRemote();
  renderConfig();
}
function updPrize(i,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config.prizePercents[i]=Number.isFinite(v)?Math.max(0,Math.min(100,v)):0;
  save();
  saveConfigRemote();
  renderConfig();
}
// ── Gerenciamento de convidados (invited_emails) ──────────────────────────
async function loadInvitedEmails(){
  if(!remoteClient||!remoteSession||!isAdmin()) return;
  const {data}=await remoteClient.from('invited_emails').select('email,participant_index').order('participant_index');
  invitedEmailsList=data||[];
  if(activeTab==='config') renderConfig();
}
async function addInvitedEmail(){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  const email=(document.getElementById('inviteEmailInp')?.value||'').toLowerCase().trim();
  const idx=parseInt(document.getElementById('inviteIdxSel')?.value,10);
  if(!email||!email.includes('@')){toast("Informe um e-mail válido.");return;}
  if(!Number.isInteger(idx)||idx<0||idx>=S.participants.length){toast("Escolha um participante válido.");return;}
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').upsert({email,participant_index:idx},{onConflict:'email'}));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite salvo para ${email}.`);}
}
async function removeInvitedEmail(email){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  if(!confirm(`Remover o convite de ${email}?\nSe esta pessoa já tiver vinculado a conta, ela não conseguirá criar um novo perfil caso saia.`)) return;
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').delete().eq('email',email));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite de ${email} removido.`);}
}

function resetCompetitionDataState(){
  S.results={};
  S.palpites={};
  S.podio={};
  S.actualPodio={};
  save();
}

async function resetCompetitionData(){
  const message=isOnlineMode()
    ? "Isso vai apagar todos os resultados, palpites e pódios salvos aqui e no Supabase. Participantes e configurações serão mantidos. Deseja continuar?"
    : "Isso vai apagar todos os resultados, palpites e pódios salvos neste navegador. Participantes e configurações serão mantidos. Deseja continuar?";
  if(!window.confirm(message)) return;
  if(isOnlineMode()){
    if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
    if(!isAdmin()){toast("Só o administrador pode resetar a competição.");return;}
    setSyncStatus("warn","Limpando dados da competição...");
    const responses=await Promise.all([
      remoteClient.from("results").delete().neq("game_id",""),
      remoteClient.from("predictions").delete().gte("participant_index",0),
      remoteClient.from("podium_predictions").delete().gte("participant_index",0),
      remoteClient.from("actual_podium").upsert({
        id:"main",
        p1:null,
        p2:null,
        p3:null,
        p4:null,
        updated_by:remoteSession.user.id
      },{onConflict:"id"})
    ]);
    const failed=responses.find(r=>r.error);
    if(failed){
      setSyncStatus("err",remoteErrorText(failed.error));
      toast(remoteErrorText(failed.error));
      await loadRemoteData(false);
      return;
    }
  }
  resetCompetitionDataState();
  render(activeTab);
  if(isOnlineMode()){
    await loadRemoteData(false);
    toast("Competição resetada no navegador e no Supabase.");
  }else{
    toast("Competição resetada neste navegador.");
  }
}

function saveBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`bolao2026_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Backup exportado.");
}
function importBackup(input){
  const f=input.files[0];
  if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      S=migrateState(JSON.parse(e.target.result));
      save();
      toast(isOnlineMode()&&isAdmin()?"Backup importado. Use Publicar dados locais no Supabase para enviar online.":"Backup importado.");
      render(activeTab);
    }catch(err){toast("Arquivo inválido.");}
  };
  reader.readAsText(f);
}
function toast(msg,ms=2400){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),ms);
}

document.addEventListener("click",event=>{
  const menu=document.getElementById("accountMenu");
  if(authPanelOpen&&menu&&!menu.contains(event.target)) closeAuthPanel();
});
document.addEventListener("keydown",event=>{
  if(event.key==="Escape"&&authPanelOpen) closeAuthPanel();
  if(event.key==="Escape"&&chartExpanded) closeChartModal();
  handleScoreZeroTyping(event);
});
document.addEventListener("input",event=>{
  if(event.target&&event.target.matches&&event.target.matches("input")) trackScoreDraftInput(event.target);
});
document.addEventListener("visibilitychange",handleApiTestVisibilityChange);

render("home");
initRemote();
</script>
