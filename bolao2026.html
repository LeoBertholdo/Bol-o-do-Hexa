  const ok=await remoteWrite(()=>remoteClient.from("profiles").update({role}).eq("id",profileId));
  if(!ok) return;
  await loadRemoteData(false);
  toast(`${targetName} agora está como ${roleLabel(role).toLowerCase()}.`);
}

async function remoteWrite(task){
  if(!remoteClient) return true;
  if(!remoteSession){toast("Entre para salvar online.");return false;}
  setSyncStatus("warn","Salvando online...");
  const {error}=await task();
  if(error){
    setSyncStatus("err",remoteErrorText(error));
    toast(remoteErrorText(error));
    await loadRemoteData(false);
    return false;
  }
  setSyncStatus("ok","Salvo online.");

}

// Empurra os horários estáticos do calendário pra tabela game_kickoffs.
// O trigger no banco usa essa tabela pra impedir palpites após o início do jogo.
// Idempotente — só admins precisam rodar; demais usuários falham por RLS sem problema.
let gameKickoffsSyncedAt=0;
async function syncGameKickoffsRemote(){
  if(!remoteClient||!remoteSession) return;
  if(Date.now()-gameKickoffsSyncedAt<5*60*1000) return; // no máximo 1x a cada 5 min
  const rows=GAMES.filter(g=>g.utc).map(g=>({game_id:g.id,kickoff_utc:g.utc}));
  if(!rows.length) return;
  gameKickoffsSyncedAt=Date.now();
  const {error}=await remoteClient.from("game_kickoffs").upsert(rows,{onConflict:"game_id"});
  if(error){
    // Se a tabela ainda não existir no projeto, não atrapalha o uso. Apenas registra no console.
    if(!/game_kickoffs/.test(error.message||"")) console.warn("game_kickoffs upsert:",error.message);
  }
}

async function pushLocalStateToRemote(){
  if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
  if(!isAdmin()){toast("Só o administrador pode publicar o backup online.");return;}
  if(!window.confirm("Isso vai sobrescrever os dados do Supabase com a cópia deste navegador. Palpites mais recentes feitos por outros participantes podem ser perdidos. Continuar?")) return;
  setSyncStatus("warn","Enviando backup para o Supabase...");
  const adminUserId=remoteSession.user.id;
  const resultRows=Object.entries(S.results).map(([game_id,res])=>({
    game_id,
    s1:res.s1,
    s2:res.s2,
    ko_winner:res.koWinner||null,
    ko_decision:res.koDecision||null,
    after_et_s1:res.afterEt1??null,
    after_et_s2:res.afterEt2??null,
    pens_s1:res.pens1??null,
    pens_s2:res.pens2??null,
    penalty_shootout:res.penaltyShootout?.length?res.penaltyShootout:null,
    updated_by:adminUserId
  }));
  // user_id propositalmente em branco: assim cada participante consegue reclamar
  // a linha como dele na próxima edição (a policy aceita user_id null).
  const predictionRows=Object.entries(S.palpites).map(([key,pal])=>{
    const cut=key.indexOf("_");
    return {
      user_id:null,
      participant_index:Number(key.slice(0,cut)),
      game_id:key.slice(cut+1),
      s1:pal.s1??null,
      s2:pal.s2??null,
      ko_winner:pal.koWinner||null,
      ko_decision:null
    };
  }).filter(row=>Number.isInteger(row.participant_index)&&row.game_id);
  const podiumRows=Object.entries(S.podio).map(([participant_index,pd])=>{
    const clean=normalizePodio(pd);
    return {
      user_id:null,
      participant_index:Number(participant_index),
      p1:clean.p1||null,
      p2:clean.p2||null,
      p3:clean.p3||null,
      p4:clean.p4||null
    };
  }).filter(row=>Number.isInteger(row.participant_index));
  const actualPodioRow=normalizePodio(S.actualPodio||{});
  const writes=[
    remoteClient.from("settings").upsert({id:"main",entry_value:S.config.entryValue,prize_percents:S.config.prizePercents,updated_by:remoteSession.user.id},{onConflict:"id"}),
    remoteClient.from("actual_podium").upsert({
      id:"main",
      p1:actualPodioRow.p1||null,
      p2:actualPodioRow.p2||null,
      p3:actualPodioRow.p3||null,
      p4:actualPodioRow.p4||null,
      updated_by:remoteSession.user.id
    },{onConflict:"id"})
  ];
  if(resultRows.length) writes.push(remoteClient.from("results").upsert(resultRows,{onConflict:"game_id"}));
  if(predictionRows.length) writes.push(remoteClient.from("predictions").upsert(predictionRows,{onConflict:"participant_index,game_id"}));
  if(podiumRows.length) writes.push(remoteClient.from("podium_predictions").upsert(podiumRows,{onConflict:"participant_index"}));
  const responses=await Promise.all(writes);
  const failed=responses.find(r=>r.error);
  if(failed){setSyncStatus("err",remoteErrorText(failed.error));toast(remoteErrorText(failed.error));return;}
  await loadRemoteData(false);
  toast("Backup publicado no Supabase.");
}

  openAuthPanel(mode);
}
function openAuthPanel(mode=authMode){

  authPanelOpen=true;
  renderAuthControls();
  setTimeout(()=>{
    const focusId=!isSignedIn()?"topLoginEmail":(!currentProfile?"topClaimParticipant":"");
    if(focusId) document.getElementById(focusId)?.focus({preventScroll:true});
  },0);
}
function closeAuthPanel(){

}
function handleTopAuthKey(event){
  if(event.key!=="Enter") return;
  event.preventDefault();

  else if(authMode==="signup") signUp("top");

function esc(v){
  return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
}
function jsAttr(v){return esc(JSON.stringify(String(v??"")));}
function norm(v){return String(v||"").trim();}
function optionalScore(v){
  if(v==null||v==="") return null;
  const n=parseInt(v,10);
  return !Number.isNaN(n)&&n>=0?Math.min(30,n):null;
}
function normalizePenaltyShootout(value){
  if(!Array.isArray(value)) return [];
  return value.map(item=>{
    if(!item||typeof item!=="object") return null;
    const side=norm(item.side||item.teamSide||item.team||item.homeAway).toLowerCase();
    const cleanSide=side==="home"||side==="t1"||side==="1"?"t1":side==="away"||side==="t2"||side==="2"?"t2":"";
    if(!cleanSide) return null;
    return {side:cleanSide,scored:Boolean(item.scored)};
  }).filter(Boolean);
}
function normalizeResult(id,result){
  if(!result||typeof result!=="object") return null;
  const s1=parseInt(result.s1,10);
  const s2=parseInt(result.s2,10);
  if(Number.isNaN(s1)||Number.isNaN(s2)||s1<0||s2<0) return null;
  const clean={s1:Math.min(30,s1),s2:Math.min(30,s2)};
  const game=gameById(id);
  const koWinner=norm(result.koWinner||result.ko_winner||result.winner||result.advancer);
  const koDecision=normalizeKoDecision(result.koDecision||result.ko_decision||result.decision);
  if(game?.ko&&koWinner) clean.koWinner=koWinner;
  if(game?.ko&&koDecision) clean.koDecision=koDecision;
  const afterEt1=optionalScore(result.afterEt1??result.after_et_s1??result.aet1??result.afterExtra1);
  const afterEt2=optionalScore(result.afterEt2??result.after_et_s2??result.aet2??result.afterExtra2);
  const pens1=optionalScore(result.pens1??result.pens_s1??result.penalties1);
  const pens2=optionalScore(result.pens2??result.pens_s2??result.penalties2);
  const penaltyShootout=normalizePenaltyShootout(result.penaltyShootout||result.penalty_shootout);
  if(game?.ko&&afterEt1!=null&&afterEt2!=null){clean.afterEt1=afterEt1;clean.afterEt2=afterEt2;}
  if(game?.ko&&pens1!=null&&pens2!=null){clean.pens1=pens1;clean.pens2=pens2;}
  if(game?.ko&&penaltyShootout.length) clean.penaltyShootout=penaltyShootout;
  return clean;
}
function normalizePredictionKey(key,prediction){
  const gid=String(key||"").slice(String(key||"").indexOf("_")+1);
  return normalizePrediction(gid,prediction);
}
function normalizePrediction(id,prediction){
  if(!prediction||typeof prediction!=="object") return null;
  const clean={};
  if(prediction.s1!=null){
    const s1=parseInt(prediction.s1,10);
    if(!Number.isNaN(s1)&&s1>=0) clean.s1=Math.min(30,s1);
  }
  if(prediction.s2!=null){
    const s2=parseInt(prediction.s2,10);
    if(!Number.isNaN(s2)&&s2>=0) clean.s2=Math.min(30,s2);
  }
  completePredictionVisibleZero(clean);
  const game=gameById(id);
  const koWinner=norm(prediction.koWinner||prediction.ko_winner||prediction.winner||prediction.advancer);
  if(game?.ko&&koWinner) clean.koWinner=koWinner;
  return Object.keys(clean).length?clean:null;
}
function normalizeKoDecision(value){
  const key=norm(value).toLowerCase();
  if(!key) return "";
  if(key==="extra_time"||key==="prorrogacao"||key==="prorrogação"||key==="overtime"||key==="et") return "extra_time";
  if(key==="penalties"||key==="penaltis"||key==="pênaltis"||key==="penalty"||key==="pens") return "penalties";
  return KO_DECISION_LABELS[key]?key:"";
}
function koDecisionLabel(key){
  return KO_DECISION_LABELS[normalizeKoDecision(key)]||"";
}
function podioLabel(key){return PODIO_LABELS[key]||key;}
function normalizePodio(podio){
  const next={};
  const seen=new Set();
  PODIO_KEYS.forEach(key=>{
    const value=norm(podio&&podio[key]);
    if(!value||seen.has(value)){
      next[key]="";
      return;
    }
    next[key]=value;
    seen.add(value);
  });
  return next;
}
function podioDuplicateKey(podio,key,value){
  const pick=norm(value);
  if(!pick) return null;
  return PODIO_KEYS.find(other=>other!==key&&norm(podio&&podio[other])===pick)||null;
}
function draftPodio(podio,key,value){
  const next={...normalizePodio(podio)};
  const pick=norm(value);
  const duplicateKey=podioDuplicateKey(next,key,pick);
  if(duplicateKey) return {ok:false,duplicateKey,value:pick,next};
  next[key]=pick;
  return {ok:true,next:normalizePodio(next)};
}

}

function bumpField(id,delta){
  const input=document.getElementById(id);
  if(!input) return;
  const current=input.value===""?-1:parseInt(input.value,10);
  input.value=Math.max(0,Math.min(30,(Number.isNaN(current)?0:current)+delta));
  input.dispatchEvent(new Event("input",{bubbles:true}));
  input.dispatchEvent(new Event("change",{bubbles:true}));
}
function handleScoreZeroTyping(event){
  const input=event.target;
  if(!input||!input.matches||!input.matches("input[data-clear-zero-on-type='true']")) return;
  if(event.metaKey||event.ctrlKey||event.altKey||event.isComposing) return;
  if(!/^\d$/.test(event.key)||input.value!=="0") return;
  event.preventDefault();
  input.value=event.key;
  input.dispatchEvent(new Event("input",{bubbles:true}));
}

function predictedAdvancer(game,pal,teams=gameTeams(game)){
  if(!game?.ko||!pal||!teams.ready) return "";
  if(+pal.s1>+pal.s2) return teams.t1;
  if(+pal.s1<+pal.s2) return teams.t2;
  return koAdvancerComplete(game,pal,teams)?norm(pal.koWinner):"";
}
function actualAdvancer(game,res,teams=gameTeams(game)){
  if(!game?.ko||!res||!teams.ready) return "";
  if(+res.s1>+res.s2) return teams.t1;
  if(+res.s1<+res.s2) return teams.t2;
  return koAdvancerFromResult(game,res,teams);
}
function scoreDetails(pal,res,game=null){
  if(!pal||!res||pal.s1==null||pal.s2==null||res.s1==null||res.s2==null) return null;
  const ps1=+pal.s1, ps2=+pal.s2, rs1=+res.s1, rs2=+res.s2;
  if(game?.ko&&rs1===rs2){
    const teams=gameTeams(game);
    const predicted=predictedAdvancer(game,pal,teams);
    const actual=actualAdvancer(game,res,teams);
    const palDraw=ps1===ps2;
    if(!palDraw) return {pts:0,base:0,passBonus:0,exact:false,koDraw:true};
    const exact=ps1===rs1&&ps2===rs2;
    const base=exact?2:1;
    const passBonus=predicted&&actual&&predicted===actual?1:0;
    return {pts:base+passBonus,base,passBonus,exact,koDraw:true};
  }
  let base=0;
  const exact=ps1===rs1&&ps2===rs2;
  if(exact) base=3;
  else if(ps1!==ps2&&ps1===rs2&&ps2===rs1) base=-2;
  else{
    const pw=ps1>ps2?1:ps1<ps2?2:0;
    const rw=rs1>rs2?1:rs1<rs2?2:0;
    if(pw===rw) base=1;
  }
  let passBonus=0;
  if(game?.ko){
    const teams=gameTeams(game);
    const predicted=predictedAdvancer(game,pal,teams);
    const actual=actualAdvancer(game,res,teams);
    if(predicted&&actual&&predicted===actual) passBonus=1;
  }
  return {pts:base+passBonus,base,passBonus,exact,koDraw:false};
}
function score(pal,res,game=null){
  const details=scoreDetails(pal,res,game);
  return details?details.pts:null;
}
function podioScore(pal,actual){
  if(!pal||!actual) return 0;
  const cleanPal=normalizePodio(pal);
  const cleanActual=normalizePodio(actual);
  let p=0;
  if(cleanActual.p1&&cleanPal.p1===cleanActual.p1) p+=20;
  if(cleanActual.p2&&cleanPal.p2===cleanActual.p2) p+=10;
  if(cleanActual.p3&&cleanPal.p3===cleanActual.p3) p+=5;
  if(cleanActual.p4&&cleanPal.p4===cleanActual.p4) p+=3;
  return p;
}
function playerStats(pi){
  let pts=0,crav=0,corr=0,inv=0,played=0;
  GAMES.forEach(g=>{
    const res=S.results[g.id];
    const pal=S.palpites[`${pi}_${g.id}`];
    const details=scoreDetails(pal,res,g);
    if(!details) return;
    played++;
    pts+=details.pts;
    if(details.exact) crav++;
    if(details.base===1) corr++;
    if(details.base===-2) inv++;
  });
  const pp=podioScore(S.podio[pi]||{},S.actualPodio||{});
  return {pts:pts+pp,crav,corr,inv,played,pp};
}
function ranking(){

    if(b.crav!==a.crav) return b.crav-a.crav;
    if(a.inv!==b.inv) return a.inv-b.inv;

  });
}
function prize(rank){
  const total=S.participants.length*S.config.entryValue;
  const p=S.config.prizePercents;
  if(rank===1) return Math.round(total*p[0]/100);
  if(rank===2) return Math.round(total*p[1]/100);
  if(rank===3) return Math.round(total*p[2]/100);
  return 0;
}

function groupStandings(){
  const tables={};
  Object.entries(GROUPS).forEach(([grp,teams])=>{
    tables[grp]=teams.map(team=>({group:grp,team,played:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,pos:0}));
  });
  groupGames().forEach(game=>{
    const res=S.results[game.id];
    if(!res) return;
    const table=tables[game.group];
    const a=table.find(row=>row.team===game.t1);
    const b=table.find(row=>row.team===game.t2);
    a.played++; b.played++;
    a.gf+=+res.s1; a.ga+=+res.s2; b.gf+=+res.s2; b.ga+=+res.s1;
    a.gd=a.gf-a.ga; b.gd=b.gf-b.ga;
    if(+res.s1>+res.s2){a.w++; b.l++; a.pts+=3;}
    else if(+res.s1<+res.s2){b.w++; a.l++; b.pts+=3;}
    else{a.d++; b.d++; a.pts++; b.pts++;}
  });
  Object.entries(tables).forEach(([group,table])=>{
    tables[group]=rankGroupTable(table,group);
    tables[group].forEach((row,i)=>row.pos=i+1);
  });
  return tables;
}
function teamConductScore(team){
  return Number(TEAM_CONDUCT_SCORES[team]||0);
}
function fifaRankingOrder(team,ranking=FIFA_RANKING_ORDER){
  return Number(ranking[team]||Number.POSITIVE_INFINITY);
}
function fifaRankingCriteria(){
  return FIFA_RANKING_HISTORY.map(ranking=>({value:row=>fifaRankingOrder(row.team,ranking),dir:"asc"}));
}
function splitByCriterion(rows,getValue,dir="desc"){
  const buckets=new Map();
  rows.forEach(row=>{
    const value=getValue(row);
    const key=String(value);
    if(!buckets.has(key)) buckets.set(key,{value,rows:[]});
    buckets.get(key).rows.push(row);
  });
  return Array.from(buckets.values())
    .sort((a,b)=>{
      if(typeof a.value==="number"&&typeof b.value==="number"){
        return dir==="asc"?a.value-b.value:b.value-a.value;
      }
      const result=String(a.value).localeCompare(String(b.value),"pt-BR");
      return dir==="asc"?result:-result;
    })
    .map(bucket=>bucket.rows);
}
function applyCriteriaGroups(rows,criteria){
  return criteria.reduce((groups,criterion)=>{
    return groups.flatMap(group=>group.length<2?[group]:splitByCriterion(group,criterion.value,criterion.dir));
  },[rows]);
}
function sameTeamSet(a,b){
  if(a.length!==b.length) return false;
  const teams=new Set(a.map(row=>row.team));
  return b.every(row=>teams.has(row.team));
}
function headToHeadStats(group,rows){
  const teams=new Set(rows.map(row=>row.team));
  const stats=Object.fromEntries(rows.map(row=>[row.team,{pts:0,gf:0,ga:0,gd:0}]));
  groupGames().forEach(game=>{
    const res=S.results[game.id];
    if(!res||game.group!==group||!teams.has(game.t1)||!teams.has(game.t2)) return;
    const a=stats[game.t1];
    const b=stats[game.t2];
    const s1=+res.s1;
    const s2=+res.s2;
    a.gf+=s1; a.ga+=s2; b.gf+=s2; b.ga+=s1;
    if(s1>s2) a.pts+=3;
    else if(s1<s2) b.pts+=3;
    else{a.pts++; b.pts++;}
  });
  Object.values(stats).forEach(row=>row.gd=row.gf-row.ga);
  return stats;
}
function applyHeadToHeadStep(rows,group){
  const h2h=headToHeadStats(group,rows);
  const groups=applyCriteriaGroups(rows,[
    {value:row=>h2h[row.team].pts,dir:"desc"},
    {value:row=>h2h[row.team].gd,dir:"desc"},
    {value:row=>h2h[row.team].gf,dir:"desc"}
  ]);
  return groups.flatMap(groupRows=>{
    if(groupRows.length<2||sameTeamSet(groupRows,rows)) return [groupRows];
    return applyHeadToHeadStep(groupRows,group);
  });
}
function rankEqualPointRows(rows,group){
  return applyHeadToHeadStep(rows,group).flatMap(groupRows=>{
    if(groupRows.length<2) return groupRows;
    return applyCriteriaGroups(groupRows,[
      {value:row=>row.gd,dir:"desc"},
      {value:row=>row.gf,dir:"desc"},
      {value:row=>teamConductScore(row.team),dir:"desc"},

      {value:row=>row.team,dir:"asc"}

function compareTeams(a,b){
  if(b.pts!==a.pts) return b.pts-a.pts;
  if(b.gd!==a.gd) return b.gd-a.gd;
  if(b.gf!==a.gf) return b.gf-a.gf;
  const conduct=teamConductScore(b.team)-teamConductScore(a.team);
  if(conduct) return conduct;
  for(const ranking of FIFA_RANKING_HISTORY){
    const rankA=fifaRankingOrder(a.team,ranking);
    const rankB=fifaRankingOrder(b.team,ranking);
    if(rankA!==rankB) return rankA-rankB;
  }

}

  GROUP_KEYS.forEach(group=>{

    runners.push(tables[group][1]);
    thirds.push(tables[group][2]);
  });
  winners.sort(compareTeams);
  runners.sort(compareTeams);
  thirds.sort(compareTeams);
  return {ready:true,teams:[...winners,...runners,...thirds.slice(0,8)],winners,runners,thirds:thirds.slice(0,8)};
}
function winnerOf(id){

  if(!res||!teams.t1||!teams.t2) return "";
  if(+res.s1>+res.s2) return teams.t1;
  if(+res.s1<+res.s2) return teams.t2;
  return koAdvancerFromResult(game,res,teams);
}
function loserOf(id){
  const game=gameById(id);

  if(!res||!teams.t1||!teams.t2) return "";
  if(+res.s1>+res.s2) return teams.t2;
  if(+res.s1<+res.s2) return teams.t1;
  const advancer=koAdvancerFromResult(game,res,teams);
  if(!advancer) return "";
  return advancer===teams.t1?teams.t2:teams.t1;
}
function koAdvancerFromResult(game,res,teams=gameTeams(game)){
  if(!game?.ko||!res||+res.s1!==+res.s2) return "";

}

function koOutcomeComplete(game,state,teams=gameTeams(game)){

function seedLabel(seed){
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return `${direct[1]}º Grupo ${direct[2]}`;
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third) return `3º ${third[1].split("").join("/")}`;
  return seed||"A definir";
}
function thirdPlaceContext(){
  if(!groupPhaseComplete()) return null;
  const tables=groupStandings();
  const thirds=GROUP_KEYS.map(group=>tables[group][2]).sort(compareTeams).slice(0,8);
  const key=thirds.map(row=>row.group).sort().join("");
  const allocation=THIRD_PLACE_ALLOCATION[key];
  if(!allocation) return null;
  return {allocation,thirdByGroup:Object.fromEntries(thirds.map(row=>[row.group,row]))};
}
function resolveSeed(seed,thirdOwner){
  if(!groupPhaseComplete()) return "";
  const tables=groupStandings();
  const direct=String(seed||"").match(/^([12])([A-L])$/);
  if(direct) return tables[direct[2]]?.[Number(direct[1])-1]?.team||"";
  const third=String(seed||"").match(/^3([A-L]+)$/);
  if(third){
    const context=thirdPlaceContext();
    const group=context?.allocation?.[thirdOwner];
    if(!group||!third[1].includes(group)) return "";
    return context.thirdByGroup[group]?.team||"";
  }
  return "";
}
function r32Teams(game){
  const t1=resolveSeed(game.seeds?.[0],game.thirdOwner);
  const t2=resolveSeed(game.seeds?.[1],game.thirdOwner);
  return {t1:t1||seedLabel(game.seeds?.[0]),t2:t2||seedLabel(game.seeds?.[1]),ready:Boolean(t1&&t2)};
}
function matchId(matchNo){return GAME_ID_BY_MATCH_NO[matchNo]||"";}
function winnerOfMatch(matchNo){
  const id=matchId(matchNo);

}
function loserOfMatch(matchNo){
  const id=matchId(matchNo);
  return id?loserOf(id):"";
}
function sourceTeam(matchNo,kind){
  const team=kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo);
  return team||`${kind==="loser"?"Perdedor":"Vencedor"} M${matchNo}`;
}
function sourceReady(matchNo,kind){
  return Boolean(kind==="loser"?loserOfMatch(matchNo):winnerOfMatch(matchNo));
}
function gameTeams(game){
  if(!game.ko) return {t1:game.t1,t2:game.t2,ready:true};
  if(game.phaseKey==="r32") return r32Teams(game);
  const sources=game.sources||[];
  const kind=game.sourceKind==="loser"?"loser":"winner";
  if(sources.length>=2){
    return {
      t1:sourceTeam(sources[0],kind),
      t2:sourceTeam(sources[1],kind),
      ready:sourceReady(sources[0],kind)&&sourceReady(sources[1],kind)
    };
  }
  return {t1:"A definir",t2:"A definir",ready:false};
}

function apiTestCanScoreFixture(fixture){
  return Boolean(
    fixture&&
    (apiTestIsFinal(fixture)||apiTestIsActiveFixture(fixture))&&
    apiTestBaseGoalsHome(fixture)!=null&&
    apiTestBaseGoalsAway(fixture)!=null
  );
}
function apiTestBaseGoalsHome(fixture){
  return fixture?.regularGoalsHome??fixture?.goalsHome??null;
}
function apiTestBaseGoalsAway(fixture){
  return fixture?.regularGoalsAway??fixture?.goalsAway??null;
}
function apiTestScoreInfo(prediction,fixture){
  if(!prediction||!apiTestCanScoreFixture(fixture)) return null;
  return {
    value:score(
    {s1:prediction.s1,s2:prediction.s2},
    {s1:apiTestBaseGoalsHome(fixture),s2:apiTestBaseGoalsAway(fixture)}
    ),
    live:apiTestIsActiveFixture(fixture),
    final:apiTestIsFinal(fixture)
  };
}
function apiTestScore(prediction,fixture){
  const info=apiTestScoreInfo(prediction,fixture);
  return info?info.value:null;
}
function apiTestScoreLabel(info){
  const sc=info?info.value:null;
  const prefix=info?.live?"parcial ":"";
  if(sc===3) return {cls:"hit",text:`${prefix}+3 cravada`};
  if(sc===1) return {cls:"ok",text:`${prefix}+1 resultado`};
  if(sc===-2) return {cls:"bad",text:`${prefix}-2 invertida`};
  if(sc===0) return {cls:"",text:`${prefix}0 erro`};
  return {cls:"",text:"Aguardando resultado"};
}
function apiTestTodayKey(){

}
function apiTestInVisibleWindow(fixture){
  return Boolean(fixture.dateKey&&fixture.dateKey>=apiTestTodayKey()&&fixture.dateKey<API_TEST_COPA_START_DATE_KEY);
}
function apiTestVisibleFixtures(){

function apiTestPlayerStats(pi){
  let pts=0,crav=0,corr=0,inv=0,played=0,predicted=0,live=0,finalized=0;
  apiTestVisibleFixtures().forEach(fixture=>{
    const prediction=apiTestPrediction(pi,fixture.id);
    if(prediction) predicted++;
    if(prediction&&apiTestIsActiveFixture(fixture)) live++;
    const info=apiTestScoreInfo(prediction,fixture);
    if(!info) return;
    const sc=info.value;
    played++;
    if(info.final) finalized++;
    pts+=sc;
    if(sc===3) crav++;
    if(sc===1) corr++;
    if(sc===-2) inv++;
  });
  return {pts,crav,corr,inv,played,predicted,live,finalized};
}
function apiTestRanking(){
  return S.participants.map((name,i)=>({name,i,...apiTestPlayerStats(i)})).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.crav!==a.crav) return b.crav-a.crav;
    if(a.inv!==b.inv) return a.inv-b.inv;
    return a.name.localeCompare(b.name,"pt-BR");
  });
}

async function saveApiTestPrediction(id){
  if(remoteClient&&!remoteSession){
    toast("Entre no bolão para salvar.");
    return;
  }
  if(remoteClient&&remoteSession&&!canEditParticipant(apiTestPi)){
    toast("Você só pode alterar seus próprios palpites.");
    loadApiTestRemote(false);
    return;
  }
  const fixture=apiTestState.fixtures.find(f=>f.id===id);
  if(fixture&&apiTestHasStarted(fixture)){
    toast("Palpites encerrados para esse jogo.");
    render(activeTab);
    return;
  }
  const s1=parseInt(document.getElementById(`apiTestS1_${id}`)?.value,10);
  const s2=parseInt(document.getElementById(`apiTestS2_${id}`)?.value,10);
  if(Number.isNaN(s1)||Number.isNaN(s2)||s1<0||s2<0){
    toast("Placar inválido.");
    return;
  }
  const prediction={s1:Math.min(30,s1),s2:Math.min(30,s2)};
  const key=apiTestPredictionKey(apiTestPi,id);
  apiTestState.predictions[key]=prediction;
  saveApiTestState();
  if(remoteClient&&remoteSession){
    if(!requireOnlineLogin()) return;
    pendingApiTestPredictionWrites.add(key);
    const ok=await remoteWrite(()=>remoteClient.from("test_predictions").upsert({
      tournament:API_TEST_TOURNAMENT,
      participant_index:apiTestPi,
      game_id:id,
      user_id:remoteSession.user.id,
      s1:prediction.s1,
      s2:prediction.s2
    },{onConflict:"tournament,participant_index,game_id"})).finally(()=>pendingApiTestPredictionWrites.delete(key));
    if(!ok) return;
  }
  delete apiTestPredictionDrafts[key];
  delete apiTestEditingPredictions[key];
  saveApiTestState();
  toast("Palpite do Brasileirão salvo.");
  render(activeTab);
}

function apiTestClockCanRun(fixture){
  return apiTestIsLive(fixture)&&["1H","2H","LIVE","IN_PLAY","ET"].includes(fixture.statusShort);
}
function apiTestEstimatedElapsed(fixture){
  const elapsed=apiTestCardNumber(fixture?.elapsed);
  if(elapsed===null) return null;
  if(!apiTestClockCanRun(fixture)) return elapsed;
  const syncedAt=fixture.lastSyncedAt?new Date(fixture.lastSyncedAt).getTime():NaN;
  if(!Number.isFinite(syncedAt)) return elapsed;
  const drift=Math.floor((Date.now()-syncedAt)/60000);
  if(!Number.isFinite(drift)||drift<=0) return elapsed;
  return elapsed+Math.min(drift,API_TEST_LIVE_CLOCK_MAX_DRIFT_MIN);
}
function apiTestLiveClockText(fixture){
  const elapsed=apiTestEstimatedElapsed(fixture);
  if(elapsed!==null) return `${elapsed}'`;
  const labels={
    "1H":"1º tempo",
    "2H":"2º tempo",
    "HT":"intervalo",
    "ET":"prorrogação",
    "BT":"intervalo",
    "P":"pênaltis",
    "LIVE":"em andamento",
    "IN_PLAY":"em andamento",
    "PAUSED":"intervalo"
  };
  if(labels[fixture.statusShort]) return labels[fixture.statusShort];
  return "aguardando placar";
}

function predictionProgress(){
  const expected=S.participants.length*GAMES.length;
  const filled=S.participants.reduce((total,_,pi)=>{
    return total+GAMES.filter(game=>isPredictionComplete(game,S.palpites[`${pi}_${game.id}`])).length;
  },0);
  return {filled,expected,pct:expected?Math.round(filled*100/expected):0};
}
function hasScore(entry){
  return Boolean(entry&&entry.s1!=null&&entry.s2!=null);
}
function isPredictionComplete(game,pal){
  if(!hasScore(pal)) return false;
  if(!game?.ko||+pal.s1!==+pal.s2) return true;
  return koAdvancerComplete(game,pal);
}

function rankingChartDefaultSelection(rows){
  const mine=myParticipantIndex();

}
function rankingTimeline(rows){
  const resolved=GAMES.filter(g=>S.results[g.id]).sort(compareGameSchedule);
  const labels=["Início"];
  const totals={};
  const series=rows.map((p,idx)=>{
    totals[p.i]=0;
    return {i:p.i,name:p.name,color:RANKING_SERIES_COLORS[idx%RANKING_SERIES_COLORS.length],values:[0]};
  });
  resolved.forEach(game=>{
    labels.push(game.id);
    series.forEach(line=>{
      const res=S.results[game.id];
      const pal=S.palpites[`${line.i}_${game.id}`];
      const gain=score(pal,res,game);
      totals[line.i]+=gain==null?0:gain;
      line.values.push(totals[line.i]);
    });
  });
  const actual=S.actualPodio||{};
  const includePodio=["p1","p2","p3","p4"].some(k=>norm(actual[k]));
  if(includePodio){
    labels.push("Pódio");
    series.forEach(line=>{
      totals[line.i]+=podioScore(S.podio[line.i]||{},actual);
      line.values.push(totals[line.i]);
    });
  }
  const allValues=series.flatMap(line=>line.values);
  const maxVal=Math.max(3,...allValues);
  const minVal=Math.min(0,...allValues);
  return {labels,series,maxVal,minVal,resolvedCount:resolved.length,includePodio};
}
function rankingLinePath(values,width,height,padX,padY,minVal,maxVal){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,values.length-1);
  const range=Math.max(1,maxVal-minVal);
  return values.map((value,index)=>{
    const x=padX+(usableWidth*(index/steps));
    const y=height-padY-(usableHeight*((value-minVal)/range));
    return `${index===0?"M":"L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
  }).join(" ");
}
function rankingPointDot(value,index,totalPoints,width,height,padX,padY,minVal,maxVal,color){
  const usableWidth=width-padX*2;
  const usableHeight=height-padY*2;
  const steps=Math.max(1,totalPoints-1);
  const range=Math.max(1,maxVal-minVal);
  const x=padX+(usableWidth*(index/steps));
  const y=height-padY-(usableHeight*((value-minVal)/range));
  return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="2"></circle>`;
}

        return `<button class="chart-chip ${active?"active":""}" onclick="toggleRankingSeries(${p.i})" style="${active?`background:${color}`:""}">
          <span class="chart-dot" style="background:${color}"></span>
          <span>${esc(p.name)}</span>
        </button>`;
      }).join("")}
    </div>
    ${selected.length?`<div class="chart-stage">
      <svg viewBox="0 0 ${lineWidth} ${lineHeight}" role="img" aria-label="Gráfico de evolução da pontuação do ranking">
        ${tickValues.map(value=>{
          const y=lineHeight-padY-((lineHeight-padY*2)*((value-chart.minVal)/Math.max(1,chart.maxVal-chart.minVal)));
          return `<g>
            <line x1="${padX}" y1="${y.toFixed(2)}" x2="${lineWidth-padX}" y2="${y.toFixed(2)}" stroke="rgba(0,39,118,.10)" stroke-width="1"></line>
            <text x="4" y="${(y+4).toFixed(2)}" font-size="12" fill="#7a869a" font-weight="700">${value}</text>
          </g>`;
        }).join("")}
        ${selected.map(line=>{
          const color=chart.series.find(s=>s.i===line.i)?.color||"#002776";
          const values=chart.series.find(s=>s.i===line.i)?.values||[0];
          return `<g>
            <path d="${rankingLinePath(values,lineWidth,lineHeight,padX,padY,chart.minVal,chart.maxVal)}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
            ${values.map((value,index)=>rankingPointDot(value,index,values.length,lineWidth,lineHeight,padX,padY,chart.minVal,chart.maxVal,color)).join("")}
          </g>`;
        }).join("")}
      </svg>
    </div>`:`<div class="chart-empty">Ative pelo menos um participante para desenhar a curva de evolução.</div>`}
    <div class="chart-axis">${labels.map(label=>`<span>${esc(label)}</span>`).join("")}</div>

function koAdvancerControl(game,teams,draft,disabled){
  if(!game.ko) return "";
  const tied=Number(draft.s1)===Number(draft.s2);
  const visible=koAdvancerVisible(draft);
  const selectDisabled=disabled||!visible;
  const selected=koOutcomeValue(draft.koWinner,draft.koDecision);
  return `<div class="ko-advancer ${visible?"":"hidden"} ${tied?"":"muted"}" id="advwrap_${game.id}">
    <label for="adv_${game.id}">Empate: como foi decidido?</label>
    <select class="txt-select" id="adv_${game.id}" onchange="setResTiebreak('${game.id}',this.value)" ${selectDisabled?"disabled":""}>
      <option value="">Selecione o desempate</option>
      ${koOutcomeOptions(teams,selected)}
    </select>
  </div>`;
}
function koAdvancerVisible(draft){
  return Number(draft.s1)===Number(draft.s2)&&Boolean(draft.touched||draft.showKoAdvancer||draft.koWinner||draft.koDecision);
}
function koOutcomeValue(team,decision){
  const cleanTeam=norm(team);
  const cleanDecision=normalizeKoDecision(decision);
  return cleanTeam&&cleanDecision?`${cleanDecision}::${cleanTeam}`:"";
}
function koAdvancerValue(team){
  return norm(team);
}
function parseKoAdvancerValue(value){
  const raw=String(value||"");
  const parsed=parseKoOutcomeValue(raw);
  return parsed.koWinner||norm(raw);
}
function parseKoOutcomeValue(value){
  const raw=String(value||"");
  const cut=raw.indexOf("::");
  if(cut<0) return {koWinner:"",koDecision:""};
  return {koDecision:normalizeKoDecision(raw.slice(0,cut)),koWinner:norm(raw.slice(cut+2))};
}
function koOutcomeOptions(teams,selected){
  return [teams.t1,teams.t2].filter(Boolean).flatMap(team=>{
    return KO_DECISIONS.map(([decision,label])=>{
      const value=koOutcomeValue(team,decision);
      return `<option value="${esc(value)}" ${selected===value?"selected":""}>${esc(teamFlag(team)+" "+team)} passa ${esc(label)}</option>`;
    });
  }).join("");
}
function setJFilter(k){jFilter=k;renderJogos();}
function setResDraft(id,w,v){
  if(!resultDrafts[id]) resultDrafts[id]={s1:0,s2:0};
  const n=parseInt(v,10);
  const draft=resultDrafts[id];
  draft[w===1?"s1":"s2"]=!Number.isNaN(n)&&n>=0?Math.min(30,n):0;
  draft.touched=true;
  draft.showKoAdvancer=gameById(id)?.ko&&Number(draft.s1)===Number(draft.s2);
  updateKoAdvancerControl(id);
}
function setResTiebreak(id,value){
  if(!resultDrafts[id]) resultDrafts[id]={s1:0,s2:0};
  Object.assign(resultDrafts[id],parseKoOutcomeValue(value));
}
function updateKoAdvancerControl(id){
  const game=gameById(id);
  if(!game?.ko) return;
  const draft=resultDrafts[id]||{s1:0,s2:0};
  const tied=Number(draft.s1)===Number(draft.s2);
  const visible=koAdvancerVisible(draft);
  const wrap=document.getElementById(`advwrap_${id}`);
  const select=document.getElementById(`adv_${id}`);
  if(wrap){
    wrap.classList.toggle("hidden",!visible);
    wrap.classList.toggle("muted",!tied);
  }
  if(select){
    select.disabled=!visible;
    if(!tied) select.value="";
  }
  if(!tied){
    delete draft.koWinner;
    delete draft.koDecision;
  }
}
function confirmRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  const game=gameById(id);
  const teams=gameTeams(game);
  if(game.ko&&!teams.ready){toast("Complete os jogos anteriores para liberar este confronto.");return;}
  const rawS1=parseInt(document.getElementById(`r1_${id}`)?.value,10);
  const rawS2=parseInt(document.getElementById(`r2_${id}`)?.value,10);
  if(Number.isNaN(rawS1)||Number.isNaN(rawS2)||rawS1<0||rawS2<0){toast("Placar inválido.");return;}
  const s1=Math.min(30,rawS1);
  const s2=Math.min(30,rawS2);
  const result={s1,s2};
  if(game.ko&&s1===s2){
    const selected=parseKoOutcomeValue(document.getElementById(`adv_${id}`)?.value||koOutcomeValue(resultDrafts[id]?.koWinner,resultDrafts[id]?.koDecision));
    if(![teams.t1,teams.t2].includes(selected.koWinner)||!koDecisionLabel(selected.koDecision)){
      if(!resultDrafts[id]) resultDrafts[id]={s1,s2};
      Object.assign(resultDrafts[id],{s1,s2,touched:true,showKoAdvancer:true});
      updateKoAdvancerControl(id);
      toast("Escolha como o empate foi decidido.");
      return;
    }
    result.koWinner=selected.koWinner;
    result.koDecision=selected.koDecision;
  }
  S.results[id]=result;
  delete resultDrafts[id];
  const clearedIds=clearDependentKnockouts(id);
  save();
  saveResultRemote(id);
  // Propaga a cascata de deleção ao Supabase para evitar que o poll ressuscite resultados inválidos
  if(remoteClient&&isAdmin()&&clearedIds.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedIds));
  }
  toast("Resultado salvo.");
  render(activeTab);
}
// Retorna array de game_ids deletados para que o chamador possa propagá-los ao Supabase
function clearDependentKnockouts(id){
  const order=["R32","R16","QF","SF","P3","FINAL"];
  const prefix=id.split("_")[0];
  const idx=order.indexOf(prefix);
  const cleared=[];
  if(idx<0&&id!=="P3"&&id!=="FINAL"){
    if(id.startsWith("G")){
      koGames().forEach(g=>{
        if(S.results[g.id]) cleared.push(g.id);
        delete S.results[g.id];
        delete resultDrafts[g.id];
      });
    }
    return cleared;
  }
  const start=idx<0?order.length:idx+1;
  koGames().forEach(g=>{
    const gp=g.id.split("_")[0];
    if(order.indexOf(gp)>=start){
      if(S.results[g.id]) cleared.push(g.id);
      delete S.results[g.id];
      delete resultDrafts[g.id];
    }
  });
  return cleared;
}
function clearRes(id){
  if(!canEditResults()){toast("Só o administrador altera resultados.");render(activeTab);return;}
  if(!confirm("Remover este resultado?")) return;
  delete S.results[id];
  resultDrafts[id]={s1:0,s2:0};
  const clearedOnRemove=clearDependentKnockouts(id);
  save();
  deleteResultRemote(id);
  // Propaga a cascata ao Supabase
  if(remoteClient&&isAdmin()&&clearedOnRemove.length){
    remoteWrite(()=>remoteClient.from("results").delete().in("game_id",clearedOnRemove));
  }
  render(activeTab);
}

function palInitials(name){

  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

  const finalGame=GAMES.find(g=>g.phaseKey==="final");
  const p3Game=GAMES.find(g=>g.phaseKey==="p3");

  // Bracket layout (R16 → Final). Left side has QF_01,QF_02; right side has QF_03,QF_04.

  // R32 grouped by side (matches that feed into left vs right bracket)
  const r32LeftIds=new Set();
  const r32RightIds=new Set();
  const matchNoToId=Object.fromEntries(koGames().filter(g=>g.phaseKey==="r32").map(g=>[g.matchNo,g.id]));
  r16Left.forEach(g=>(g.sources||[]).forEach(s=>r32LeftIds.add(matchNoToId[s])));
  r16Right.forEach(g=>(g.sources||[]).forEach(s=>r32RightIds.add(matchNoToId[s])));

  const r32Left=r32.filter(g=>r32LeftIds.has(g.id));
  const r32Right=r32.filter(g=>r32RightIds.has(g.id));

  const bracketHTML=`

        <div class="bracket-col-head">Quartas</div>
        ${qfLeft.map(g=>bracketCard(g)).join("")}

      <div class="bracket-col">
        <div class="bracket-col-head">Semi</div>
        ${bracketCard(sfLeft)}
      </div>
      <div class="bracket-col bracket-final-col">
        <div class="bk-final-top">
          <div class="bracket-col-head">Final</div>
          <div class="bracket-trophy">\u{1F3C6}</div>
        </div>
        ${bracketCard(finalGame,{accent:"final"})}
        ${p3Game?`<div class="bracket-third-card">
          <div class="bracket-third-head"><span><span class="ic">\u{1F948}</span> Disputa de 3º lugar</span></div>
          ${bracketCard(p3Game,{accent:"bronze"})}

        ${bracketCard(sfRight)}
      </div>
      <div class="bracket-col">
        <div class="bracket-col-head">Quartas</div>
        ${qfRight.map(g=>bracketCard(g)).join("")}
      </div>
      <div class="bracket-col">
        <div class="bracket-col-head">Oitavas</div>
        ${r16Right.map(g=>bracketCard(g)).join("")}
      </div>
    </div>`;

  const r32HTML=`
    <div class="r32-head">
      <span>\u{1F3DF}\u{FE0F} 16-avos de final</span>
      <span class="count">${r32.length} confrontos</span>
    </div>
    <div class="r32-grid">
      ${r32Left.map(g=>bracketCard(g)).join("")}
      ${r32Right.map(g=>bracketCard(g)).join("")}
    </div>`;

  const mobileSections=[
    {title:"16-avos de final",games:r32,extraCls:""},
    {title:"Oitavas de final",games:[...r16Left,...r16Right],extraCls:""},
    {title:"Quartas de final",games:[...qfLeft,...qfRight],extraCls:""},
    {title:"Semifinais",games:[sfLeft,sfRight].filter(Boolean),extraCls:""},
    {title:"Disputa de 3º lugar",games:p3Game?[p3Game]:[],extraCls:"p3-section"},
    {title:"Final",games:finalGame?[finalGame]:[],extraCls:"final-section"}
  ];
  const mobileHTML=`<div class="ko-mobile-list">
    ${mobileSections.filter(s=>s.games.length).map(s=>`
      <div class="ko-mobile-section ${s.extraCls}">

function bracketCard(game,opts){
  if(!game) return "";
  opts=opts||{};
  const key=`${palPi}_${game.id}`;
  const pal=S.palpites[key]||{};
  const res=S.results[game.id];
  const teams=gameTeams(game);
  const canEdit=canEditParticipant(palPi);
  const gameStarted=!!(game.utc&&new Date()>=new Date(game.utc));
  const disabled=!canEdit||gameStarted;
  const waiting=!teams.ready;
  const dateParts=game.date?formatGameDateParts(game.date):null;

  let cls="bracket-card";
  if(opts.accent) cls+=" "+opts.accent;
  if(waiting) cls+=" waiting";
  if(gameStarted&&!res) cls+=" live";

  let badge="";
  if(pal.s1!=null&&pal.s2!=null&&res){
    const details=scoreDetails(pal,res,game);
    const sc=details?.pts;
    if(details?.exact){cls+=" hit";badge=`<span class="bk-badge">+${sc} cravou</span>`;}
    else if(sc>0) badge=`<span class="bk-badge">+${sc}</span>`;
    else if(sc===-2) badge=`<span class="bk-badge" style="background:linear-gradient(135deg,#ef4444,#991b1b)">-2</span>`;
    else badge=`<span class="bk-badge" style="background:#9ca3af">0</span>`;
  }

  const v1=canEdit&&!gameStarted&&!waiting?(pal.s1??null):pal.s1;
  const v2=canEdit&&!gameStarted&&!waiting?(pal.s2??null):pal.s2;
  const inp=(id,val,which)=>`<input id="${id}" type="number" min="0" max="30" inputmode="numeric" value="${val==null?"":esc(val)}" placeholder="–" ${disabled||waiting?"disabled":""} onchange="setPal(${palPi},'${game.id}',${which},this.value)">`;

  const rowHTML=(name,side,val,which)=>{
    const flag=teamFlag(name);
    const placeholder=!flag;
    const rcls=`bk-row ${placeholder?"muted":""}`;
    return `<div class="${rcls}">
      <div class="nm">${flag?`<span class="flag">${flag}</span>`:""}<span class="txt">${esc(name)}</span></div>
      ${inp(`bk_${palPi}_${game.id}_${which}`,val,which)}
    </div>`;
  };

  const meta=`<div class="bk-meta">
    <span>${esc(game.id)}</span>
    ${dateParts?`<span class="date">${esc(dateParts.dayMonth)}${game.time?` · ${esc(game.time)}`:""}</span>`:""}
  </div>`;

  return `<div class="${cls}">
    ${badge}
    ${meta}
    ${rowHTML(teams.t1,"t1",v1,1)}
    <div class="bk-divider"></div>
    ${rowHTML(teams.t2,"t2",v2,2)}
    ${palTiebreakControl(palPi,game,teams,pal,disabled||waiting,"bk")}
  </div>`;
}

function palTiebreakControl(pi,game,teams,pal,disabled,scope="pal"){
  if(!game.ko||!hasScore(pal)||+pal.s1!==+pal.s2) return "";
  const selected=koAdvancerValue(pal.koWinner);
  const id=`${scope}_tb_${pi}_${game.id}`;
  const buttons=[teams.t1,teams.t2].filter(Boolean).map(team=>{
    const active=selected===team;
    return `<button class="pass-btn ${active?"active":""}" type="button" data-team="${esc(team)}" onclick="setPalTiebreak(${pi},${jsAttr(game.id)},this.dataset.team)" ${disabled?"disabled":""}>${esc(teamFlag(team)+" "+team)} passa</button>`;
  }).join("");
  return `<div class="ko-advancer pal-tiebreak" id="${esc(id)}">
    <label>Empate: quem passa?</label>
    <div class="pass-options">${buttons}</div>
  </div>`;
}

function selPal(i){palPi=i;palSelectionTouched=true;renderPalpites();}
function setPalStage(stage){palStage=stage;palFilter="all";renderPalpites();}
function setPalFilter(k){palFilter=k;renderPalpites();}
function setPal(pi,gid,w,v){
  if(!canEditParticipant(pi)){toast("Você só pode alterar seus próprios palpites.");renderPalpites();return;}
  const game=gameById(gid);
  if(game&&game.utc&&new Date()>=new Date(game.utc)){
    toast("Este jogo já começou. Palpites encerrados.");
    renderPalpites();
    return;
  }
  const key=`${pi}_${gid}`;
  if(!S.palpites[key]) S.palpites[key]={};
  const n=parseInt(v,10);
  if(!Number.isNaN(n)&&n>=0){
    const clamped=Math.min(30,n);
    if(w===1) S.palpites[key].s1=clamped;
    else S.palpites[key].s2=clamped;
    completePredictionVisibleZero(S.palpites[key]);
  }else{
    if(w===1) delete S.palpites[key].s1;
    else delete S.palpites[key].s2;
  }
  if(!game?.ko||!hasScore(S.palpites[key])||+S.palpites[key].s1!==+S.palpites[key].s2){
    delete S.palpites[key].koWinner;
    delete S.palpites[key].koDecision;
  }
  save();
  if(remoteClient) savePredictionRemote(pi,gid);
  else dirtyPredictionKeys.delete(key);
  renderPalpites();
}
function setPalTiebreak(pi,gid,value){
  if(!canEditParticipant(pi)){toast("Você só pode alterar seus próprios palpites.");renderPalpites();return;}
  const game=gameById(gid);
  if(game&&game.utc&&new Date()>=new Date(game.utc)){
    toast("Este jogo já começou. Palpites encerrados.");
    renderPalpites();
    return;
  }
  const key=`${pi}_${gid}`;
  const pal=S.palpites[key];
  if(!game?.ko||!hasScore(pal)||+pal.s1!==+pal.s2){
    toast("O desempate só vale para empate no mata-mata.");
    renderPalpites();
    return;
  }
  const teams=gameTeams(game);
  const selected=parseKoAdvancerValue(value);
  if(![teams.t1,teams.t2].includes(selected)){
    delete pal.koWinner;
    delete pal.koDecision;
  }else{
    pal.koWinner=selected;
    delete pal.koDecision;
  }
  save();
  savePredictionRemote(pi,gid);
  renderPalpites();
}

  // Pódio foi integrado à página de Palpites; redireciona o render para o estágio "podio"

function setAP(k,v){
  if(!canEditResults()){toast("Só o administrador altera o pódio oficial.");renderPodio();return;}
  const draft=draftPodio(S.actualPodio,k,v);
  if(!draft.ok){
    toast(`${draft.value} já foi escolhido como ${podioLabel(draft.duplicateKey)}.`);
    renderPodio();
    return;
  }
  S.actualPodio=draft.next;
  save();
  saveActualPodioRemote();
  renderPodio();
  renderRanking();
}
function setPodio(pi,k,v){
  if(!canEditParticipant(pi)){toast("Você só pode alterar seu próprio pódio.");renderPodio();return;}
  const draft=draftPodio(S.podio[pi]||{},k,v);
  if(!draft.ok){
    toast(`${draft.value} já foi escolhido como ${podioLabel(draft.duplicateKey)}.`);
    renderPodio();
    return;
  }
  S.podio[pi]=draft.next;
  save();
  savePodioRemote(pi);
  renderPodio();
}

function renderConfig(){
  if(isOnlineMode()&&isAdmin()&&invitedEmailsList===null) loadInvitedEmails();
  const n=S.participants.length;
  const total=n*S.config.entryValue;
  const pcts=S.config.prizePercents;
  const prizes=pcts.map(p=>Math.round(total*p/100));
  const sum=prizes.reduce((a,b)=>a+b,0);
  const diff=total-sum;
  const locked=!canEditResults();
  const profiles=orderedProfiles();
  let h=`<div class="panel">
    ${accountCard()}
    ${isOnlineMode()&&currentProfile?`<div class="card">
      <div class="card-title">Permissões online</div>
      ${canManageRoles()
        ? `${profiles.map(profile=>{
            const admin=profile.role==="admin";
            const self=profile.id===currentProfile.id;
            const disableDemote=admin&&isLastRemainingAdmin(profile.id);
            return `<div class="cfg-row profile-row">
              <div class="cfg-lbl">
                <strong>${esc(participantName(profile.participant_index))}${self?" (você)":""}</strong>
                <span>${admin?"Pode alterar resultados, pódio, configurações e permissões.":"Pode editar apenas os próprios palpites e pódio."}</span>
              </div>
              <div class="cfg-actions">
                <span class="role-chip ${admin?"admin":"participant"}">${roleLabel(profile.role)}</span>
                ${admin
                  ? `<button class="action-btn secondary" onclick="updateProfileRole('${profile.id}','participant')" ${disableDemote?"disabled":""}>Remover admin</button>`
                  : `<button class="action-btn" onclick="updateProfileRole('${profile.id}','admin')">Tornar admin</button>`}
              </div>
            </div>`;
          }).join("")}
          <div class="microcopy" style="margin-top:10px">As permissões valem apenas para contas já vinculadas a um participante.</div>
          ${adminCount()===1?`<div class="microcopy" style="margin-top:4px">O último administrador fica protegido para o bolão não ficar sem controle.</div>`:""}`
        : canBootstrapAdmin()
          ? `<div class="microcopy">Ainda não existe administrador neste bolão. Assuma a primeira administração para liberar a gestão de permissões aqui mesmo.</div>
             <div class="action-row" style="margin-top:10px">
               <button class="action-btn" onclick="bootstrapFirstAdmin()">Virar administrador</button>
             </div>`
          : `<div class="microcopy">${hasAdminProfile()?"Só administradores podem promover outras contas por aqui.":"Entre com uma conta vinculada para assumir a primeira administração."}</div>`}
    </div>`:""}
    ${isOnlineMode()&&isAdmin()?`<div class="card">
      <div class="card-title">Lista de convidados</div>
      <div class="microcopy" style="margin-bottom:10px">Somente e-mails desta lista podem criar conta e vincular um nome ao bolão.</div>
      ${invitedEmailsList===null
        ?`<div class="microcopy">Carregando…</div>`
        :invitedEmailsList.length===0
          ?`<div class="microcopy">Nenhum convite cadastrado ainda.</div>`
          :invitedEmailsList.map(ie=>`<div class="cfg-row">
              <div class="cfg-lbl"><strong>${esc(participantName(ie.participant_index))}</strong><span>${esc(ie.email)}</span></div>
              <button class="action-btn secondary" onclick="removeInvitedEmail('${ie.email.replace(/'/g,"\\'")}')">Remover</button>
            </div>`).join("")}
      <div class="cfg-row" style="margin-top:12px;gap:6px;flex-wrap:wrap">
        <input class="txt-inp" id="inviteEmailInp" type="email" placeholder="e-mail do convidado" style="flex:1;min-width:180px">
        <select class="txt-select" id="inviteIdxSel" style="width:auto">
          ${S.participants.map((name,i)=>`<option value="${i}">${esc(name)}</option>`).join("")}
        </select>
        <button class="action-btn" onclick="addInvitedEmail()">Adicionar</button>
      </div>
    </div>`:``}
    <div class="card">
      <div class="card-title">Participantes</div>
      <div class="rules-box">${S.participants.map((name,i)=>`<div>${i+1}. <strong>${esc(name)}</strong></div>`).join("")}</div>
    </div>
    <div class="card">
      <div class="card-title">Financeiro</div>
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>Entrada por participante</strong><span>Valor em reais.</span></div>
        <input class="cfg-inp" type="number" min="1" value="${S.config.entryValue}" onchange="updCfg('entryValue',+this.value)" ${locked?"disabled":""}>
      </div>
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>Total arrecadado</strong><span>${n} participantes × ${brl(S.config.entryValue)}.</span></div>
        <span style="font-weight:950;color:var(--green)">${brl(total)}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Distribuição dos prêmios</div>
      ${["1º lugar","2º lugar","3º lugar"].map((lbl,i)=>`
      <div class="cfg-row">
        <div class="cfg-lbl"><strong>${lbl}</strong><span>${brl(prizes[i])}</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          <input class="cfg-inp" type="number" min="0" max="100" value="${pcts[i]}" onchange="updPrize(${i},+this.value)" ${locked?"disabled":""}>
          <span class="microcopy">%</span>
        </div>
      </div>`).join("")}
      <div class="microcopy" style="font-weight:850;color:${Math.abs(diff)<1?"#065f46":"#b91c1c"}">
        ${Math.abs(diff)<1?"Distribuição balanceada.":`Diferença de ${brl(Math.abs(diff))}; ajuste os percentuais.`}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Regras de pontuação</div>
      <div class="rules-box">
        <div><strong>Cravada:</strong> placar exato vale <strong style="color:#065f46">+3 pontos</strong>; empate no mata-mata vale 2 antes do bônus de classificado.</div>
        <div><strong>Resultado certo:</strong> vencedor ou empate correto, sem placar exato, vale <strong style="color:#1e40af">+1 ponto</strong>.</div>
        <div><strong>Invertida:</strong> placar exatamente ao contrário vale <strong style="color:#b91c1c">−2 pontos</strong>.</div>
        <div><strong>Erro:</strong> resultado incorreto vale <strong>0 ponto</strong>.</div>
        <hr style="margin:10px 0;border:none;border-top:1px solid var(--border)">
        <div><strong>Pódio:</strong> campeão +20, vice +10, 3º lugar +5 e 4º lugar +3.</div>
        <div><strong>Mata-mata:</strong> acertar quem passa soma <strong style="color:#065f46">+1 ponto extra</strong>. Se o jogo empatar no tempo regulamentar, só pontua quem também palpitou empate: empate cravado vale 2 pontos, empate não cravado vale 1, e acertar quem passa soma +1.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Backup de dados</div>
      <div class="action-row">
        <button class="action-btn" onclick="saveBackup()">Exportar JSON</button>
        <label class="action-label">Importar JSON<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
        ${isOnlineMode()&&isAdmin()?`<button class="action-btn secondary" onclick="pushLocalStateToRemote()">Publicar dados locais no Supabase</button>`:""}
        ${canEditResults()?`<button class="action-btn secondary" onclick="resetCompetitionData()">Resetar competição</button>`:""}
      </div>
      <div class="microcopy" style="margin-top:10px">Os dados também ficam neste navegador como cópia de segurança. Exporte um backup regularmente.</div>
      <div class="microcopy" style="margin-top:4px">O reset apaga resultados, palpites e pódios; participantes, contas vinculadas e configurações permanecem.</div>
      ${S.savedAt?`<div class="microcopy" style="margin-top:4px">Último salvamento: ${new Date(S.savedAt).toLocaleString("pt-BR")}.</div>`:""}
    </div>
  </div>`;
  document.getElementById("tab-config").innerHTML=h;
}
function updCfg(k,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config[k]=Number.isFinite(v)&&v>0?v:S.config[k];
  save();
  saveConfigRemote();
  renderConfig();
}
function updPrize(i,v){
  if(!canEditResults()){toast("Só o administrador altera as configurações.");renderConfig();return;}
  S.config.prizePercents[i]=Number.isFinite(v)?Math.max(0,Math.min(100,v)):0;
  save();
  saveConfigRemote();
  renderConfig();
}
// ── Gerenciamento de convidados (invited_emails) ──────────────────────────
async function loadInvitedEmails(){
  if(!remoteClient||!remoteSession||!isAdmin()) return;
  const {data}=await remoteClient.from('invited_emails').select('email,participant_index').order('participant_index');
  invitedEmailsList=data||[];
  if(activeTab==='config') renderConfig();
}
async function addInvitedEmail(){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  const email=(document.getElementById('inviteEmailInp')?.value||'').toLowerCase().trim();
  const idx=parseInt(document.getElementById('inviteIdxSel')?.value,10);
  if(!email||!email.includes('@')){toast("Informe um e-mail válido.");return;}
  if(!Number.isInteger(idx)||idx<0||idx>=S.participants.length){toast("Escolha um participante válido.");return;}
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').upsert({email,participant_index:idx},{onConflict:'email'}));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite salvo para ${email}.`);}
}
async function removeInvitedEmail(email){
  if(!remoteClient||!remoteSession||!isAdmin()){toast("Só o administrador pode gerenciar convidados.");return;}
  if(!confirm(`Remover o convite de ${email}?\nSe esta pessoa já tiver vinculado a conta, ela não conseguirá criar um novo perfil caso saia.`)) return;
  const ok=await remoteWrite(()=>remoteClient.from('invited_emails').delete().eq('email',email));
  if(ok){invitedEmailsList=null;await loadInvitedEmails();toast(`Convite de ${email} removido.`);}
}

function resetCompetitionDataState(){
  S.results={};
  S.palpites={};
  S.podio={};
  S.actualPodio={};
  save();
}

async function resetCompetitionData(){
  const message=isOnlineMode()
    ? "Isso vai apagar todos os resultados, palpites e pódios salvos aqui e no Supabase. Participantes e configurações serão mantidos. Deseja continuar?"
    : "Isso vai apagar todos os resultados, palpites e pódios salvos neste navegador. Participantes e configurações serão mantidos. Deseja continuar?";
  if(!window.confirm(message)) return;
  if(isOnlineMode()){
    if(!remoteClient||!remoteSession){toast("Entre como administrador primeiro.");return;}
    if(!isAdmin()){toast("Só o administrador pode resetar a competição.");return;}
    setSyncStatus("warn","Limpando dados da competição...");
    const responses=await Promise.all([
      remoteClient.from("results").delete().neq("game_id",""),
      remoteClient.from("predictions").delete().gte("participant_index",0),
      remoteClient.from("podium_predictions").delete().gte("participant_index",0),
      remoteClient.from("actual_podium").upsert({
        id:"main",
        p1:null,
        p2:null,
        p3:null,
        p4:null,
        updated_by:remoteSession.user.id
      },{onConflict:"id"})
    ]);
    const failed=responses.find(r=>r.error);
    if(failed){
      setSyncStatus("err",remoteErrorText(failed.error));
      toast(remoteErrorText(failed.error));
      await loadRemoteData(false);
      return;
    }
  }
  resetCompetitionDataState();
  render(activeTab);
  if(isOnlineMode()){
    await loadRemoteData(false);
    toast("Competição resetada no navegador e no Supabase.");
  }else{
    toast("Competição resetada neste navegador.");
  }
}

function saveBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`bolao2026_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Backup exportado.");
}
function importBackup(input){
  const f=input.files[0];
  if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      S=migrateState(JSON.parse(e.target.result));
      save();
      toast(isOnlineMode()&&isAdmin()?"Backup importado. Use Publicar dados locais no Supabase para enviar online.":"Backup importado.");
      render(activeTab);
    }catch(err){toast("Arquivo inválido.");}
  };
  reader.readAsText(f);
}
function toast(msg,ms=2400){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),ms);
}

document.addEventListener("click",event=>{
  const menu=document.getElementById("accountMenu");
  if(authPanelOpen&&menu&&!menu.contains(event.target)) closeAuthPanel();
});
document.addEventListener("keydown",event=>{
  if(event.key==="Escape"&&authPanelOpen) closeAuthPanel();
  handleScoreZeroTyping(event);
});
document.addEventListener("input",event=>{
  if(event.target&&event.target.matches&&event.target.matches("input")) trackScoreDraftInput(event.target);
});

render("home");
initRemote();
</script>
